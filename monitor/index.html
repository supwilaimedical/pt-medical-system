<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Dashboard — PT-System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="../shared/styles.css" rel="stylesheet">
    <style>
        /* Monitor-specific styles */
        .monitor-spin { animation: monitor-spin-anim 1s linear infinite; }
        @keyframes monitor-spin-anim { to { transform: rotate(360deg); } }
        .monitor-loading { opacity: 0.4; pointer-events: none; transition: opacity 0.3s; }
        .monitor-fade-in { animation: monitor-fade 0.6s ease; }
        @keyframes monitor-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .blink-border { animation: blink-border-anim 1s ease-in-out infinite; }
        @keyframes blink-border-anim { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .blink-badge { animation: blink-badge-anim 1.2s ease-in-out infinite; }
        @keyframes blink-badge-anim { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body style="background: #f0f2f5; font-family: 'Sarabun', sans-serif;">

    <!-- ==================== SPLASH SCREEN ==================== -->
    <div id="splash-screen" style="position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; background:linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); transition: opacity 0.4s ease;">
        <div style="text-align:center;">
            <div class="mb-3">
                <div style="width:64px; height:64px; border:4px solid #dee2e6; border-top-color:#0d6efd; border-radius:50%; animation: splash-spin 0.8s linear infinite; margin:0 auto;"></div>
            </div>
            <h5 style="font-family:'Sarabun',sans-serif; font-weight:600; color:#495057; margin-bottom:4px;">PT-System</h5>
            <p style="font-family:'Sarabun',sans-serif; font-size:0.85rem; color:#6c757d; margin:0;" id="splash-status">กำลังเชื่อมต่อระบบ...</p>
        </div>
    </div>
    <style>@keyframes splash-spin { to { transform: rotate(360deg); } }</style>

    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="login-view" class="d-flex align-items-center justify-content-center px-3" style="min-height:100vh;">
        <div class="card p-4 shadow" style="width: 100%; max-width: 380px; border-radius: 16px; border: none;">
            <div class="text-center mb-4">
                <div class="bg-info-subtle text-info rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                    <i class="bi bi-display fs-1"></i>
                </div>
                <h4 class="fw-bold text-dark">Monitor Dashboard</h4>
                <p class="text-muted small">เข้าสู่ระบบด้วยรหัสผ่าน HR System</p>
            </div>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" id="login-user" class="form-control bg-light border-start-0 ps-0" placeholder="รหัสพนักงาน" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-key text-muted"></i></span>
                        <input type="password" id="login-pass" class="form-control bg-light border-start-0 ps-0" placeholder="รหัสผ่าน" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold rounded-3 shadow-sm" id="btn-login">เข้าสู่ระบบ (Login)</button>
            </form>
            <div id="login-error" class="alert alert-danger mt-3 d-none small text-center rounded-3"></div>
        </div>
    </div>

    <!-- ==================== MAIN APP WRAPPER ==================== -->
    <div id="app-main-wrapper" style="display:none;">

        <!-- ==================== SHARED NAV ==================== -->
        <nav class="navbar navbar-dark bg-modern-primary no-print sticky-top">
            <div class="container-fluid px-3 px-md-4 py-1">
                <a class="navbar-brand mb-0 h1 d-flex align-items-center gap-2" href="#" onclick="goToLanding(); return false;">
                    <img id="navbar-logo" src="" alt="" style="height: 36px; display: none;" class="bg-white rounded-circle p-1 shadow-sm">
                    <i class="bi bi-grid-fill fs-5" id="navbar-icon"></i>
                    <span class="d-none d-sm-inline fw-semibold" style="font-size: 1rem;">PT-System</span>
                </a>
                <div class="d-flex align-items-center gap-2 gap-md-3">
                    <div class="d-none d-lg-flex align-items-center text-light bg-white bg-opacity-10 px-3 py-1 rounded-pill">
                        <i class="bi bi-person-circle me-2"></i>
                        <span id="nav-user-display" class="small fw-medium"></span>
                    </div>
                    <div class="btn-group system-toggle" role="group" id="nav-system-toggle">
                        <button type="button" class="btn btn-sm rounded-pill-start sys-tog" id="sys-tog-transport" onclick="switchSystem('transport')" title="Patient Transport" style="min-width:40px;">
                            <i class="bi bi-truck-front-fill"></i><span class="d-none d-lg-inline ms-1">Transport</span>
                        </button>
                        <button type="button" class="btn btn-sm sys-tog" id="sys-tog-firstaid" onclick="switchSystem('firstaid')" title="First Aid" style="min-width:40px;">
                            <i class="bi bi-bandaid-fill"></i><span class="d-none d-lg-inline ms-1">First Aid</span>
                        </button>
                        <button type="button" class="btn btn-sm rounded-pill-end sys-tog" id="sys-tog-location" onclick="switchSystem('location')" title="PT Location" style="min-width:40px;">
                            <i class="bi bi-geo-alt-fill"></i><span class="d-none d-lg-inline ms-1">Location</span>
                        </button>
                    </div>
                    <button class="btn btn-sm rounded-pill px-2 px-md-3 fw-semibold shadow-sm" id="btn-monitor" style="display:none; background:#17a2b8; color:#fff; border:none;" onclick="enterSystem('monitor')" title="Monitor Dashboard">
                        <i class="bi bi-display"></i><span class="d-none d-md-inline ms-1">Monitor</span>
                    </button>
                    <button class="btn btn-light btn-sm rounded-pill px-2 px-md-3 fw-semibold shadow-sm" id="btn-system-dashboard" onclick="goToSystemDashboard()" title="กลับหน้า Dashboard ของระบบนี้">
                        <i class="bi bi-house-door-fill"></i><span class="d-none d-md-inline ms-1">Dashboard</span>
                    </button>
                    <button class="btn btn-outline-light btn-sm border-0 rounded-circle" onclick="logout()" title="ออกจากระบบ" style="width:36px; height:36px;">
                        <i class="bi bi-box-arrow-right fs-5"></i>
                    </button>
                </div>
            </div>
        </nav>
        <div id="connection-alert" class="alert alert-danger text-center m-0 d-none no-print rounded-0 border-0">
            <i class="bi bi-exclamation-triangle-fill"></i> <span id="connection-msg">Connection Error</span>
        </div>

        <!-- ==================== MONITOR VIEW ==================== -->
        <div class="container py-4" style="max-width:1200px;">
            <div id="monitor-view" class="view-section active">
                <!-- Header with countdown timer -->
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                    <div class="d-flex align-items-center gap-2">
                        <span class="badge bg-success-subtle text-success rounded-pill px-2 py-1"><i class="bi bi-broadcast me-1"></i>LIVE</span>
                        <span class="text-muted small">Read-Only &bull; อัปเดตล่าสุด: <b id="monitor-last-refresh">-</b></span>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <div style="position:relative;width:38px;height:38px;cursor:pointer;" onclick="loadMonitor()" title="คลิกเพื่อ Refresh ทันที">
                            <svg width="38" height="38" viewBox="0 0 38 38">
                                <circle cx="19" cy="19" r="16" fill="none" stroke="#e2e8f0" stroke-width="3"/>
                                <circle id="monitor-countdown-ring" cx="19" cy="19" r="16" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:center;stroke-dasharray:100.53;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear;"/>
                            </svg>
                            <div id="monitor-countdown-text" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.6rem;font-weight:700;color:#3b82f6;">3:00</div>
                        </div>
                        <button id="monitor-refresh-btn" class="btn btn-outline-primary btn-sm rounded-pill px-3" onclick="loadMonitor()">
                            <i class="bi bi-arrow-clockwise me-1" id="monitor-refresh-icon"></i> Refresh
                        </button>
                    </div>
                </div>

                <!-- Transport Section -->
                <div class="d-flex align-items-center gap-2 mb-2">
                    <h6 class="mb-0 fw-bold text-primary"><i class="bi bi-truck me-2"></i>PT-Transport — Active Cases</h6>
                    <span class="badge bg-primary rounded-pill" id="monitor-transport-count">0</span>
                </div>
                <div id="monitor-transport-list" class="row g-3 mb-4">
                    <div class="col-12 text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div><span class="text-muted ms-2 small">กำลังโหลด...</span></div>
                </div>

                <!-- First Aid Section -->
                <div class="d-flex align-items-center gap-2 mb-2">
                    <h6 class="mb-0 fw-bold text-danger"><i class="bi bi-heart-pulse me-2"></i>PT-First Aid — Active Events</h6>
                    <span class="badge bg-danger rounded-pill" id="monitor-fa-count">0</span>
                </div>
                <div id="monitor-fa-list" class="row g-3 mb-3">
                    <div class="col-12 text-center py-4"><div class="spinner-border spinner-border-sm text-danger"></div><span class="text-muted ms-2 small">กำลังโหลด...</span></div>
                </div>
            </div>
        </div>

        <!-- Fullscreen Preview Modal -->
        <div class="modal fade" id="monitorPreviewModal" tabindex="-1">
            <div class="modal-dialog modal-fullscreen">
                <div class="modal-content">
                    <div class="modal-header py-2 bg-dark text-white border-0">
                        <h6 class="modal-title fw-bold" id="monitorPreviewTitle"><i class="bi bi-eye me-2"></i>Preview</h6>
                        <div class="d-flex gap-2 align-items-center">
                            <button class="btn btn-sm btn-outline-light rounded-pill px-3" onclick="monitorPrintIframe()"><i class="bi bi-printer me-1"></i> Print</button>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                    </div>
                    <div class="modal-body p-0" id="monitorPreviewBody">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary"></div>
                            <p class="text-muted mt-2">กำลังโหลด...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div><!-- /app-main-wrapper -->

    <!-- ==================== SCRIPTS ==================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../shared/config.js"></script>

    <script>
    // =============================================
    // PT Medical System — Monitor Dashboard
    // Migrated from GAS to GitHub Pages + Supabase
    // =============================================

    // --- Supabase Client ---
    var _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

    // --- Escape HTML ---
    function escapeHtml(text) {
        if (!text) return '';
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(text));
        return d.innerHTML;
    }

    // =============================================
    // AUTH (inline, same pattern as shared/auth.js)
    // =============================================
    function getUserMeta() {
        var raw = localStorage.getItem('pt_user_meta');
        return raw ? JSON.parse(raw) : null;
    }

    function isLoggedIn() { return !!getUserMeta(); }

    function getUserRole() {
        var meta = getUserMeta();
        return meta ? (meta.role || 'User') : 'User';
    }

    function getUserName() {
        var meta = getUserMeta();
        return meta ? (meta.full_name || meta.name || 'Unknown') : 'Unknown';
    }

    function getUserUsername() {
        var meta = getUserMeta();
        return meta ? (meta.username || '') : '';
    }

    async function handleLogin(e) {
        e.preventDefault();
        var username = document.getElementById('login-user').value.trim();
        var pass = document.getElementById('login-pass').value;
        var errEl = document.getElementById('login-error');
        var btn = document.getElementById('btn-login');

        if (!username || !pass) {
            if (errEl) { errEl.textContent = 'กรุณากรอก Username และ Password'; errEl.classList.remove('d-none'); }
            return;
        }

        if (errEl) { errEl.classList.add('d-none'); errEl.textContent = ''; }
        if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังเข้าสู่ระบบ...'; }

        try {
            var res = await fetch(CONFIG.GAS_AUTH_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ username: username, password: pass }),
                redirect: 'follow'
            });
            var result = await res.json();

            if (result.status === 'success') {
                localStorage.setItem('pt_user_meta', JSON.stringify({
                    full_name: result.name || username,
                    role: result.role || 'User',
                    username: username,
                    loginAt: new Date().toISOString()
                }));

                // Show app
                var loginView = document.getElementById('login-view');
                if (loginView) { loginView.classList.remove('d-flex'); loginView.classList.add('d-none'); }
                var wrapper = document.getElementById('app-main-wrapper');
                if (wrapper) wrapper.style.display = 'block';

                onLoginSuccess();
            } else {
                throw new Error(result.message || 'เข้าสู่ระบบไม่สำเร็จ');
            }
        } catch (err) {
            var msg = err.message || 'ไม่สามารถเชื่อมต่อระบบได้';
            if (errEl) { errEl.textContent = 'เข้าสู่ระบบไม่สำเร็จ: ' + msg; errEl.classList.remove('d-none'); }
        }

        if (btn) { btn.disabled = false; btn.innerHTML = 'เข้าสู่ระบบ (Login)'; }
    }

    function logout() {
        localStorage.removeItem('pt_user_meta');
        window.location.reload();
    }

    function checkAuth() {
        if (isLoggedIn()) {
            var loginView = document.getElementById('login-view');
            if (loginView) { loginView.classList.remove('d-flex'); loginView.classList.add('d-none'); }
            var wrapper = document.getElementById('app-main-wrapper');
            if (wrapper) wrapper.style.display = 'block';
            onLoginSuccess();
        }
    }

    // =============================================
    // NAVIGATION
    // =============================================
    function goToLanding() { window.location.href = '../'; }
    function goToSystemDashboard() { window.location.href = '../'; }
    function switchSystem(sys) { window.location.href = '../' + sys + '/'; }
    function enterSystem(sys) {
        if (sys === 'monitor') return; // already here
        window.location.href = '../' + sys + '/';
    }

    // =============================================
    // POST-LOGIN INIT
    // =============================================
    function onLoginSuccess() {
        // Update nav
        var userDisplay = document.getElementById('nav-user-display');
        if (userDisplay) userDisplay.textContent = getUserName();

        // Load settings (logo, print header)
        loadNavSettings();

        // Load monitor data
        loadMonitor();
    }

    async function loadNavSettings() {
        try {
            var res = await _supabase.from('settings').select('*');
            (res.data || []).forEach(function(s) {
                if (s.key === 'APP_LOGO_URL' && s.value) {
                    var logo = document.getElementById('navbar-logo');
                    if (logo) { logo.src = s.value; logo.style.display = ''; }
                }
                if (s.key === 'PRINT_HEADER' && s.value) {
                    window.PRINT_HEADER = s.value;
                }
            });
        } catch(e) { console.error(e); }
    }

    // =============================================
    // DATA ADAPTERS (Supabase snake_case -> original camelCase)
    // =============================================
    function adaptCase(c) {
        var raw = c.raw_data || {};
        return {
            id: c.case_id,
            patientInfo: c.patient_info || {},
            opInfo: c.op_info || {},
            rawSnapshot: raw.rawSnapshot || '',
            vitalsJson: raw.vitalsJson || '',
            ivJson: raw.ivJson || '',
            triageLevel: c.triage_level,
            createdAt: c.created_at,
            status: c.status
        };
    }

    function adaptEvent(ev, registryStats) {
        return {
            id: ev.event_id,
            name: ev.event_name,
            location: ev.location,
            startDate: ev.event_date,
            startTime: ev.start_time,
            endDate: ev.end_date,
            endTime: ev.end_time,
            status: ev.status,
            qAmmonia: ev.q_ammonia,
            qPlaster: ev.q_plaster,
            qSpray: ev.q_spray,
            qWound: ev.q_wound,
            createdBy: ev.created_by,
            registryCount: registryStats.total || 0,
            registryMed: registryStats.med || 0,
            registryTrauma: registryStats.trauma || 0,
            registryTransfer: registryStats.transfer || 0
        };
    }

    function adaptRegistry(r) {
        return {
            triage: r.triage, gender: r.gender, age: r.age, name: r.name,
            phone: r.phone, category: r.category,
            locationTx: r.location_tx,
            timeIn: r.time_in, timeOut: r.time_out,
            etiology: r.etiology, cc: r.cc, ccOther: r.cc_other,
            problem: r.problem, problemOther: r.problem_other,
            treatment: r.treatment, allergy: r.allergy,
            result: r.result, note: r.note, gps: r.gps,
            recordedBy: r.recorded_by
        };
    }

    // =============================================
    // MONITOR DASHBOARD (Card-based + Auto-refresh 3 min)
    // =============================================
    var monitorCountdownTimer = null;
    var monitorCountdownSec = 180;

    function monitorStartCountdown() {
        monitorCountdownSec = 180;
        if (monitorCountdownTimer) clearInterval(monitorCountdownTimer);
        monitorCountdownTimer = setInterval(function() {
            var monitorView = document.getElementById('monitor-view');
            if (!monitorView) {
                clearInterval(monitorCountdownTimer);
                monitorCountdownTimer = null;
                return;
            }
            monitorCountdownSec--;
            monitorUpdateRing();
            if (monitorCountdownSec <= 0) {
                clearInterval(monitorCountdownTimer);
                monitorCountdownTimer = null;
                loadMonitor();
            }
        }, 1000);
    }

    function monitorUpdateRing() {
        var ring = document.getElementById('monitor-countdown-ring');
        var txt = document.getElementById('monitor-countdown-text');
        if (!ring || !txt) return;
        var pct = monitorCountdownSec / 180;
        var circumference = 2 * Math.PI * 16;
        ring.style.strokeDashoffset = circumference * (1 - pct);
        var m = Math.floor(monitorCountdownSec / 60);
        var s = monitorCountdownSec % 60;
        txt.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    }

    var monitorPendingLoads = 0;
    var monitorSafetyTimer = null;

    function monitorShowLoading() {
        monitorPendingLoads = 2; // Transport + FA
        var icon = document.getElementById('monitor-refresh-icon');
        if (icon) icon.classList.add('monitor-spin');
        var btn = document.getElementById('monitor-refresh-btn');
        if (btn) btn.disabled = true;
        var tl = document.getElementById('monitor-transport-list');
        var fl = document.getElementById('monitor-fa-list');
        if (tl) tl.classList.add('monitor-loading');
        if (fl) fl.classList.add('monitor-loading');
        // Safety timeout: force-clear loading after 15 seconds if callbacks hang
        if (monitorSafetyTimer) clearTimeout(monitorSafetyTimer);
        monitorSafetyTimer = setTimeout(function() {
            if (monitorPendingLoads > 0) {
                console.warn('Monitor: safety timeout — force clearing loading state (' + monitorPendingLoads + ' pending)');
                monitorPendingLoads = 1; // will become 0 in monitorHideLoading
                monitorHideLoading();
                // Show error hint on sections still showing spinner
                [tl, fl].forEach(function(el) {
                    if (el && el.querySelector('.spinner-border')) {
                        el.innerHTML = '<div class="col-12 text-center py-4"><i class="bi bi-exclamation-triangle text-warning fs-4"></i><p class="text-muted small mt-1 mb-0">โหลดข้อมูลไม่สำเร็จ กด Refresh เพื่อลองใหม่</p></div>';
                    }
                });
            }
        }, 15000);
    }

    function monitorHideLoading() {
        monitorPendingLoads--;
        if (monitorPendingLoads > 0) return; // wait for both
        if (monitorSafetyTimer) { clearTimeout(monitorSafetyTimer); monitorSafetyTimer = null; }
        var icon = document.getElementById('monitor-refresh-icon');
        if (icon) icon.classList.remove('monitor-spin');
        var btn = document.getElementById('monitor-refresh-btn');
        if (btn) btn.disabled = false;
        var tl = document.getElementById('monitor-transport-list');
        var fl = document.getElementById('monitor-fa-list');
        if (tl) { tl.classList.remove('monitor-loading'); tl.classList.add('monitor-fade-in'); }
        if (fl) { fl.classList.remove('monitor-loading'); fl.classList.add('monitor-fade-in'); }
        // Remove fade-in class after animation completes
        setTimeout(function() {
            if (tl) tl.classList.remove('monitor-fade-in');
            if (fl) fl.classList.remove('monitor-fade-in');
        }, 600);
    }

    // =============================================
    // LOAD MONITOR DATA (Supabase, replaces google.script.run.getMonitorData)
    // =============================================
    async function loadMonitor() {
        var transportList = document.getElementById('monitor-transport-list');
        var faList = document.getElementById('monitor-fa-list');
        if (!transportList || !faList) return;

        monitorShowLoading();
        document.getElementById('monitor-last-refresh').textContent = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        monitorStartCountdown();

        try {
            // Load Transport cases
            var casesRes = await _supabase.from('cases').select('*').eq('status', 'Active').order('created_at', { ascending: false });
            var cases = (casesRes.data || []).map(adaptCase);

            document.getElementById('monitor-transport-count').textContent = cases.length;
            renderMonitorTransport(cases);
            monitorHideLoading();

            // Load FA events
            var eventsRes = await _supabase.from('fa_events').select('*').eq('status', 'Active');
            var events = eventsRes.data || [];

            var adaptedEvents = [];
            for (var i = 0; i < events.length; i++) {
                var ev = events[i];
                var regsRes = await _supabase.from('fa_registry').select('etiology, result').eq('event_id', ev.event_id);
                var regs = regsRes.data || [];
                var stats = {
                    total: regs.length,
                    med: regs.filter(function(r) { return r.etiology === 'Med'; }).length,
                    trauma: regs.filter(function(r) { return r.etiology === 'Trauma'; }).length,
                    transfer: regs.filter(function(r) { return r.result && r.result.startsWith('transfer'); }).length
                };
                adaptedEvents.push(adaptEvent(ev, stats));
            }

            document.getElementById('monitor-fa-count').textContent = adaptedEvents.length;
            renderMonitorFA(adaptedEvents);
        } catch(e) {
            console.error('Monitor render error:', e);

    // =============================================
    // RENDER TRANSPORT CARDS (exact copy from original)
    // =============================================
    function renderMonitorTransport(cases) {
        var container = document.getElementById('monitor-transport-list');
        if (cases.length === 0) {
            container.innerHTML = '<div class="col-12 text-center py-5"><i class="bi bi-check-circle text-success fs-1 d-block mb-2"></i><p class="text-muted mb-0">ไม่มีเคส Active ในขณะนี้</p></div>';
            return;
        }

        var esc = escapeHtml;
        var html = '';
        cases.forEach(function(rec) {
            var ptName = (rec.patientInfo && rec.patientInfo.name) || 'ไม่ระบุชื่อ';
            var ptAge = (rec.patientInfo && rec.patientInfo.age) || '-';
            var ptGender = (rec.patientInfo && rec.patientInfo.gender) || '-';
            var gShort = ptGender === 'Male' ? 'ช' : (ptGender === 'Female' ? 'ญ' : '-');
            var origin = (rec.patientInfo && rec.patientInfo.origin) || '?';
            var dest = (rec.patientInfo && rec.patientInfo.destination) || '?';
            var opLevel = (rec.opInfo && rec.opInfo.level) || '-';
            var opUnit = (rec.opInfo && rec.opInfo.unitNo) || '-';
            var transportType = (rec.opInfo && rec.opInfo.type) || '-';

            // Parse rawSnapshot for clinical data
            var snap = {};
            try { if (rec.rawSnapshot) snap = JSON.parse(rec.rawSnapshot); } catch(e) {}
            var g = function(k) { return snap[k] || ''; };
            var cc = g('pt_cc') || '-';
            var dx = g('pt_dx') || '-';
            var allergies = g('pt_allergies') || '-';
            var nrStatus = g('nr_status') || '-';
            var airway = g('airway_type') || '-';
            var isArrest = !!snap['circ_arrest'];

            // Build Airway/Breathing string from initial data
            var breathingStr = '';
            if (snap['chk-ventilator']) {
                breathingStr = 'Vent (' + (g('vent_mode') || '-') + ')';
            } else {
                var o2dev = g('o2_device') || '';
                if (o2dev && o2dev !== 'Room Air') breathingStr = o2dev;
            }
            var airwayBreathingStr = 'A: ' + airway + (breathingStr ? ' | B: ' + breathingStr : '');

            // --- Determine LATEST vitals + LATEST arrest ---
            var vBP = g('init_bp') || '-', vPR = g('init_pr') || '-', vRR = g('init_rr') || '-';
            var vSpO2 = g('init_spo2') || '-', vTemp = g('init_temp') || '-';
            var vGcsE = g('gcs_e') || '4', vGcsV = g('gcs_v') || '5', vGcsM = g('gcs_m') || '6';
            var vitalsTime = g('init_vitals_time') || '';
            var vitalsSource = vitalsTime ? 'Initial @ ' + vitalsTime : 'Initial';
            var vitalsCount = 0;
            var latestArrest = null; // Latest arrest entry from vitals log
            var isFromLog = false; // true if vitals come from log (not initial)
            var vNote = ''; // Note from latest vital log entry

            try {
                if (rec.vitalsJson) {
                    var vArr = JSON.parse(rec.vitalsJson);
                    vitalsCount = vArr.length;
                    // Find latest arrest entry
                    for (var ai = vArr.length - 1; ai >= 0; ai--) {
                        if (vArr[ai].type === 'arrest') { latestArrest = vArr[ai]; break; }
                    }
                    // Find latest non-arrest entry for vitals
                    for (var vi = vArr.length - 1; vi >= 0; vi--) {
                        if (vArr[vi].type !== 'arrest') {
                            var lv = vArr[vi];
                            if (lv.bp) vBP = lv.bp;
                            if (lv.pr) vPR = lv.pr;
                            if (lv.rr) vRR = lv.rr;
                            if (lv.spo2) vSpO2 = lv.spo2;
                            if (lv.temp) vTemp = lv.temp;
                            if (lv.gcs_e) vGcsE = lv.gcs_e;
                            if (lv.gcs_v) vGcsV = lv.gcs_v;
                            if (lv.gcs_m) vGcsM = lv.gcs_m;
                            vNote = lv.note || '';
                            vitalsTime = lv.time || '';
                            vitalsSource = 'Latest @ ' + vitalsTime;
                            isFromLog = true;
                            break;
                        }
                    }
                }
            } catch(e) {}

            // 7th box: if from log → show Note, if initial → show Airway/Breathing
            var seventhBoxLabel = isFromLog ? 'Note' : 'A+B';
            var seventhBoxValue = isFromLog ? (vNote || '-') : airwayBreathingStr;

            // Also check pre-arrest from rawSnapshot
            if (!latestArrest && snap['arrest_pre_arrest']) {
                latestArrest = {
                    type: 'arrest',
                    arrest_time: g('arrest_pre_time'),
                    arrest_rhythm: g('arrest_pre_rhythm'),
                    arrest_cpr_time: g('arrest_pre_cpr_time'),
                    arrest_outcome: g('arrest_pre_outcome'),
                    arrest_rosc_time: g('arrest_pre_rosc_time'),
                    arrest_dead_time: g('arrest_pre_dead_time')
                };
            }

            // Build arrest card HTML
            var arrestCardHtml = '';
            if (latestArrest) {
                var aTime = latestArrest.arrest_time || '-';
                var aRhythm = latestArrest.arrest_rhythm || '-';
                var aCpr = latestArrest.arrest_cpr_time || '-';
                var aOutcome = latestArrest.arrest_outcome || '-';
                var aOutcomeHtml = esc(aOutcome);
                var isROSC = (aOutcome === 'ROSC');
                var isDead = (aOutcome === 'Terminate CPR' || aOutcome === 'Dead');
                var isOngoing = (!isROSC && !isDead); // Ongoing CPR or other
                if (isROSC) aOutcomeHtml = '<span style="color:#155724;font-weight:700;"><i class="bi bi-heart-pulse-fill me-1"></i>ROSC</span>' + (latestArrest.arrest_rosc_time ? ' @ ' + esc(latestArrest.arrest_rosc_time) : '');
                else if (isDead) aOutcomeHtml = '<span style="color:#dc3545;font-weight:700;">' + esc(aOutcome) + '</span>' + (latestArrest.arrest_dead_time ? ' @ ' + esc(latestArrest.arrest_dead_time) : '');

                // ROSC = green card (no blink), Dead = dark card (no blink), Ongoing = red card (blink)
                var cardBorder = isROSC ? '#198754' : isDead ? '#6c757d' : '#dc3545';
                var cardHeaderBg = isROSC ? '#198754' : isDead ? '#6c757d' : '#dc3545';
                var cardBodyBg = isROSC ? '#d1f5e0' : isDead ? '#e9ecef' : '#fff0f0';
                var cardTitle = isROSC ? '<i class="bi bi-heart-pulse-fill"></i> ROSC — Arrest Recovered' : isDead ? '<i class="bi bi-dash-circle-fill"></i> ARREST — ' + esc(aOutcome) : '<i class="bi bi-exclamation-triangle-fill"></i> CARDIAC ARREST';
                var blinkClass = isOngoing ? ' blink-border' : '';

                arrestCardHtml =

                      '<div class="row g-1 text-center">' +

                        '<div class="col-3"><div class="text-muted" style="font-size:0.58rem;">Rhythm</div><div class="fw-bold">' + esc(aRhythm) + '</div></div>' +
                        '<div class="col-3"><div class="text-muted" style="font-size:0.58rem;">CPR Start</div><div class="fw-bold">' + esc(aCpr) + '</div></div>' +
                        '<div class="col-3"><div class="text-muted" style="font-size:0.58rem;">Outcome</div><div class="fw-bold">' + aOutcomeHtml + '</div></div>' +
                      '</div>' +
                    '</div>' +
                  '</div>';
            }

            var gcsStr = 'E' + vGcsE + (vGcsV === 'VT' ? 'VT' : 'V' + vGcsV) + 'M' + vGcsM;

            var triageColor = '#198754'; var triageText = 'Green'; var triageBg = '#d1e7dd';
            if (rec.triageLevel === 'Resuscitation') { triageColor = '#dc3545'; triageText = 'Red'; triageBg = '#f8d7da'; }
            else if (rec.triageLevel === 'Emergency') { triageColor = '#d63384'; triageText = 'Pink'; triageBg = '#f7d6e6'; }
            else if (rec.triageLevel === 'Urgent') { triageColor = '#ffc107'; triageText = 'Yellow'; triageBg = '#fff3cd'; }

            var dateStr = '-';

                      '<span class="badge bg-white text-dark border shadow-sm" style="font-size:0.7rem;padding:4px 8px;">' + shortId + '</span>' +
                      (latestArrest && (latestArrest.arrest_outcome === 'ROSC') ? ' <span class="badge text-white" style="font-size:0.65rem;padding:3px 8px;background:#198754;"><i class="bi bi-heart-pulse-fill me-1"></i>ROSC</span>' :
                       latestArrest && (latestArrest.arrest_outcome === 'Terminate CPR' || latestArrest.arrest_outcome === 'Dead') ? ' <span class="badge text-white" style="font-size:0.65rem;padding:3px 8px;background:#6c757d;"><i class="bi bi-dash-circle-fill me-1"></i>' + esc(latestArrest.arrest_outcome) + '</span>' :

    // =============================================
    // TRANSPORT CASE PREVIEW (Supabase, replaces google.script.run.getCaseData)
    // =============================================
    async function monitorPreviewCase(caseId) {
        monitorShowModal('Transport Case: ' + caseId);
        try {
            var res = await _supabase.from('cases').select('*').eq('case_id', caseId).single();
            if (res.data) {
                var c = res.data;
                var raw = c.raw_data || {};
                var data = {
                    id: c.case_id,
                    rawSnapshot: raw.rawSnapshot || '',
                    vitalsJson: raw.vitalsJson || '',
                    ivJson: raw.ivJson || '',
                    status: c.status
                };
                var html = monitorBuildTransportHtml(data);
                var body = document.getElementById('monitorPreviewBody');

    // =============================================
    // FA EVENT PREVIEW & DASHBOARD (Supabase)
    // =============================================
    async function getEventReportData(eventId) {
        var evRes = await _supabase.from('fa_events').select('*').eq('event_id', eventId).single();
        var regRes = await _supabase.from('fa_registry').select('*').eq('event_id', eventId);
        var settingsRes = await _supabase.from('settings').select('*');

        var ev = evRes.data;
        var registry = (regRes.data || []).map(adaptRegistry);
        var settings = {};
        (settingsRes.data || []).forEach(function(s) { settings[s.key] = s.value; });

        return {
            event: adaptEvent(ev, {
                total: registry.length,
                med: registry.filter(function(r) { return r.etiology === 'Med'; }).length,
                trauma: registry.filter(function(r) { return r.etiology === 'Trauma'; }).length,
                transfer: registry.filter(function(r) { return r.result && r.result.startsWith('transfer'); }).length
            }),
            registry: registry,
            config: {
                companyName: settings['FA_COMPANY_NAME'] || '',
                contact: settings['FA_COMPANY_CONTACT'] || ''
            }
        };
    }

    async function monitorPreviewEvent(eventId, eventName) {
        monitorShowModal('First Aid Event: ' + eventName);
        try {
            var result = await getEventReportData(eventId);
            if (result && result.event) {
                var html = monitorBuildFAHtml(result, eventId);
                var body = document.getElementById('monitorPreviewBody');
                body.innerHTML = '<iframe style="width:100%;height:100%;border:none;" id="monitor-preview-iframe"></iframe>';
                var iframe = document.getElementById('monitor-preview-iframe');
                setTimeout(function() {
                    iframe.contentDocument.open();
                    iframe.contentDocument.write(html);
                    iframe.contentDocument.close();
                }, 50);
            } else {
                document.getElementById('monitorPreviewBody').innerHTML = '<div class="text-center py-5 text-danger">ไม่พบข้อมูล Event</div>';
            }
        } catch(err) {
            document.getElementById('monitorPreviewBody').innerHTML = '<div class="text-center py-5 text-danger">' + err.message + '</div>';
        }
    }

    async function monitorOpenFADashboard(eventId, eventName) {
        Swal.fire({ title: 'กำลังสร้าง Dashboard...', didOpen: function() { Swal.showLoading(); } });
        try {
            var result = await getEventReportData(eventId);
            Swal.close();
            if (result && result.event) {
                var html = monitorBuildFADashboardHtml(result, eventId);
                var w = window.open('', '_blank');
                if (!w || w.closed) { Swal.fire({ icon:'warning', title:'Popup ถูกบล็อก', text:'กรุณาอนุญาต Popup' }); return; }
                w.document.open(); w.document.write(html); w.document.close();
            } else {
                Swal.fire('Error', 'ไม่พบข้อมูล Event', 'error');
            }
        } catch(err) { Swal.close(); Swal.fire('Error', err.message, 'error'); }
    }

    // =============================================
    // BUILD FA HTML (exact copy from original)
    // =============================================
    function monitorBuildFAHtml(result, eventId) {
        var esc = escapeHtml;
        var ev = result.event;
        var registry = result.registry || [];
        var config = result.config || {};

        var logoSrc = '';
        var navLogo = document.getElementById('navbar-logo');
        if (navLogo && navLogo.src && navLogo.style.display !== 'none') logoSrc = navLogo.src;

        // Aggregate registry stats
        var total = registry.length;
        var medCount = 0, traumaCount = 0, transferCount = 0, dcCount = 0;
        registry.forEach(function(r) {
            if (r.etiology === 'Med') medCount++;
            else if (r.etiology === 'Trauma') traumaCount++;
            if (r.result) {
                var rType = r.result.split(':')[0];
                if (rType === 'transfer') transferCount++;
                else dcCount++;
            }
        });

        var qA = parseInt(ev.qAmmonia) || 0;
        var qB = parseInt(ev.qPlaster) || 0;
        var qC = parseInt(ev.qSpray) || 0;
        var qD = parseInt(ev.qWound) || 0;
        var qTotal = qA + qB + qC + qD;

        function monitorParseResult(resultStr) {
            if (!resultStr) return '-';
            var parts = resultStr.split(':');
            if (parts[0] === 'dc') {
                var labels = { dnf: 'DNF', rtp: 'Return to Play', finished: 'กลับบ้าน' };
                return 'D/C — ' + (labels[parts[1]] || parts[1] || '');
            } else if (parts[0] === 'transfer') {
                var methods = { self: 'ไปเอง', team: 'ทีมส่ง' };
                var hospital = parts.slice(2).join(':');
                return 'Transfer (' + (methods[parts[1]] || '') + ')' + (hospital ? ' → ' + hospital : '');
            }
            return resultStr;
        }

            splash.style.opacity = '0';
            setTimeout(function() { splash.style.display = 'none'; }, 400);

        checkAuth();

        var wrapper = document.getElementById('app-main-wrapper');

            var observer = new MutationObserver(function(mutations) {
