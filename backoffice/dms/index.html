<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DMS — Backoffice</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="../pages.css">
<link rel="stylesheet" href="../backoffice.css">
</head>
<body>

<div class="pt-shell" id="shell">
  <aside class="pt-rail">
    <div class="pt-rail__logo" title="Backoffice"><a href="../" style="color:inherit;text-decoration:none;">D</a></div>
    <button class="pt-rail__btn" title="กลับ Hub" onclick="location.href='../'"><i class="bi bi-grid"></i></button>
    <button class="pt-rail__btn is-active" title="DMS"><i class="bi bi-receipt"></i></button>
    <button class="pt-rail__btn" title="Stock" onclick="location.href='../stock/'"><i class="bi bi-box-seam"></i></button>
    <div class="pt-rail__spacer"></div>
    <button class="pt-rail__btn" title="Logout" onclick="boLogout()"><i class="bi bi-box-arrow-right"></i></button>
    <div class="pt-rail__user" id="railUser" title="">?</div>
  </aside>

  <aside class="pt-subnav">
    <div class="pt-subnav__head">
      <div class="pt-subnav__title">โมดูล</div>
      <div class="pt-subnav__module"><i class="bi bi-receipt"></i> DMS</div>
    </div>
    <div class="pt-subnav__list">
      <a class="pt-subnav__link" data-page="dashboard"><i class="bi bi-house-door"></i> หน้าหลัก</a>
      <a class="pt-subnav__link" data-page="list"><i class="bi bi-list-ul"></i> รายการเอกสาร</a>
      <a class="pt-subnav__link" data-page="create"><i class="bi bi-plus-circle"></i> สร้างใหม่</a>
      <a class="pt-subnav__link" data-page="customers"><i class="bi bi-people"></i> ลูกค้า</a>
      <a class="pt-subnav__link" data-page="settings"><i class="bi bi-gear"></i> ตั้งค่า</a>
    </div>
    <div class="pt-subnav__foot">
      <i class="bi bi-cloud-check text-success"></i>
      <span>Connected</span>
    </div>
  </aside>

  <div class="pt-content" id="content">
    <div class="state state--empty" style="padding:80px;text-align:center;color:var(--ink-3);">
      <div class="spinner-border" style="color:var(--primary);"></div>
    </div>
  </div>
</div>

<nav class="pt-bnav">
  <div class="pt-bnav__row">
    <button class="pt-bnav__btn" data-page="dashboard"><i class="bi bi-house"></i><span>หน้าหลัก</span></button>
    <button class="pt-bnav__btn" data-page="list"><i class="bi bi-list-ul"></i><span>เอกสาร</span></button>
    <button class="pt-bnav__btn pt-bnav__btn--primary" data-page="create"><i class="bi bi-plus-lg"></i><span>สร้าง</span></button>
    <button class="pt-bnav__btn" data-page="customers"><i class="bi bi-people"></i><span>ลูกค้า</span></button>
    <button class="pt-bnav__btn" data-page="settings"><i class="bi bi-gear"></i><span>ตั้งค่า</span></button>
  </div>
</nav>

<script src="../config.js"></script>
<script src="../auth.js"></script>
<script src="../api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="pages/dashboard.js"></script>
<script src="pages/list.js"></script>
<script src="pages/create.js"></script>
<script src="pages/customers.js"></script>
<script src="pages/settings.js"></script>
<script>
  if (!boIsLoggedIn()) { location.href = '../'; }
  document.getElementById('railUser').textContent = boUserInitials();
  document.getElementById('railUser').title = boGetUserName();

  window.PAGES = window.PAGES || {};
  function activate(pageId) {
    document.querySelectorAll('[data-page]').forEach(el => el.classList.toggle('is-active', el.dataset.page === pageId));
    const slot = document.getElementById('content');
    slot.innerHTML = '';
    const fn = window.PAGES[pageId];
    if (typeof fn !== 'function') {
      slot.innerHTML = '<div class="state state--error" style="padding:80px;text-align:center;color:var(--danger);">หน้านี้ยังไม่พร้อม: ' + pageId + '</div>';
      return;
    }
    fn(slot);
    history.replaceState(null, '', '#' + pageId);
  }
  document.addEventListener('click', (e) => {
    const link = e.target.closest('[data-page]');
    if (link) { activate(link.dataset.page); }
  });
  const hash = (location.hash || '#dashboard').replace('#','');
  activate(hash);
</script>
</body>
</html>
