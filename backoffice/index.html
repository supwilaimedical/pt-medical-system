<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Backoffice — Supwilai Medical</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="components.css">
<link rel="stylesheet" href="pages.css">
<link rel="stylesheet" href="backoffice.css">
</head>
<body>

<!-- LOGIN view -->
<section id="loginView" class="bo-login" style="display:none;">
  <div class="bo-login__card">
    <div class="bo-login__logo">SP</div>
    <div class="bo-login__title">Backoffice</div>
    <div class="bo-login__sub">DMS · Stock — Supwilai Medical</div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input id="loginUser" type="text" class="form-control" autocomplete="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input id="loginPass" type="password" class="form-control" autocomplete="current-password" required>
      </div>
      <div id="loginErr" class="alert alert-danger d-none" style="font-size:13px;"></div>
      <button id="loginBtn" type="submit" class="btn btn-primary w-100" style="height:44px;">เข้าสู่ระบบ</button>
    </form>
  </div>
</section>

<!-- HUB view -->
<section id="hubView" class="bo-hub" style="display:none;">
  <header class="bo-hub__top">
    <i class="bi bi-grid-fill" style="color:var(--primary);font-size:22px;"></i>
    <h1>Backoffice</h1>
    <div class="bo-hub__user">
      <span id="hubUserName"></span>
      <span class="chip chip--ghost" id="hubUserRole"></span>
      <div class="bo-hub__avatar" id="hubAvatar">?</div>
      <button class="btn btn-light btn-sm" onclick="boLogout()" title="ออกจากระบบ"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </header>

  <div class="bo-hub__body">
    <a href="./dms/" class="bo-tile">
      <div class="bo-tile__icon bo-tile__icon--dms"><i class="bi bi-receipt"></i></div>
      <h3 class="bo-tile__title">DMS</h3>
      <p class="bo-tile__desc">ระบบจัดการเอกสาร — ใบเสนอราคา · ใบแจ้งหนี้ · ใบเสร็จ · ใบกำกับภาษี · ลูกค้า</p>
      <div class="bo-tile__cta">เปิด DMS <i class="bi bi-arrow-right"></i></div>
    </a>

    <a href="./stock/" class="bo-tile" id="tileStock">
      <div class="bo-tile__icon bo-tile__icon--stock"><i class="bi bi-box-seam"></i></div>
      <h3 class="bo-tile__title">Stock</h3>
      <p class="bo-tile__desc">คลังสินค้า — รายการ SKU · เบิก/รับเข้า/ปรับ · ประวัติ · พิมพ์สติ๊กเกอร์ QR</p>
      <div class="bo-tile__cta">เปิด Stock <i class="bi bi-arrow-right"></i></div>
    </a>
  </div>
</section>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function showHub() {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('hubView').style.display = 'flex';
    document.getElementById('hubUserName').textContent = boGetUserName();
    document.getElementById('hubUserRole').textContent = boGetUserRole();
    document.getElementById('hubAvatar').textContent = boUserInitials();
    // Stock only for Admin/Employee (Co-Partner cannot dispense, but can read?)
    const role = boGetUserRole();
    const tileStock = document.getElementById('tileStock');
    if (role !== 'Admin' && role !== 'Employee') {
      tileStock.style.opacity = '.5';
      tileStock.title = 'สิทธิ์ไม่พอ — เฉพาะ Admin/Employee';
    }
  }
  function showLogin() {
    document.getElementById('hubView').style.display = 'none';
    document.getElementById('loginView').style.display = 'flex';
    setTimeout(() => document.getElementById('loginUser').focus(), 100);
  }
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    const err = document.getElementById('loginErr');
    const btn = document.getElementById('loginBtn');
    err.classList.add('d-none');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังเข้าสู่ระบบ...';
    try {
      await boLogin(u, p);
      showHub();
    } catch (ex) {
      err.textContent = ex.message || 'เข้าสู่ระบบไม่สำเร็จ';
      err.classList.remove('d-none');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'เข้าสู่ระบบ';
    }
  });
  if (boIsLoggedIn()) showHub(); else showLogin();
</script>
</body>
</html>
