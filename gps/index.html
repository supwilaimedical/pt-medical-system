<!DOCTYPE html>
<html lang="th">
<head>
  <title>PT-System | GPS Tracking</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="PT Medical System — ระบบติดตามตำแหน่งรถ GPS">
  <meta name="theme-color" content="#1e3a5f">
  <meta name="color-scheme" content="light">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../assets/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="../shared/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* ============================================================
       GPS Fleet — Enterprise Design (Navy + Red palette)
       ============================================================ */
    :root {
      --navy-900: #0f2847;
      --navy-700: #1e3a5f;
      --navy-500: #2c5282;
      --navy-50:  #eff4fb;
      --red-700:  #b91c1c;
      --red-600:  #dc2626;
      --red-500:  #ef4444;
      --red-50:   #fef2f2;
      --slate-50: #f8fafc;
      --slate-100:#f1f5f9;
      --slate-200:#e2e8f0;
      --slate-300:#cbd5e1;
      --slate-400:#94a3b8;
      --slate-500:#64748b;
      --slate-600:#475569;
      --slate-700:#334155;
      --slate-900:#0f172a;
      --green-600:#16a34a;
      --amber-500:#f59e0b;
    }

    body { background: var(--slate-50); }

    .gps-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: calc(100vh - 56px);
      overflow: hidden;
    }
    @media (max-width: 992px) {
      .gps-layout { grid-template-columns: 320px 1fr; }
    }
    /* ===== Mobile: Map-first + Bottom Sheet (Grab/Uber-style) ===== */
    .sheet-handle { display:none; }
    @media (max-width: 768px) {
      .gps-layout {
        display: block; position: relative;
        height: calc(100vh - 56px); height: calc(100dvh - 56px);
        overflow: hidden;
      }
      /* Map fills whole viewport below navbar */
      .map-container {
        position: absolute; inset: 0; height: auto; min-height: 0;
      }
      #map { min-height: 0; height: 100%; }
      /* Vehicle panel = bottom sheet */
      .vehicle-panel {
        position: absolute; left: 0; right: 0; bottom: 0;
        height: 45vh; max-height: 88vh; min-height: 120px;
        border-right: none !important;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -6px 22px rgba(15,40,71,0.14);
        z-index: 500;
        transition: height 0.22s cubic-bezier(.2,.8,.2,1);
        display: flex; flex-direction: column;
        overflow: hidden;
        touch-action: pan-y;
      }
      .vehicle-panel.sheet-dragging { transition: none; }
      .vehicle-panel.sheet-peek { height: 120px; }
      .vehicle-panel.sheet-half { height: 45vh; }
      .vehicle-panel.sheet-full { height: 88vh; }
      /* Hide filter tabs in peek mode — only title + search visible */
      .vehicle-panel.sheet-peek .filter-tabs,
      .vehicle-panel.sheet-peek .panel-search { display: none; }
      .vehicle-panel.sheet-peek .panel-section-header { padding-bottom: 6px; border-bottom: none; }
      .sheet-handle {
        display: flex; justify-content: center; align-items: center;
        padding: 8px 0 4px; cursor: grab; touch-action: none;
        flex-shrink: 0;
      }
      .sheet-handle:active { cursor: grabbing; }
      .sheet-handle-bar {
        width: 44px; height: 5px; border-radius: 3px;
        background: var(--slate-300);
      }
      .vehicle-list { flex: 1; overflow-y: auto; }
      .panel-section-header { flex-shrink: 0; padding-top: 4px !important; }
      /* Map controls: stack vertically on right so bottom sheet doesn't cover them */
      .map-controls {
        top: 12px; right: 12px; left: auto;
        flex-direction: column; padding: 4px;
      }
      .map-ctrl-btn { padding: 9px 10px; }
      /* Backdrop for full-mode */
      .sheet-backdrop {
        position: absolute; inset: 0; background: rgba(15,40,71,0.35);
        z-index: 499; opacity: 0; pointer-events: none;
        transition: opacity 0.2s;
      }
      .vehicle-panel.sheet-full ~ .sheet-backdrop { opacity: 1; pointer-events: auto; }
    }

    /* ==================== LEFT PANEL ==================== */
    .vehicle-panel {
      background: #fff;
      border-right: 1px solid var(--slate-200);
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .vehicle-panel::-webkit-scrollbar { width: 6px; }
    .vehicle-panel::-webkit-scrollbar-thumb { background: var(--slate-300); border-radius: 3px; }

    .panel-section-header {
      position: sticky; top: 0; z-index: 5;
      background: #fff;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--slate-100);
    }
    .panel-title {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .panel-title h5 {
      margin: 0; font-size: 1rem; font-weight: 700; color: var(--navy-900);
      letter-spacing: -0.01em;
    }
    .panel-title .count-pill {
      background: var(--navy-50); color: var(--navy-700);
      padding: 2px 10px; border-radius: 12px;
      font-size: 0.75rem; font-weight: 600;
    }
    .panel-refresh-group {
      display: flex; align-items: center; gap: 6px;
    }
    .last-update-chip {
      font-size: 0.68rem; font-weight: 600;
      color: var(--slate-500);
      background: var(--slate-50);
      border: 1px solid var(--slate-200);
      padding: 3px 8px; border-radius: 100px;
      display: inline-flex; align-items: center; gap: 4px;
      line-height: 1;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .last-update-chip.fresh {
      color: var(--green-600);
      background: #f0fdf4;
      border-color: #bbf7d0;
    }
    .last-update-chip.stale {
      color: var(--amber-500);
      background: #fffbeb;
      border-color: #fde68a;
    }
    .last-update-chip .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: currentColor;
    }
    .last-update-chip.fresh .dot { animation: pulseGreen 2s infinite; }
    .panel-search {
      position: relative;
    }
    .panel-search input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      background: var(--slate-50);
      border: 1px solid var(--slate-200);
      border-radius: 8px;
      font-size: 0.85rem;
      transition: all 0.15s;
    }
    .panel-search input:focus {
      outline: none; background: #fff;
      border-color: var(--navy-500);
      box-shadow: 0 0 0 3px rgba(30,58,95,0.08);
    }
    .panel-search i {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--slate-400); font-size: 0.9rem;
    }

    .filter-tabs {
      display: flex; gap: 4px; margin-top: 10px;
    }
    .filter-tab {
      flex: 1;
      padding: 5px 0;
      background: transparent;
      border: 1px solid var(--slate-200);
      border-radius: 6px;
      font-size: 0.72rem; font-weight: 600;
      color: var(--slate-500);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-tab:hover { background: var(--slate-50); color: var(--slate-700); }
    .filter-tab.active {
      background: var(--navy-700); color: #fff; border-color: var(--navy-700);
    }

    /* ==================== VEHICLE CARDS ==================== */
    .vehicle-list { padding: 8px 12px 12px; flex: 1; }

    .v-card {
      position: relative;
      background: #fff;
      border: 1px solid var(--slate-200);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .v-card:hover {
      border-color: var(--navy-500);
      box-shadow: 0 2px 10px rgba(30,58,95,0.08);
      transform: translateY(-1px);
    }
    .v-card.active {
      border-color: var(--navy-700);
      background: var(--navy-50);
      box-shadow: 0 0 0 3px rgba(30,58,95,0.08);
    }

    .v-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 8px;
    }
    .v-identity { flex: 1; min-width: 0; }
    .v-plate {
      display: flex; align-items: center; gap: 8px;
      font-size: 1rem; font-weight: 700;
      color: var(--navy-900);
      letter-spacing: -0.01em;
    }
    .v-plate-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--slate-400); flex-shrink: 0;
    }
    .v-card.online .v-plate-dot {
      background: var(--green-600);
      box-shadow: 0 0 0 0 rgba(22,163,74,0.6);
      animation: pulseGreen 2s infinite;
    }
    .v-card.idle .v-plate-dot { background: var(--amber-500); }
    .v-card.overspeed {
      border-color: #dc2626;
      background: #fef2f2;
      box-shadow: 0 0 0 2px rgba(220,38,38,0.15);
    }
    .v-card.overspeed.active {
      background: #fee2e2;
      box-shadow: 0 0 0 3px rgba(220,38,38,0.25);
    }
    .v-card.overspeed .v-plate-dot {
      background: #dc2626;
      animation: pulseRed 1s infinite;
    }
    .v-card.overspeed .v-speed-value {
      color: #dc2626;
    }

    @keyframes pulseGreen {
      0%   { box-shadow: 0 0 0 0 rgba(22,163,74,0.55); }
      70%  { box-shadow: 0 0 0 8px rgba(22,163,74,0); }
      100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); }
    }
    @keyframes pulseRed {
      0%   { box-shadow: 0 0 0 0 rgba(220,38,38,0.7); }
      70%  { box-shadow: 0 0 0 10px rgba(220,38,38,0); }
      100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
    }

    .v-sub {
      font-size: 0.72rem; color: var(--slate-500); margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .v-metric { text-align: right; flex-shrink: 0; }
    .v-speed-value {
      font-size: 1.1rem; font-weight: 700;
      color: var(--navy-900);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .v-speed-unit {
      font-size: 0.65rem; color: var(--slate-400);
      font-weight: 600; margin-top: 2px;
    }
    .v-status-label {
      display: inline-block; font-size: 0.64rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-top: 4px; padding: 1px 6px; border-radius: 4px;
    }
    .v-status-label.on { background: #dcfce7; color: #15803d; }
    .v-status-label.idle { background: #fef3c7; color: #92400e; }
    .v-status-label.off { background: var(--slate-100); color: var(--slate-500); }
    .v-status-label.over { background: #fee2e2; color: #991b1b; }

    .v-address {
      font-size: 0.74rem; color: var(--slate-600);
      margin-top: 8px; padding-top: 8px;
      border-top: 1px dashed var(--slate-200);
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .v-address i { color: var(--slate-400); font-size: 0.75rem; flex-shrink: 0; }

    .v-actions {
      display: flex; gap: 6px; margin-top: 10px;
    }
    .v-action {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 4px;
      padding: 6px 8px;
      background: var(--slate-50);
      border: 1px solid var(--slate-200);
      border-radius: 7px;
      color: var(--slate-700);
      font-size: 0.72rem; font-weight: 600;
      cursor: pointer;
      transition: all 0.12s;
    }
    .v-action:hover { background: var(--navy-700); color: #fff; border-color: var(--navy-700); }
    .v-action.action-cam:hover { background: var(--red-600); border-color: var(--red-600); }
    .v-action.action-share:hover { background: var(--navy-500); border-color: var(--navy-500); }
    .v-action i { font-size: 0.85rem; }

    /* ==================== SHARE TOKENS SECTION ==================== */
    .tokens-section {
      border-top: 1px solid var(--slate-200);
      padding: 14px 16px;
      background: var(--slate-50);
    }
    .tokens-section .section-title {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .tokens-section h6 {
      margin: 0; font-size: 0.85rem; font-weight: 700;
      color: var(--navy-900);
      display: flex; align-items: center; gap: 6px;
    }

    .token-card {
      background: #fff;
      border: 1px solid var(--slate-200);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .token-card:hover { border-color: var(--slate-300); }
    .token-card.expired { opacity: 0.5; }
    .token-card.has-camera { border-left: 3px solid var(--red-600); }

    .token-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-bottom: 4px;
    }
    .token-vehicle {
      font-size: 0.85rem; font-weight: 700; color: var(--navy-900);
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .token-status {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.04em;
      padding: 2px 7px; border-radius: 4px;
      flex-shrink: 0; text-transform: uppercase;
    }
    .token-status.active { background: #dcfce7; color: #15803d; }
    .token-status.expired { background: var(--slate-100); color: var(--slate-500); }

    .token-meta { font-size: 0.7rem; color: var(--slate-500); line-height: 1.5; }
    .token-id-mono { font-family: 'Courier New', monospace; color: var(--slate-600); }

    .token-actions {
      display: flex; gap: 4px; margin-top: 8px;
    }
    .token-btn {
      flex: 1;
      padding: 4px 6px;
      background: transparent;
      border: 1px solid var(--slate-200);
      border-radius: 6px;
      font-size: 0.7rem; font-weight: 600;
      color: var(--slate-600);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 3px;
      transition: all 0.12s;
    }
    .token-btn:hover { background: var(--slate-100); color: var(--navy-900); }
    .token-btn.btn-cam-on { color: var(--red-600); border-color: var(--red-50); background: var(--red-50); }
    .token-btn.btn-cam-on:hover { background: var(--red-600); color: #fff; border-color: var(--red-600); }
    .token-btn.btn-revoke:hover { background: var(--red-600); color: #fff; border-color: var(--red-600); }

    /* ==================== MAP ==================== */
    .map-container { position: relative; background: var(--slate-100); }
    #map { width: 100%; height: 100%; min-height: 400px; }

    .map-controls {
      position: absolute; top: 16px; right: 16px; z-index: 999;
      display: flex; gap: 6px;
      background: rgba(255,255,255,0.96);
      padding: 6px;
      border-radius: 12px;
      box-shadow: 0 2px 14px rgba(15,40,71,0.1), 0 1px 3px rgba(15,40,71,0.06);
      border: 1px solid var(--slate-200);
      backdrop-filter: blur(6px);
    }
    .map-ctrl-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px;
      background: transparent;
      border: none;
      border-radius: 7px;
      font-size: 0.78rem; font-weight: 600;
      color: var(--slate-700);
      cursor: pointer;
      transition: all 0.12s;
    }
    .map-ctrl-btn:hover { background: var(--slate-100); color: var(--navy-900); }
    .map-ctrl-btn.active-toggle { background: var(--green-600); color: #fff; }
    .map-ctrl-btn i { font-size: 0.9rem; }

    .live-indicator {
      position: absolute; bottom: 16px; left: 16px; z-index: 999;
      background: rgba(15,40,71,0.92);
      color: #fff;
      padding: 7px 14px;
      border-radius: 100px;
      font-size: 0.74rem; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 14px rgba(15,40,71,0.25);
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--red-500);
      animation: pulseRed 1.5s infinite;
    }
    @keyframes pulseRed {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ==================== MODAL OVERRIDES ==================== */
    .modal-content.pro-modal {
      border: none;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(15,40,71,0.2);
    }
    .pro-modal .modal-header {
      background: linear-gradient(135deg, var(--navy-700) 0%, var(--navy-900) 100%);
      color: #fff;
      padding: 18px 22px;
      border: none;
    }
    .pro-modal .modal-header h6 {
      margin: 0; font-weight: 700; font-size: 1rem;
      display: flex; align-items: center; gap: 8px;
    }
    .pro-modal .modal-header .btn-close {
      filter: invert(1); opacity: 0.8;
    }
    .pro-modal .modal-body { padding: 22px; }

    .field-label {
      display: block; font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--slate-600); margin-bottom: 6px;
    }

    .segmented-group {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
    }
    .segmented-btn {
      padding: 8px 0;
      background: var(--slate-50);
      border: 1px solid var(--slate-200);
      border-radius: 7px;
      font-size: 0.8rem; font-weight: 600;
      color: var(--slate-600);
      cursor: pointer;
      transition: all 0.12s;
    }
    .segmented-btn:hover { background: var(--slate-100); }
    .segmented-btn.active {
      background: var(--navy-700); color: #fff; border-color: var(--navy-700);
    }

    .camera-toggle-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      background: var(--red-50);
      border: 1px solid #fecaca;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .camera-toggle-card:hover { border-color: var(--red-500); }
    .camera-toggle-card input { margin: 0; width: 18px; height: 18px; flex-shrink: 0; accent-color: var(--red-600); }
    .camera-toggle-card .toggle-content { flex: 1; }
    .camera-toggle-card .toggle-label {
      font-size: 0.88rem; font-weight: 700; color: var(--red-700);
      display: flex; align-items: center; gap: 6px;
    }
    .camera-toggle-card .toggle-desc {
      font-size: 0.72rem; color: var(--slate-600); margin-top: 2px;
    }

    .share-result {
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      border: 1px solid #86efac;
      border-radius: 10px;
      padding: 14px;
      margin-top: 16px;
    }
    .share-result-label {
      font-size: 0.72rem; font-weight: 700; color: #15803d;
      text-transform: uppercase; letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
    }
    .share-result input {
      background: #fff; border: 1px solid #86efac; font-size: 0.8rem;
      font-family: 'Courier New', monospace;
    }

    .empty-state {
      text-align: center; padding: 40px 16px;
      color: var(--slate-400);
    }
    .empty-state i { font-size: 2.5rem; margin-bottom: 8px; display: block; opacity: 0.4; }
    .empty-state p { font-size: 0.85rem; margin: 0; }
  </style>
</head>
<body>

  <!-- ==================== NAVBAR ==================== -->
  <nav class="navbar navbar-dark bg-modern-primary no-print sticky-top">
    <div class="container-fluid px-3 px-md-4 py-1">
      <a class="navbar-brand mb-0 h1 d-flex align-items-center gap-2" href="../">
        <img id="navbar-logo" src="" alt="" style="height:36px; display:none;" class="bg-white rounded-circle p-1 shadow-sm">
        <i class="bi bi-grid-fill fs-5" id="navbar-icon"></i>
        <span class="d-none d-sm-inline fw-semibold" style="font-size:1rem;">PT-System</span>
      </a>
      <div class="d-flex align-items-center gap-2 gap-md-3">
        <div class="d-none d-lg-flex align-items-center text-light bg-white bg-opacity-10 px-3 py-1 rounded-pill">
          <i class="bi bi-person-circle me-2"></i>
          <span id="nav-user-display" class="small fw-medium"></span>
        </div>
        <button class="btn btn-warning btn-sm fw-semibold rounded-pill px-2 px-md-3 shadow-sm" id="btn-admin-settings" style="display:none;" onclick="sessionStorage.setItem('pt_admin_return', location.href); window.location.href='../admin.html'">
          <i class="bi bi-gear-fill"></i><span class="d-none d-md-inline ms-1">Admin</span>
        </button>
        <button class="btn btn-sm rounded-pill px-2 px-md-3 fw-semibold shadow-sm" id="btn-monitor" style="display:none; background:#17a2b8; color:#fff; border:none;" onclick="window.location.href='../monitor/'" title="Monitor Dashboard">
          <i class="bi bi-display"></i><span class="d-none d-md-inline ms-1">Monitor</span>
