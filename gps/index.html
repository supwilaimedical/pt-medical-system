<!DOCTYPE html>
<html lang="th">
<head>
  <title>PT-System | GPS Tracking</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="PT Medical System — ระบบติดตามตำแหน่งรถ GPS">
  <meta name="theme-color" content="#1e3a5f">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../assets/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="../shared/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    .gps-layout { display: grid; grid-template-columns: 340px 1fr; height: calc(100vh - 56px); overflow: hidden; }
    @media (max-width: 768px) { .gps-layout { grid-template-columns: 1fr; height: auto; } }

    .vehicle-panel { background: #f8f9fa; border-right: 1px solid #e2e8f0; overflow-y: auto; padding: 12px; }
    .vehicle-panel .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }

    .v-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s;
      border-left: 4px solid #94a3b8;
    }
    .v-card:hover { border-color: #3b82f6; box-shadow: 0 2px 8px rgba(59,130,246,0.15); }
    .v-card.active { border-color: #2563eb; background: #eff6ff; }
    .v-card.online { border-left-color: #22c55e; }
    .v-card.offline { border-left-color: #ef4444; }
    .v-card .v-name { font-weight: 700; font-size: 0.95rem; color: #1e293b; }
    .v-card .v-sub { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
    .v-card .v-speed { font-size: 1.1rem; font-weight: 700; color: #f59e0b; }
    .v-card .v-status { font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
    .v-card .v-status.on { background: #dcfce7; color: #16a34a; }
    .v-card .v-status.off { background: #fee2e2; color: #dc2626; }
    .v-card .v-actions { display: flex; gap: 4px; margin-top: 6px; }
    .v-card .v-addr { font-size: 0.72rem; color: #94a3b8; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .btn-cam { background: #f59e0b; color: #fff; border: none; padding: 3px 8px; border-radius: 6px; font-size: 0.72rem; font-weight: 600; }
    .btn-cam:hover { background: #d97706; color: #fff; }
    .btn-hls { background: #8b5cf6; color: #fff; border: none; padding: 3px 8px; border-radius: 6px; font-size: 0.72rem; font-weight: 600; }
    .btn-hls:hover { background: #7c3aed; color: #fff; }
    .btn-share { background: #06b6d4; color: #fff; border: none; padding: 3px 8px; border-radius: 6px; font-size: 0.72rem; font-weight: 600; }
    .btn-share:hover { background: #0891b2; color: #fff; }

    .map-container { position: relative; }
    #map { width: 100%; height: 100%; min-height: 400px; }

    .map-controls {
      position: absolute; top: 12px; right: 12px; z-index: 999;
      display: flex; gap: 6px;
    }
    .map-controls .btn { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 6px 12px; font-size: 0.8rem; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .map-controls .btn.active-toggle { background: #22c55e; color: #fff; border-color: #22c55e; }

    .refresh-indicator {
      position: absolute; bottom: 12px; left: 12px; z-index: 999;
      background: rgba(0,0,0,0.7); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.72rem;
    }

    /* Share Token Modal */
    .token-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.8rem; }
    .token-row:last-child { border-bottom: none; }
  </style>
</head>
<body>

  <!-- ==================== NAVBAR ==================== -->
  <nav class="navbar navbar-dark bg-modern-primary no-print sticky-top">
    <div class="container-fluid px-3 px-md-4 py-1">
      <a class="navbar-brand mb-0 h1 d-flex align-items-center gap-2" href="../">
        <img id="navbar-logo" src="" alt="" style="height:36px; display:none;" class="bg-white rounded-circle p-1 shadow-sm">
        <i class="bi bi-grid-fill fs-5" id="navbar-icon"></i>
        <span class="d-none d-sm-inline fw-semibold" style="font-size:1rem;">PT-System</span>
      </a>
      <div class="d-flex align-items-center gap-2 gap-md-3">
        <div class="d-none d-lg-flex align-items-center text-light bg-white bg-opacity-10 px-3 py-1 rounded-pill">
          <i class="bi bi-person-circle me-2"></i>
          <span id="nav-user-display" class="small fw-medium"></span>
        </div>
        <button class="btn btn-warning btn-sm fw-semibold rounded-pill px-2 px-md-3 shadow-sm" id="btn-admin-settings" style="display:none;" onclick="sessionStorage.setItem('pt_open_admin','1'); window.location.href='../'">
          <i class="bi bi-gear-fill"></i><span class="d-none d-md-inline ms-1">Admin</span>
        </button>
        <button class="btn btn-sm rounded-pill px-2 px-md-3 fw-semibold shadow-sm" id="btn-monitor" style="display:none; background:#17a2b8; color:#fff; border:none;" onclick="window.location.href='../monitor/'" title="Monitor Dashboard">
          <i class="bi bi-display"></i><span class="d-none d-md-inline ms-1">Monitor</span>
        </button>
        <div class="btn-group system-toggle" role="group" id="nav-system-toggle">
          <button type="button" class="btn btn-sm rounded-pill-start sys-tog" id="sys-tog-transport" onclick="window.location.href='../transport/'" title="Patient Transport" style="min-width:40px;">
            <i class="bi bi-truck-front-fill"></i><span class="d-none d-lg-inline ms-1">Transport</span>
          </button>
          <button type="button" class="btn btn-sm sys-tog" id="sys-tog-firstaid" onclick="window.location.href='../firstaid/'" title="First Aid" style="min-width:40px;">
            <i class="bi bi-bandaid-fill"></i><span class="d-none d-lg-inline ms-1">First Aid</span>
          </button>
          <button type="button" class="btn btn-sm sys-tog" id="sys-tog-location" onclick="window.location.href='../location/'" title="PT Location" style="min-width:40px;">
            <i class="bi bi-geo-alt-fill"></i><span class="d-none d-lg-inline ms-1">Location</span>
          </button>
          <button type="button" class="btn btn-sm rounded-pill-end sys-tog active" id="sys-tog-gps" title="GPS Tracking" style="min-width:40px;">
            <i class="bi bi-broadcast"></i><span class="d-none d-lg-inline ms-1">GPS</span>
          </button>
        </div>
        <button class="btn btn-outline-light btn-sm border-0 rounded-circle" onclick="handleLogout()" title="ออกจากระบบ" style="width:36px; height:36px;">
          <i class="bi bi-box-arrow-right fs-5"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- ==================== MAIN LAYOUT ==================== -->
  <div class="gps-layout">

    <!-- Left: Vehicle List -->
    <div class="vehicle-panel" id="vehiclePanel">
      <div class="panel-header">
        <h6 class="fw-bold mb-0"><i class="bi bi-truck me-1 text-primary"></i> Vehicles <span class="badge bg-primary rounded-pill" id="vehicle-count">0</span></h6>
        <button class="btn btn-sm btn-outline-primary" onclick="manualRefresh()" title="Refresh">
          <i class="bi bi-arrow-clockwise"></i>
        </button>
      </div>
      <div id="vehicleList">
        <div class="text-center py-5 text-muted">
          <div class="spinner-border spinner-border-sm"></div>
          <div class="small mt-2">กำลังโหลด...</div>
        </div>
      </div>

      <!-- Share Token Manager (Admin) -->
      <div id="tokenManagerSection" style="display:none;" class="mt-3 pt-3 border-top">
        <h6 class="fw-bold mb-2"><i class="bi bi-share me-1 text-info"></i> Shared Links</h6>
        <div id="tokenList"></div>
      </div>
    </div>

    <!-- Right: Map -->
    <div class="map-container">
      <div id="map"></div>
      <div class="map-controls">
        <button class="btn" onclick="manualRefresh()" title="Refresh ตำแหน่ง"><i class="bi bi-arrow-clockwise me-1"></i> Refresh</button>
        <button class="btn" onclick="fitAllMarkers()" title="แสดงทุกคัน"><i class="bi bi-arrows-fullscreen me-1"></i> ทั้งหมด</button>
        <button class="btn" id="btnAutoRefresh" onclick="toggleAutoRefresh()" title="Auto refresh ทุก 5 วินาที">
          <i class="bi bi-arrow-repeat me-1"></i> Auto: <span id="autoLabel">OFF</span>
        </button>
      </div>
      <div class="refresh-indicator" id="refreshIndicator" style="display:none;">
        <i class="bi bi-arrow-repeat me-1"></i> <span id="refreshText">Updating...</span>
      </div>
    </div>

  </div>

  <!-- ==================== SHARE TOKEN MODAL ==================== -->
  <div class="modal fade" id="shareModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content border-0 shadow rounded-4">
        <div class="modal-header border-0">
          <h6 class="modal-title fw-bold"><i class="bi bi-share me-2 text-info"></i>สร้างลิงก์แชร์ GPS</h6>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="share-device-id">
          <input type="hidden" id="share-provider-id">
          <div class="mb-3">
            <label class="form-label small fw-medium">รถ</label>
            <input type="text" id="share-vehicle-name" class="form-control" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-medium">ระยะเวลา</label>
            <select id="share-hours" class="form-select">
              <option value="1">1 ชั่วโมง</option>
              <option value="3">3 ชั่วโมง</option>
              <option value="6" selected>6 ชั่วโมง</option>
              <option value="12">12 ชั่วโมง</option>
              <option value="24">24 ชั่วโมง</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-medium">เหตุผล</label>
            <input type="text" id="share-reason" class="form-control" placeholder="เช่น แชร์ให้ญาติผู้ป่วยติดตาม">
          </div>
          <div class="mb-3 p-2 rounded-3" style="background:#fff7ed; border:1px solid #fed7aa;">
            <div class="form-check mb-0">
              <input class="form-check-input" type="checkbox" id="share-allow-camera">
              <label class="form-check-label small fw-medium" for="share-allow-camera">
                <i class="bi bi-camera-video me-1 text-warning"></i>อนุญาตให้เปิดกล้องได้
              </label>
            </div>
            <div class="text-muted mt-1" style="font-size:0.7rem;">
              <i class="bi bi-info-circle me-1"></i>ผู้ที่มีลิงก์จะเปิดดูกล้องภายในรถได้ตลอดอายุลิงก์
            </div>
          </div>
          <div id="share-result" style="display:none;" class="alert alert-success">
            <div class="fw-bold mb-1">สร้างลิงก์สำเร็จ!</div>
            <input type="text" id="share-url" class="form-control form-control-sm mb-2" readonly>
            <button class="btn btn-sm btn-primary" onclick="copyShareUrl()"><i class="bi bi-clipboard me-1"></i> Copy</button>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">ปิด</button>
          <button class="btn btn-info btn-sm text-white" id="btnCreateShare" onclick="createShareToken()">
            <i class="bi bi-link-45deg me-1"></i> สร้างลิงก์
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== JAVASCRIPT ==================== -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../shared/config.js"></script>
  <script src="../shared/auth.js"></script>
  <script src="../shared/gps-providers.js"></script>
  <script>
    // =============================================
    // SUPABASE INIT
    // =============================================
    // _supabase already created in auth.js

    // =============================================
    // STATE
    // =============================================
    var _providers = [];
    var _vehicles = [];     // from Supabase gps_vehicles
    var _statuses = {};     // deviceId_providerId -> status object
    var _markers = {};      // key -> L.marker
    var _autoInterval = null;
    var _selectedKey = null; // "deviceId_providerId"
    var _isAdmin = false;

    // =============================================
    // MAP INIT
    // =============================================
    var map = L.map('map').setView([15.87, 100.99], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; CartoDB', maxZoom: 19
    }).addTo(map);

    // =============================================
    // INIT
    // =============================================
    async function init() {
      requireAuth();
      var meta = getUserMeta();
      if (meta) {
        document.getElementById('nav-user-display').textContent = (meta.full_name || meta.name || '');
        _isAdmin = (meta.role === 'Admin' || meta.role === 'admin');
        if (_isAdmin) {
          document.getElementById('btn-admin-settings').style.display = '';
          document.getElementById('btn-monitor').style.display = '';
          document.getElementById('tokenManagerSection').style.display = '';
        }
      }

      // Load logo
      try {
        var res = await _supabase.from('settings').select('*');
        (res.data || []).forEach(function(s) {
          if (s.key === 'APP_LOGO_URL' && s.value) {
            var logo = document.getElementById('navbar-logo');
            if (logo) { logo.src = s.value; logo.style.display = ''; }
            document.getElementById('navbar-icon').style.display = 'none';
          }
        });
      } catch(e) {}

      // Load providers + vehicles
      await loadData();

      // Initial status fetch
      await fetchAllStatuses();

      // Auto refresh ON by default
      toggleAutoRefresh();

      // Load shared tokens
      if (_isAdmin) loadSharedTokens();
    }

    async function loadData() {
      try {
        var pRes = await _supabase.from('gps_providers').select('*').eq('is_active', true);
        _providers = pRes.data || [];

        var vRes = await _supabase.from('gps_vehicles').select('*, gps_providers(name, software, base_url, account, password)')
          .eq('is_active', true).order('provider').order('nickname');
        _vehicles = vRes.data || [];

        document.getElementById('vehicle-count').textContent = _vehicles.length;
      } catch(e) { console.error('loadData:', e); }
    }

    // =============================================
    // FETCH GPS STATUS
    // =============================================
    async function fetchAllStatuses() {
      var indicator = document.getElementById('refreshIndicator');
      indicator.style.display = '';
      document.getElementById('refreshText').textContent = 'Updating...';

      for (var i = 0; i < _providers.length; i++) {
        var p = _providers[i];
        try {
          var statuses = await gpsGetStatus(p);
          statuses.forEach(function(s) {
            _statuses[s.deviceId + '_' + p.id] = s;
          });
        } catch(e) {
          console.warn('Status fetch failed for', p.name, e.message);
        }
      }

      renderVehicleList();
      updateMapMarkers();

      var now = new Date().toLocaleTimeString('th-TH');
      document.getElementById('refreshText').textContent = 'Updated ' + now;
      setTimeout(function() { indicator.style.display = 'none'; }, 2000);
    }

    function manualRefresh() {
      fetchAllStatuses();
    }

    // =============================================
    // AUTO REFRESH
    // =============================================
    function toggleAutoRefresh() {
      var btn = document.getElementById('btnAutoRefresh');
      var label = document.getElementById('autoLabel');
      if (_autoInterval) {
        clearInterval(_autoInterval);
        _autoInterval = null;
        label.textContent = 'OFF';
        btn.classList.remove('active-toggle');
      } else {
        _autoInterval = setInterval(fetchAllStatuses, 10000);
        label.textContent = 'ON';
        btn.classList.add('active-toggle');
      }
    }

    // =============================================
    // RENDER VEHICLE LIST
    // =============================================
    function renderVehicleList() {
      var el = document.getElementById('vehicleList');
      if (_vehicles.length === 0) {
        el.innerHTML = '<div class="text-center py-4 text-muted small">ไม่พบรถ — ตรวจสอบ Admin GPS Settings</div>';
        return;
      }

      var html = '';
      _vehicles.forEach(function(v) {
        var key = v.device_id + '_' + v.provider;
        var s = _statuses[key];
        var online = s ? s.online : false;
        var speed = s ? s.speed.toFixed(1) : '--';
        var addr = s ? s.address : '--';
        var provName = v.gps_providers ? v.gps_providers.name : '';
        var displayName = v.nickname || v.device_name || v.device_id;

        html += '<div class="v-card ' + (online ? 'online' : 'offline') + (_selectedKey === key ? ' active' : '') + '" onclick="focusVehicle(\'' + key + '\')">' +
          '<div class="d-flex justify-content-between align-items-start">' +
            '<div>' +
              '<div class="v-name">' + esc(displayName) + '</div>' +
              '<div class="v-sub">' + esc(v.device_name || '') + ' &bull; ' + esc(provName) + '</div>' +
            '</div>' +
            '<div class="text-end">' +
              '<span class="v-status ' + (online ? 'on' : 'off') + '">' + (online ? 'ONLINE' : 'OFFLINE') + '</span><br>' +
              '<span class="v-speed">' + speed + ' km/h</span>' +
            '</div>' +
          '</div>' +
          '<div class="v-addr">' + esc(addr) + '</div>' +
          '<div class="v-actions">' +
            '<button class="btn-cam" onclick="event.stopPropagation(); openCamera(\'' + v.provider + '\',\'' + v.device_id + '\')"><i class="bi bi-camera-video-fill me-1"></i>Camera</button>' +
            '<button class="btn-hls" onclick="event.stopPropagation(); openHLS(\'' + v.provider + '\',\'' + v.device_id + '\')"><i class="bi bi-play-circle-fill me-1"></i>HLS</button>' +
            (_isAdmin ? '<button class="btn-share" onclick="event.stopPropagation(); showShareModal(\'' + v.provider + '\',\'' + v.device_id + '\',\'' + esc(displayName) + '\')"><i class="bi bi-share-fill me-1"></i>Share</button>' : '') +
          '</div>' +
        '</div>';
      });
      el.innerHTML = html;
    }

    // =============================================
    // MAP MARKERS
    // =============================================
    function updateMapMarkers() {
      var bounds = [];

      _vehicles.forEach(function(v) {
        var key = v.device_id + '_' + v.provider;
        var s = _statuses[key];
        if (!s || (!s.lat && !s.lng) || (s.lat === 0 && s.lng === 0)) return;

        var displayName = v.nickname || v.device_name || v.device_id;
        var online = s.online;
        var speed = s.speed;

        var popupHtml = '<div style="min-width:200px;">' +
          '<b>' + esc(displayName) + '</b><br>' +
          '<span style="font-size:0.8rem;color:#666;">Device: ' + esc(v.device_id) + '</span><br>' +
          '<span style="font-size:0.85rem;">Speed: <b>' + speed.toFixed(1) + ' km/h</b></span><br>' +
          '<span style="font-size:0.85rem;">Status: ' + (online ? '<span style="color:green;">Online</span>' : '<span style="color:red;">Offline</span>') + '</span><br>' +
          '<span style="font-size:0.8rem;color:#888;">' + esc(s.address) + '</span><br>' +
          '<span style="font-size:0.75rem;color:#aaa;">GPS: ' + esc(s.gpsTime) + '</span><br>' +
          '<div style="margin-top:6px;">' +
            '<button onclick="openCamera(\'' + v.provider + '\',\'' + v.device_id + '\')" style="padding:3px 8px;border:none;background:#f59e0b;color:#fff;border-radius:4px;font-size:0.75rem;cursor:pointer;margin-right:4px;">Camera</button>' +
            '<button onclick="openHLS(\'' + v.provider + '\',\'' + v.device_id + '\')" style="padding:3px 8px;border:none;background:#8b5cf6;color:#fff;border-radius:4px;font-size:0.75rem;cursor:pointer;">HLS</button>' +
          '</div></div>';

        if (_markers[key]) {
          _markers[key].setLatLng([s.lat, s.lng]);
          _markers[key].setPopupContent(popupHtml);
          _markers[key].setIcon(makeIcon(online, speed));
        } else {
          _markers[key] = L.marker([s.lat, s.lng], { icon: makeIcon(online, speed) })
            .addTo(map).bindPopup(popupHtml);
        }
        bounds.push([s.lat, s.lng]);
      });

      if (bounds.length > 0 && !_selectedKey) {
        map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
      }
    }

    function makeIcon(online, speed) {
      var color = !online ? '#ef4444' : speed > 1 ? '#22c55e' : '#f59e0b';
      return L.divIcon({
        className: '',
        html: '<div style="width:34px;height:34px;background:' + color + ';border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 8px rgba(0,0,0,0.3);">&#x1F691;</div>',
        iconSize: [34, 34], iconAnchor: [17, 17], popupAnchor: [0, -20]
      });
    }

    function fitAllMarkers() {
      _selectedKey = null;
      var bounds = [];
      Object.keys(_markers).forEach(function(k) { bounds.push(_markers[k].getLatLng()); });
      if (bounds.length > 0) map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
    }

    // =============================================
    // FOCUS VEHICLE
    // =============================================
    function focusVehicle(key) {
      _selectedKey = key;
      var m = _markers[key];
      if (m) {
        map.setView(m.getLatLng(), 16);
        m.openPopup();
      }
      // highlight card
      document.querySelectorAll('.v-card').forEach(function(c) { c.classList.remove('active'); });
      // find index
      var idx = _vehicles.findIndex(function(v) { return v.device_id + '_' + v.provider === key; });
      var cards = document.querySelectorAll('.v-card');
      if (cards[idx]) cards[idx].classList.add('active');
    }

    // =============================================
    // CAMERA
    // =============================================
    function getProviderObj(providerId) {
      // ดึงจาก vehicle join data หรือ _providers
      var v = _vehicles.find(function(x) { return x.provider === providerId; });
      if (v && v.gps_providers) return v.gps_providers;
      return _providers.find(function(p) { return p.id === providerId; });
    }

    function openCamera(providerId, deviceId) {
      var p = getProviderObj(providerId);
      if (!p) return;
      var url = gpsGetCameraUrl(p, deviceId);
      if (url) window.open(url, 'gps_camera_' + deviceId, 'width=1100,height=850,menubar=no,toolbar=no');
    }

    function openHLS(providerId, deviceId) {
      var p = getProviderObj(providerId);
      if (!p) return;
      var adapter = getGpsAdapter(p.software);
      if (adapter && adapter.getHlsUrl) {
        var url = adapter.getHlsUrl(p, deviceId);
        window.open(url, 'gps_hls_' + deviceId, 'width=900,height=600,menubar=no,toolbar=no');
      }
    }

    // =============================================
    // SHARE TOKENS
    // =============================================
    function showShareModal(providerId, deviceId, vehicleName) {
      document.getElementById('share-device-id').value = deviceId;
      document.getElementById('share-provider-id').value = providerId;
      document.getElementById('share-vehicle-name').value = vehicleName;
      document.getElementById('share-result').style.display = 'none';
      document.getElementById('share-reason').value = '';
      document.getElementById('share-allow-camera').checked = false;
      document.getElementById('btnCreateShare').disabled = false;
      new bootstrap.Modal(document.getElementById('shareModal')).show();
    }

    async function createShareToken() {
      var deviceId = document.getElementById('share-device-id').value;
      var providerId = document.getElementById('share-provider-id').value;
      var hours = parseInt(document.getElementById('share-hours').value);
      var reason = document.getElementById('share-reason').value.trim();

      if (!reason) { Swal.fire('กรุณาระบุเหตุผล', '', 'warning'); return; }

      document.getElementById('btnCreateShare').disabled = true;

      try {
        var token = 'TK-' + crypto.randomUUID().substring(0, 8).toUpperCase();
        var expiresAt = new Date(Date.now() + hours * 60 * 60 * 1000).toISOString();
        var allowCamera = document.getElementById('share-allow-camera').checked;

        await _supabase.from('gps_shared_tokens').insert({
          token: token, device_id: deviceId, provider: providerId,
          expires_at: expiresAt, created_by: getUserName(), reason: reason,
          allow_camera: allowCamera
        });

        var shareUrl = window.location.origin + CONFIG.BASE_URL + '/gps/share.html?token=' + token;
        document.getElementById('share-url').value = shareUrl;
        document.getElementById('share-result').style.display = '';

        await _supabase.from('activity_log').insert({
          username: getUserName(), role: getUserRole(),
          action: 'GPS_SHARE_CREATE',
          target: deviceId, details: 'Token: ' + token + ', Hours: ' + hours + ', Reason: ' + reason + (allowCamera ? ', Camera: ON' : '')
        });

        loadSharedTokens();
      } catch(e) {
        Swal.fire('Error', e.message, 'error');
        document.getElementById('btnCreateShare').disabled = false;
      }
    }

    function copyShareUrl() {
      var input = document.getElementById('share-url');
      input.select();
      navigator.clipboard.writeText(input.value).then(function() {
        Swal.fire({ icon: 'success', title: 'Copied!', timer: 1000, showConfirmButton: false });
      });
    }

    // Cache device_id → vehicle name (nickname || device_name || device_id)
    var _vehicleNameCache = {};
    async function loadVehicleNameCache() {
      try {
        var res = await _supabase.from('gps_vehicles').select('device_id, nickname, device_name');
        (res.data || []).forEach(function(v) {
          _vehicleNameCache[v.device_id] = v.nickname || v.device_name || v.device_id;
        });
      } catch(e) { console.warn('vehicle name cache:', e.message); }
    }

    function vehicleNameFor(deviceId) {
      return _vehicleNameCache[deviceId] || deviceId;
    }

    async function loadSharedTokens() {
      try {
        if (Object.keys(_vehicleNameCache).length === 0) await loadVehicleNameCache();
        var res = await _supabase.from('gps_shared_tokens').select('*')
          .order('created_at', { ascending: false }).limit(20);
        var tokens = res.data || [];
        var el = document.getElementById('tokenList');
        if (tokens.length === 0) {
          el.innerHTML = '<div class="text-muted small">ไม่มี shared links</div>';
          return;
        }
        var now = new Date();
        var html = '';
        tokens.forEach(function(t) {
          var expired = new Date(t.expires_at) < now;
          var status = t.status === 'Active' && !expired ? 'Active' : 'Expired';
          var isActive = status === 'Active';
          var vName = vehicleNameFor(t.device_id);
          var camBadge = t.allow_camera
            ? '<span class="badge bg-warning text-dark ms-1" style="font-size:0.6rem;"><i class="bi bi-camera-video-fill me-1"></i>กล้อง</span>'
            : '';
          html += '<div class="token-row">' +
            '<div style="flex:1; min-width:0;">' +
              '<div class="fw-medium text-truncate"><i class="bi bi-truck text-primary me-1"></i>' + esc(vName) + camBadge + '</div>' +
              '<div class="text-muted text-truncate" style="font-size:0.7rem;">' + esc(t.token) + ' &bull; ' + esc(t.reason || '-') + '</div>' +
              '<div class="text-muted text-truncate" style="font-size:0.66rem;">โดย ' + esc(t.created_by || '-') + ' &bull; หมดอายุ ' + new Date(t.expires_at).toLocaleString('th-TH', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) + '</div>' +
            '</div>' +
            '<div class="text-end ms-2" style="flex-shrink:0;">' +
              '<span class="badge ' + (isActive ? 'bg-success' : 'bg-secondary') + '">' + status + '</span>' +
              (isActive
                ? '<div class="btn-group btn-group-sm mt-1" style="display:flex;">' +
                    '<button class="btn btn-outline-primary py-0 px-1" style="font-size:0.65rem;" onclick="copyTokenLink(\'' + esc(t.token) + '\')" title="Copy link"><i class="bi bi-clipboard"></i></button>' +
                    '<button class="btn btn-outline-' + (t.allow_camera ? 'warning' : 'secondary') + ' py-0 px-1" style="font-size:0.65rem;" onclick="toggleTokenCamera(\'' + t.id + '\',' + (t.allow_camera ? 'false' : 'true') + ')" title="' + (t.allow_camera ? 'ปิดกล้อง' : 'เปิดกล้อง') + '"><i class="bi bi-camera-video' + (t.allow_camera ? '-fill' : '-off') + '"></i></button>' +
                    '<button class="btn btn-outline-danger py-0 px-1" style="font-size:0.65rem;" onclick="revokeToken(\'' + t.id + '\')" title="Revoke"><i class="bi bi-x-lg"></i></button>' +
                  '</div>'
                : '') +
            '</div></div>';
        });
        el.innerHTML = html;
      } catch(e) { console.error(e); }
    }

    function copyTokenLink(token) {
      var url = window.location.origin + CONFIG.BASE_URL + '/gps/share.html?token=' + token;
      navigator.clipboard.writeText(url).then(function() {
        Swal.fire({ icon: 'success', title: 'Copied!', text: url, timer: 1500, showConfirmButton: false });
      }).catch(function() {
        Swal.fire({ icon: 'info', title: 'Share URL', html: '<code style="font-size:0.8rem; word-break:break-all;">' + url + '</code>' });
      });
    }

    async function toggleTokenCamera(id, newValue) {
      try {
        await _supabase.from('gps_shared_tokens').update({ allow_camera: newValue }).eq('id', id);
        await _supabase.from('activity_log').insert({
          username: getUserName(), role: getUserRole(),
          action: 'GPS_SHARE_TOGGLE_CAM',
          target: id, details: 'Camera: ' + (newValue ? 'ON' : 'OFF')
        });
        Swal.fire({ icon: 'success', title: newValue ? 'เปิดกล้องแล้ว' : 'ปิดกล้องแล้ว', timer: 1000, showConfirmButton: false });
        loadSharedTokens();
      } catch(e) { Swal.fire('Error', e.message, 'error'); }
    }

    async function revokeToken(id) {
      try {
        await _supabase.from('gps_shared_tokens').update({ status: 'Revoked' }).eq('id', id);
        loadSharedTokens();
      } catch(e) { console.error(e); }
    }

    // =============================================
    // HELPERS
    // =============================================
    function esc(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // =============================================
    // START
    // =============================================
    document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
</html>
