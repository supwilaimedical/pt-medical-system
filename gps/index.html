  <!-- ==================== JAVASCRIPT ==================== -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../shared/config.js"></script>
  <script src="../shared/settings.js"></script>
  <script src="../shared/auth.js"></script>
  <script src="../shared/gps-providers.js"></script>
  <script src="../shared/map-config.js"></script>
  <script src="../shared/places-api.js"></script>
  <script>
    // =============================================
    // SUPABASE INIT
    // =============================================
    // _supabase already created in auth.js

    // =============================================
    // STATE
    // =============================================
    var _providers = [];
    var _vehicles = [];     // from Supabase gps_vehicles
    var _statuses = {};     // deviceId_providerId -> status object
    var _markers = {};      // key -> L.marker
    var _autoInterval = null;
    var _selectedKey = null; // "deviceId_providerId"
    var _isAdmin = false;
    var _lastRefreshAt = null; // Date of last successful fetch
    var _lastUpdateTicker = null;
    var OVERSPEED_THRESHOLD = 120; // km/h — flag vehicle as overspeed at/above

    // =============================================
    // MAP INIT
    // =============================================
    // Set maxZoom on map to avoid "Map has no maxZoom specified" errors from
    // any plugin that calls map.getMaxZoom() before the async tile layer
    // attaches (e.g. MarkerCluster). Matches the tile layer's maxZoom.
    var map = L.map('map', { maxZoom: 19 }).setView([15.87, 100.99], 6);
    // Tile layer is attached asynchronously by MapConfig — uses Google Maps
    // (via GoogleMutant plugin) if Admin enabled it and provided API key,
    // otherwise falls back to CartoDB Light tiles.
    MapConfig.load(_supabase).then(function() { return MapConfig.createTileLayer(map); });

    // =============================================
    // INIT
    // =============================================
    async function init() {
      requireAuth();
      var meta = getUserMeta();
      if (meta) {
        document.getElementById('nav-user-display').textContent = (meta.full_name || meta.name || '');
        _isAdmin = (meta.role === 'Admin' || meta.role === 'admin');
        if (_isAdmin) {
          document.getElementById('btn-admin-settings').style.display = '';
          document.getElementById('btn-monitor').style.display = '';
          document.getElementById('tokenManagerSection').style.display = '';
        }
      }

      // Load logo + GPS proxy settings (Synology URL if configured)
      try {
        var res = await _supabase.from('settings').select('*');
        (res.data || []).forEach(function(s) {
          if (s.key === 'APP_LOGO_URL' && s.value) {
            var logo = document.getElementById('navbar-logo');
            if (logo) { logo.src = s.value; logo.style.display = ''; }
            document.getElementById('navbar-icon').style.display = 'none';
          }
          if (s.key === 'GPS_PROXY_SYNOLOGY' && s.value && typeof CONFIG !== 'undefined') {
            CONFIG.GPS_PROXY_SYNOLOGY = String(s.value).trim();
          }
        });
      } catch(e) {}

      // Load providers + vehicles
      await loadData();

      // Initial status fetch
      await fetchAllStatuses();

      // Auto refresh ON by default
      toggleAutoRefresh();

      // Live-tick "last updated" label every second
      if (_lastUpdateTicker) clearInterval(_lastUpdateTicker);
      _lastUpdateTicker = setInterval(updateLastRefreshChip, 1000);

      // Load shared tokens
      if (_isAdmin) loadSharedTokens();
    }

    async function loadData() {
      try {
        var pRes = await _supabase.from('gps_providers').select('*').eq('is_active', true);
        _providers = pRes.data || [];

        var vRes = await _supabase.from('gps_vehicles').select('*, gps_providers(name, software, base_url, account, password)')
          .eq('is_active', true).order('provider').order('nickname');
        _vehicles = vRes.data || [];

        document.getElementById('vehicle-count').textContent = _vehicles.length;
      } catch(e) { console.error('loadData:', e); }
    }

    // =============================================
    // FETCH GPS STATUS
    // =============================================
    async function fetchAllStatuses() {
      var indicator = document.getElementById('refreshIndicator');
      indicator.style.display = '';
      document.getElementById('refreshText').textContent = 'Updating...';

      for (var i = 0; i < _providers.length; i++) {
        var p = _providers[i];
        try {
          var statuses = await gpsGetStatus(p);
          statuses.forEach(function(s) {
            _statuses[s.deviceId + '_' + p.id] = s;
          });
        } catch(e) {
          console.warn('Status fetch failed for', p.name, e.message);
        }
      }

      renderVehicleList();
      updateMapMarkers();
      enrichVehicleAddresses();

      _lastRefreshAt = new Date();
      var now = _lastRefreshAt.toLocaleTimeString('th-TH', { hour12: false });
      document.getElementById('refreshText').textContent = 'Updated ' + now;
      setTimeout(function() { indicator.style.display = 'none'; }, 2000);

      updateLastRefreshChip();
    }

    // Tick relative time every second
    function updateLastRefreshChip() {
      var chip = document.getElementById('lastUpdateChip');
      var txt  = document.getElementById('lastUpdateText');
      if (!chip || !txt) return;

      if (!_lastRefreshAt) {
        txt.textContent = 'รอข้อมูล';
        chip.className = 'last-update-chip';
        return;
      }

      var diffSec = Math.floor((Date.now() - _lastRefreshAt.getTime()) / 1000);
      var timeStr = _lastRefreshAt.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false});

      var label;
      if (diffSec < 5)       label = 'เพิ่งอัปเดต';
      else if (diffSec < 60) label = diffSec + ' วิ';
      else if (diffSec < 3600) label = Math.floor(diffSec/60) + ' นาที';
      else label = timeStr;

      txt.textContent = label;
      chip.title = 'รีเฟรชล่าสุด: ' + timeStr;

      chip.className = 'last-update-chip' +
        (diffSec < 15 ? ' fresh' :
         diffSec > 60 ? ' stale' : '');
    }

    function manualRefresh() {
      fetchAllStatuses();
    }

    // =============================================
    // AUTO REFRESH
    // =============================================
    function toggleAutoRefresh() {
      var btn = document.getElementById('btnAutoRefresh');
      var label = document.getElementById('autoLabel');
      if (_autoInterval) {
        clearInterval(_autoInterval);
        _autoInterval = null;
        label.textContent = 'OFF';
        btn.classList.remove('active-toggle');
      } else {
        _autoInterval = setInterval(fetchAllStatuses, 10000);
        label.textContent = 'ON';
        btn.classList.add('active-toggle');
      }
    }

    // =============================================
    // RENDER VEHICLE LIST
    // =============================================
    // Filter + search state
    var _vehicleFilter = 'all'; // 'all' | 'online' | 'offline'
    var _vehicleSearch = '';

    function setVehicleFilter(f) {
      _vehicleFilter = f;
      document.querySelectorAll('.filter-tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.filter === f);
      });
      renderVehicleList();
    }

    function filterVehicles() {
      _vehicleSearch = (document.getElementById('vehicleSearch').value || '').toLowerCase().trim();
      renderVehicleList();
    }

    function renderVehicleList() {
      var el = document.getElementById('vehicleList');
      if (_vehicles.length === 0) {
        el.innerHTML = '<div class="empty-state"><i class="bi bi-truck"></i><p>ไม่พบรถ<br><span style="font-size:0.75rem;">ตรวจสอบ Admin → GPS Settings</span></p></div>';
        return;
      }

      // Apply filter + search
      var filtered = _vehicles.filter(function(v) {
        var key = v.device_id + '_' + v.provider;
        var s = _statuses[key];
        var online = s ? s.online : false;
        if (_vehicleFilter === 'online' && !online) return false;
        if (_vehicleFilter === 'offline' && online) return false;
        if (_vehicleSearch) {
          var hay = ((v.nickname || '') + ' ' + (v.device_name || '') + ' ' + v.device_id).toLowerCase();
          if (hay.indexOf(_vehicleSearch) === -1) return false;
        }
        return true;
      });

      if (filtered.length === 0) {
        el.innerHTML = '<div class="empty-state"><i class="bi bi-search"></i><p>ไม่พบรถที่ตรงเงื่อนไข</p></div>';
        return;
      }

      var html = '';
      filtered.forEach(function(v) {
        var key = v.device_id + '_' + v.provider;
        var s = _statuses[key];
        var online = s ? s.online : false;
        var speedNum = s ? s.speed : 0;
        var isIdle = online && speedNum < 1;
        var isOverspeed = online && speedNum >= OVERSPEED_THRESHOLD;
        var speed = s ? speedNum.toFixed(1) : '--';
        var addr = s ? (s.address || '—') : '—';
        var displayName = v.nickname || v.device_name || v.device_id;

        // Priority: offline > overspeed > idle > online
        var statusClass = !s ? 'offline' : (online ? (isOverspeed ? 'overspeed' : (isIdle ? 'idle' : 'online')) : 'offline');
        var statusLabel = !s ? 'OFFLINE' : (online ? (isOverspeed ? 'OVERSPEED' : (isIdle ? 'IDLE' : 'LIVE')) : 'OFFLINE');
        var statusLabelClass = !s ? 'off' : (online ? (isOverspeed ? 'over' : (isIdle ? 'idle' : 'on')) : 'off');

        // Prefer cached reverse-geocoded Thai admin names if available
        var geoLabel = getCachedGeoLabel(s && s.lat, s && s.lng);
        if (geoLabel) addr = geoLabel;

        html += '<div class="v-card ' + statusClass + (_selectedKey === key ? ' active' : '') + '" onclick="focusVehicle(\'' + key + '\')">' +
          '<div class="v-top">' +
            '<div class="v-identity">' +
              '<div class="v-plate"><span class="v-plate-dot"></span>' + esc(displayName) + '</div>' +
              '<div class="v-sub">' + esc(v.device_id) + '</div>' +
            '</div>' +
            '<div class="v-metric">' +
              '<div class="v-speed-value">' + speed + '</div>' +
              '<div class="v-speed-unit">km/h</div>' +
              '<div class="v-status-label ' + statusLabelClass + '">' + statusLabel + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="v-address" title="' + esc(addr) + '" data-vkey="' + esc(key) + '"><i class="bi bi-geo-alt"></i><span>' + esc(addr) + '</span></div>' +
          '<div class="v-actions">' +
            '<button class="v-action action-cam" onclick="event.stopPropagation(); openCamera(\'' + v.provider + '\',\'' + v.device_id + '\')" title="เปิดกล้อง"><i class="bi bi-camera-video-fill"></i><span>กล้อง</span></button>' +
            '<button class="v-action" onclick="event.stopPropagation(); openHLS(\'' + v.provider + '\',\'' + v.device_id + '\')" title="HLS stream"><i class="bi bi-play-circle-fill"></i><span>Stream</span></button>' +
            (_isAdmin ? '<button class="v-action action-share" onclick="event.stopPropagation(); showShareModal(\'' + v.provider + '\',\'' + v.device_id + '\',\'' + esc(displayName) + '\')" title="สร้างลิงก์แชร์"><i class="bi bi-share-fill"></i><span>แชร์</span></button>' : '') +
          '</div>' +
        '</div>';
      });
      el.innerHTML = html;

      // Update count pill (show filtered/total if filter active)
      var countEl = document.getElementById('vehicle-count');
      if (countEl) countEl.textContent = (_vehicleFilter !== 'all' || _vehicleSearch) ? (filtered.length + '/' + _vehicles.length) : _vehicles.length;
    }

    // =============================================
    // MAP MARKERS
    // =============================================
    function updateMapMarkers() {
      var bounds = [];

      _vehicles.forEach(function(v) {
        var key = v.device_id + '_' + v.provider;
        var s = _statuses[key];
        if (!s || (!s.lat && !s.lng) || (s.lat === 0 && s.lng === 0)) return;

        var displayName = v.nickname || v.device_name || v.device_id;
        var online = s.online;
        var speed = s.speed;

        var isIdlePop = online && speed < 1;
        var isOverspeedPop = online && speed >= OVERSPEED_THRESHOLD;
        var statusColorPop = !online ? '#94a3b8' : (isOverspeedPop ? '#dc2626' : (isIdlePop ? '#f59e0b' : '#16a34a'));
        var statusTextPop = !online ? 'OFFLINE' : (isOverspeedPop ? 'OVERSPEED' : (isIdlePop ? 'IDLE' : 'LIVE'));

        var popupHtml = '<div style="min-width:230px; font-family:Sarabun,sans-serif;">' +
          '<div style="padding:12px 14px; background:linear-gradient(135deg,#1e3a5f 0%,#0f2847 100%); color:#fff; border-radius:8px 8px 0 0; margin:-10px -10px 0;">' +
            '<div style="font-weight:700; font-size:0.95rem; display:flex; align-items:center; gap:6px;">' +
              '<span style="width:7px; height:7px; border-radius:50%; background:' + statusColorPop + '; display:inline-block;"></span>' +
              esc(displayName) +
            '</div>' +
            '<div style="font-size:0.7rem; opacity:0.75; margin-top:2px; font-family:monospace;">' + esc(v.device_id) + '</div>' +
          '</div>' +
          '<div style="padding:10px 4px 4px;">' +
            '<div style="display:flex; justify-content:space-between; align-items:baseline; padding:4px 0;">' +
              '<span style="font-size:0.7rem; color:#64748b; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;">Speed</span>' +
              '<span style="font-size:1.1rem; font-weight:700; color:#0f2847;">' + speed.toFixed(1) + ' <span style="font-size:0.65rem; color:#94a3b8;">km/h</span></span>' +
            '</div>' +
            '<div style="display:flex; justify-content:space-between; align-items:baseline; padding:4px 0; border-top:1px dashed #e2e8f0;">' +
              '<span style="font-size:0.7rem; color:#64748b; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;">Status</span>' +
              '<span style="font-size:0.75rem; font-weight:700; color:' + statusColorPop + ';">' + statusTextPop + '</span>' +
            '</div>' +
            '<div style="font-size:0.72rem; color:#475569; margin-top:6px; padding-top:6px; border-top:1px dashed #e2e8f0; line-height:1.4;">' +
              '<i class="bi bi-geo-alt" style="color:#94a3b8;"></i> ' + esc(s.address || '—') +
            '</div>' +
            '<div style="font-size:0.65rem; color:#94a3b8; margin-top:4px;">GPS: ' + esc(s.gpsTime || '--') + '</div>' +
            '<div style="display:flex; gap:6px; margin-top:10px;">' +
              '<button onclick="openCamera(\'' + v.provider + '\',\'' + v.device_id + '\')" style="flex:1; padding:6px 0; border:none; background:#dc2626; color:#fff; border-radius:6px; font-size:0.75rem; font-weight:600; cursor:pointer;"><i class="bi bi-camera-video-fill"></i> กล้อง</button>' +
              '<button onclick="openHLS(\'' + v.provider + '\',\'' + v.device_id + '\')" style="flex:1; padding:6px 0; border:none; background:#1e3a5f; color:#fff; border-radius:6px; font-size:0.75rem; font-weight:600; cursor:pointer;"><i class="bi bi-play-circle-fill"></i> Stream</button>' +
            '</div>' +
          '</div>' +
        '</div>';

        if (_markers[key]) {
          _markers[key].setLatLng([s.lat, s.lng]);
          _markers[key].setPopupContent(popupHtml);
          _markers[key].setIcon(makeIcon(online, speed));
        } else {
          _markers[key] = L.marker([s.lat, s.lng], { icon: makeIcon(online, speed) })
            .addTo(map).bindPopup(popupHtml);
        }
        bounds.push([s.lat, s.lng]);
      });

      if (bounds.length > 0 && !_selectedKey) {
        map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
      }
    }

    function makeIcon(online, speed) {
      var isIdle = online && speed < 1;
      var isOverspeed = online && speed >= OVERSPEED_THRESHOLD;
      // Color priority: offline > overspeed (red) > idle (amber) > online (green)
      var ringColor = !online ? '#94a3b8' : (isOverspeed ? '#dc2626' : (isIdle ? '#f59e0b' : '#16a34a'));
      // Pulse when moving (online + not idle). Overspeed pulses faster.
      var pulse = '';
      if (online && !isIdle) {
        var pulseDuration = isOverspeed ? '0.9s' : '1.8s';
        pulse = '<div style="position:absolute; inset:-6px; border-radius:50%; background:' + ringColor + '; opacity:' + (isOverspeed ? '0.45' : '0.3') + '; animation: mapPulse ' + pulseDuration + ' infinite;"></div>';
      }
      // Overspeed badge: red ! triangle on top-right of icon
      var badge = isOverspeed
        ? '<div style="position:absolute; top:-4px; right:-4px; width:16px; height:16px; background:#dc2626; border:2px solid #fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; color:#fff; font-weight:900; z-index:2;">!</div>'
        : '';
      return L.divIcon({
        className: '',
        html:
          '<div style="position:relative; width:40px; height:40px;">' +
            pulse +
            '<div style="position:absolute; inset:0; background:linear-gradient(135deg,#1e3a5f 0%,#0f2847 100%); border:3px solid ' + ringColor + '; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow: 0 4px 12px rgba(15,40,71,0.35);">' +
              '<i class="bi bi-truck-front-fill" style="color:#fff; font-size:16px;"></i>' +
            '</div>' +
            badge +
          '</div>',
        iconSize: [40, 40], iconAnchor: [20, 20], popupAnchor: [0, -24]
      });
    }

    // Inject pulse keyframe for map markers (once)
    (function(){
      if (!document.getElementById('map-pulse-keyframe')) {
        var st = document.createElement('style');
        st.id = 'map-pulse-keyframe';
        st.textContent = '@keyframes mapPulse { 0%,100% { transform:scale(1); opacity:0.35; } 50% { transform:scale(1.25); opacity:0; } }';
        document.head.appendChild(st);
      }
    })();

    function fitAllMarkers() {
      _selectedKey = null;
      // Clear any hospital search result when resetting to "ทั้งหมด"
      if (_hospitalMarkers && _hospitalMarkers.length) clearHospitalMarkers();
      var bounds = [];
      Object.keys(_markers).forEach(function(k) { bounds.push(_markers[k].getLatLng()); });
      if (bounds.length > 0) map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
      if (typeof updateHospitalButtonVisibility === 'function') updateHospitalButtonVisibility();
    }

    // =============================================
    // FOCUS VEHICLE
    // =============================================
    function focusVehicle(key) {
      // Switching vehicle → drop any previous nearby-search result from the
      // map so dispatcher doesn't see stale route for a different vehicle
      if (_selectedKey && key !== _selectedKey && _hospitalMarkers && _hospitalMarkers.length) {
        clearHospitalMarkers();
      }
      _selectedKey = key;
      var m = _markers[key];
      if (m) {
        map.setView(m.getLatLng(), 16);
        m.openPopup();
      }
      // highlight card
      document.querySelectorAll('.v-card').forEach(function(c) { c.classList.remove('active'); });
      // find index
      var idx = _vehicles.findIndex(function(v) { return v.device_id + '_' + v.provider === key; });
      var cards = document.querySelectorAll('.v-card');
      if (cards[idx]) cards[idx].classList.add('active');
      // Show the "ค้นหาใกล้รถ" button now that a vehicle is selected
      if (typeof updateHospitalButtonVisibility === 'function') updateHospitalButtonVisibility();
    }

    // =============================================
    // CAMERA
    // =============================================
    function getProviderObj(providerId) {
      // ดึงจาก vehicle join data หรือ _providers
      var v = _vehicles.find(function(x) { return x.provider === providerId; });
      if (v && v.gps_providers) return v.gps_providers;
      return _providers.find(function(p) { return p.id === providerId; });
    }

    function openCamera(providerId, deviceId) {
      var p = getProviderObj(providerId);
      if (!p) return;
      var url = gpsGetCameraUrl(p, deviceId);
      if (url) window.open(url, 'gps_camera_' + deviceId, 'width=1100,height=850,menubar=no,toolbar=no');
    }

    function openHLS(providerId, deviceId) {
      var p = getProviderObj(providerId);
      if (!p) return;
      var adapter = getGpsAdapter(p.software);
      if (adapter && adapter.getHlsUrl) {
        var url = adapter.getHlsUrl(p, deviceId);
        window.open(url, 'gps_hls_' + deviceId, 'width=900,height=600,menubar=no,toolbar=no');
      }
    }

    // =============================================
    // SHARE TOKENS
    // =============================================
    function showShareModal(providerId, deviceId, vehicleName) {
      document.getElementById('share-device-id').value = deviceId;
      document.getElementById('share-provider-id').value = providerId;
      document.getElementById('share-vehicle-name').value = vehicleName;
      var nameDisplay = document.getElementById('share-vehicle-name-display');
      if (nameDisplay) nameDisplay.textContent = vehicleName;
      document.getElementById('share-result').style.display = 'none';
      document.getElementById('share-reason').value = '';
      document.getElementById('share-allow-camera').checked = false;
      document.getElementById('share-hours').value = '6';
      // Reset segmented buttons
      document.querySelectorAll('#share-hours-group .segmented-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.h === '6');
      });
      document.getElementById('btnCreateShare').disabled = false;
      new bootstrap.Modal(document.getElementById('shareModal')).show();
    }

    // Wire segmented hour buttons
    (function bindShareHourButtons() {
      document.addEventListener('click', function(e) {
        var btn = e.target.closest('#share-hours-group .segmented-btn');
        if (!btn) return;
        document.querySelectorAll('#share-hours-group .segmented-btn').forEach(function(b) {
          b.classList.remove('active');
        });
        btn.classList.add('active');
        document.getElementById('share-hours').value = btn.dataset.h;
      });
    })();

    async function createShareToken() {
      var deviceId = document.getElementById('share-device-id').value;
      var providerId = document.getElementById('share-provider-id').value;
      var hours = parseInt(document.getElementById('share-hours').value);
      var reason = document.getElementById('share-reason').value.trim();

      if (!reason) { Swal.fire('กรุณาระบุเหตุผล', '', 'warning'); return; }

      document.getElementById('btnCreateShare').disabled = true;

      try {
        var token = 'TK-' + crypto.randomUUID().substring(0, 8).toUpperCase();
        var expiresAt = new Date(Date.now() + hours * 60 * 60 * 1000).toISOString();
        var allowCamera = document.getElementById('share-allow-camera').checked;

        await _supabase.from('gps_shared_tokens').insert({
          token: token, device_id: deviceId, provider: providerId,
          expires_at: expiresAt, created_by: getUserName(), reason: reason,
          allow_camera: allowCamera
        });

        var shareUrl = window.location.origin + CONFIG.BASE_URL + '/gps/share.html?token=' + token;
        document.getElementById('share-url').value = shareUrl;
        document.getElementById('share-result').style.display = '';

        await _supabase.from('activity_log').insert({
          username: getUserName(), role: getUserRole(),
          action: 'GPS_SHARE_CREATE',
          target: deviceId, details: 'Token: ' + token + ', Hours: ' + hours + ', Reason: ' + reason + (allowCamera ? ', Camera: ON' : '')
        });

        loadSharedTokens();
      } catch(e) {
        Swal.fire('Error', e.message, 'error');
        document.getElementById('btnCreateShare').disabled = false;
      }
    }

    function copyShareUrl() {
      var input = document.getElementById('share-url');
      input.select();
      navigator.clipboard.writeText(input.value).then(function() {
        Swal.fire({ icon: 'success', title: 'Copied!', timer: 1000, showConfirmButton: false });
      });
    }

    // Cache device_id → vehicle name (nickname || device_name || device_id)
    var _vehicleNameCache = {};
    async function loadVehicleNameCache() {
      try {
        var res = await _supabase.from('gps_vehicles').select('device_id, nickname, device_name');
        (res.data || []).forEach(function(v) {
          _vehicleNameCache[v.device_id] = v.nickname || v.device_name || v.device_id;
        });
      } catch(e) { console.warn('vehicle name cache:', e.message); }
    }

    function vehicleNameFor(deviceId) {
      return _vehicleNameCache[deviceId] || deviceId;
    }

    async function loadSharedTokens() {
      try {
        if (Object.keys(_vehicleNameCache).length === 0) await loadVehicleNameCache();
        var res = await _supabase.from('gps_shared_tokens').select('*')
          .order('created_at', { ascending: false }).limit(20);
        var tokens = res.data || [];
        var el = document.getElementById('tokenList');
        var countEl = document.getElementById('token-count');
        if (countEl) countEl.textContent = tokens.filter(function(t){ return t.status === 'Active' && new Date(t.expires_at) > new Date(); }).length;

        if (tokens.length === 0) {
          el.innerHTML = '<div class="empty-state" style="padding:20px 0;"><i class="bi bi-link-45deg" style="font-size:1.8rem;"></i><p style="font-size:0.78rem;">ยังไม่มีลิงก์แชร์</p></div>';
          return;
        }
        var now = new Date();
        var html = '';
        tokens.forEach(function(t) {
          var expired = new Date(t.expires_at) < now;
          var isActive = t.status === 'Active' && !expired;
          var statusText = isActive ? 'Active' : (t.status === 'Revoked' ? 'Revoked' : 'Expired');
          var vName = vehicleNameFor(t.device_id);

          var expDate = new Date(t.expires_at);
          var expStr = expDate.toLocaleString('th-TH', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
          var camIcon = t.allow_camera
            ? '<i class="bi bi-camera-video-fill" style="color:var(--red-600); font-size:0.75rem;" title="เปิดกล้องได้"></i>'
            : '';

          html += '<div class="token-card' + (!isActive ? ' expired' : '') + (t.allow_camera ? ' has-camera' : '') + '">' +
            '<div class="token-header">' +
              '<div class="token-vehicle"><i class="bi bi-truck" style="color:var(--navy-500); font-size:0.8rem;"></i>' + esc(vName) + camIcon + '</div>' +
              '<span class="token-status ' + (isActive ? 'active' : 'expired') + '">' + statusText + '</span>' +
            '</div>' +
            '<div class="token-meta">' +
              '<span class="token-id-mono">' + esc(t.token) + '</span> · ' + esc(t.reason || '-') +
              '<br>โดย ' + esc(t.created_by || '-') + ' · หมดอายุ ' + expStr +
            '</div>' +
            (isActive
              ? '<div class="token-actions">' +
                  '<button class="token-btn" onclick="copyTokenLink(\'' + esc(t.token) + '\')" title="Copy link"><i class="bi bi-clipboard"></i>Copy</button>' +
                  '<button class="token-btn ' + (t.allow_camera ? 'btn-cam-on' : '') + '" onclick="toggleTokenCamera(\'' + t.id + '\',' + (t.allow_camera ? 'false' : 'true') + ')" title="' + (t.allow_camera ? 'ปิดกล้อง' : 'เปิดกล้อง') + '"><i class="bi bi-camera-video' + (t.allow_camera ? '-fill' : '') + '"></i>' + (t.allow_camera ? 'ปิด' : 'เปิด') + '</button>' +
                  '<button class="token-btn btn-revoke" onclick="revokeToken(\'' + t.id + '\')" title="Revoke"><i class="bi bi-x-circle"></i>ยกเลิก</button>' +
                '</div>'
              : '<div class="token-actions">' +
                  '<button class="token-btn btn-revoke" onclick="deleteToken(\'' + t.id + '\')" title="Delete"><i class="bi bi-trash-fill"></i>ลบ</button>' +
                '</div>') +
          '</div>';
        });
        el.innerHTML = html;
      } catch(e) { console.error(e); }
    }

    function copyTokenLink(token) {
      var url = window.location.origin + CONFIG.BASE_URL + '/gps/share.html?token=' + token;
      navigator.clipboard.writeText(url).then(function() {
        Swal.fire({ icon: 'success', title: 'Copied!', text: url, timer: 1500, showConfirmButton: false });
      }).catch(function() {
        Swal.fire({ icon: 'info', title: 'Share URL', html: '<code style="font-size:0.8rem; word-break:break-all;">' + url + '</code>' });
      });
    }

    async function toggleTokenCamera(id, newValue) {
      try {
        await _supabase.from('gps_shared_tokens').update({ allow_camera: newValue }).eq('id', id);
        await _supabase.from('activity_log').insert({
          username: getUserName(), role: getUserRole(),
          action: 'GPS_SHARE_TOGGLE_CAM',
          target: id, details: 'Camera: ' + (newValue ? 'ON' : 'OFF')
        });
        Swal.fire({ icon: 'success', title: newValue ? 'เปิดกล้องแล้ว' : 'ปิดกล้องแล้ว', timer: 1000, showConfirmButton: false });
        loadSharedTokens();
      } catch(e) { Swal.fire('Error', e.message, 'error'); }
    }

    async function revokeToken(id) {
      try {
        await _supabase.from('gps_shared_tokens').update({ status: 'Revoked' }).eq('id', id);
        loadSharedTokens();
      } catch(e) { console.error(e); }
    }

    /**
     * Permanently delete a share token (admin only, expired/revoked tokens).
     * Requires confirmation — deletion is irreversible.
     */
    async function deleteToken(id) {
      var confirm = await Swal.fire({
        title: 'ลบลิงก์แชร์?',
        text: 'ลบแล้วไม่สามารถกู้คืนได้',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#dc2626',
        confirmButtonText: 'ลบ',
        cancelButtonText: 'ยกเลิก'
      });
      if (!confirm.isConfirmed) return;
      try {
        var res = await _supabase.from('gps_shared_tokens').delete().eq('id', id);
        if (res.error) throw res.error;
        loadSharedTokens();
        Swal.fire({ icon: 'success', title: 'ลบสำเร็จ', timer: 1200, showConfirmButton: false });
      } catch(e) {
        console.error('[deleteToken]', e);
        Swal.fire('ผิดพลาด', 'ลบไม่สำเร็จ: ' + (e.message || JSON.stringify(e)), 'error');
      }
    }

    // =============================================
    // NEARBY PLACES SEARCH (Phase 3 — Places API)
    // =============================================
    var _hospitalMarkers = [];
    var _hospitalOrigin = null; // {lat, lng, label}
    var _hospitalAllResults = []; // full search (up to 20)
    var _hospitalShowMoreAvailable = false;

    // Button shows ONLY when: Google enabled + vehicle selected with valid position
    function updateHospitalButtonVisibility() {
      var btn = document.getElementById('btnFindHospitals');
      if (!btn) return;
      var canUse = window.MapConfig && MapConfig.useGoogle();
      var vehiclePicked = false;
      if (_selectedKey && _statuses[_selectedKey]) {
        var s = _statuses[_selectedKey];
        var lat = Number(s.lat), lng = Number(s.lng);
        vehiclePicked = !isNaN(lat) && !isNaN(lng) && !(lat === 0 && lng === 0);
      }
      btn.style.display = (canUse && vehiclePicked) ? '' : 'none';
    }

    // Resolve origin from the currently selected vehicle (button is only visible
    // when a vehicle is selected, so this should always succeed).
    function resolveHospitalOrigin() {
      if (_selectedKey && _statuses[_selectedKey]) {
        var s = _statuses[_selectedKey];
        var lat = Number(s.lat), lng = Number(s.lng);
        if (!isNaN(lat) && !isNaN(lng) && !(lat === 0 && lng === 0)) {
          var v = _vehicles.find(function(x){ return (x.device_id + '_' + x.provider) === _selectedKey; });
          return {
            lat: lat, lng: lng,
            label: v ? ('รถ: ' + (v.nickname || v.device_name || v.device_id)) : 'รถที่เลือก'
          };
        }
      }
      return null;
    }

    // Geocode cache helper — returns Thai label if cached, else ''
    function getCachedGeoLabel(lat, lng) {
      if (!lat || !lng || !window.PlacesAPI) return '';
      var cacheKey = Number(lat).toFixed(4) + ',' + Number(lng).toFixed(4);
      var cached = PlacesAPI._geoCache && PlacesAPI._geoCache[cacheKey];
      if (!cached) return '';
      return PlacesAPI.formatThaiAddress(cached);
    }

    // Reverse-geocode all visible vehicle cards and update their address labels.
    // Skips if Google Maps not enabled. Runs async; cached results are instant.
    function enrichVehicleAddresses() {
      if (!window.PlacesAPI || !window.MapConfig || !MapConfig.useGoogle()) return;
      document.querySelectorAll('.v-address[data-vkey]').forEach(function(div) {
        var key = div.getAttribute('data-vkey');
        var s = _statuses[key];
        if (!s || !s.lat || !s.lng || (s.lat === 0 && s.lng === 0)) return;
        PlacesAPI.reverseGeocode(s.lat, s.lng).then(function(geo) {
          var label = PlacesAPI.formatThaiAddress(geo);
          if (!label) return;
          var span = div.querySelector('span');
          if (span) span.textContent = label;
          div.title = label + ' • ' + Number(s.lat).toFixed(5) + ', ' + Number(s.lng).toFixed(5);
        }).catch(function(){ /* silently skip on error */ });
      });
    }

    async function openNearestHospitalsModal() {
      if (!window.PlacesAPI) { alert('Places API not loaded'); return; }
      if (!MapConfig.useGoogle() || !MapConfig.getConfig().apiKey) {
        alert('ต้องตั้งค่า Google Maps API Key ใน Admin ก่อนใช้งาน');
        return;
      }
      var origin = resolveHospitalOrigin();
      if (!origin) {
        alert('กรุณาเลือกรถก่อนค้นหา');
        return;
      }
      clearHospitalMarkers();
      _hospitalOrigin = origin;
      document.getElementById('hospitals-origin-label').textContent = _hospitalOrigin.label
        + ' (' + Number(_hospitalOrigin.lat).toFixed(5) + ', ' + Number(_hospitalOrigin.lng).toFixed(5) + ')';
      document.getElementById('hospitals-list').innerHTML = '';
      document.getElementById('hospitals-error').style.display = 'none';
      // Reset to default type (hospital)
      setSearchType('hospital');
      var modal = new bootstrap.Modal(document.getElementById('hospitalsModal'));
      modal.show();
      await runHospitalSearch();
    }

    function setSearchType(type) {
      document.getElementById('hospitals-type').value = type;
      // Main row buttons
      document.querySelectorAll('#hospitals-type-group .segmented-btn').forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-type') === type);
      });
      // Emergency row buttons — custom active styling per color theme
      document.querySelectorAll('#hospitals-emergency-group .emergency-btn').forEach(function(b) {
        var t = b.getAttribute('data-type');
        var isActive = t === type;
        if (t === 'police') {
          b.style.background = isActive ? '#1e40af' : '#eff6ff';
          b.style.color = isActive ? '#fff' : '#1e40af';
          b.style.borderColor = isActive ? '#1e40af' : '#bfdbfe';
        } else if (t === 'fire_station') {
          b.style.background = isActive ? '#b91c1c' : '#fef2f2';
          b.style.color = isActive ? '#fff' : '#b91c1c';
          b.style.borderColor = isActive ? '#b91c1c' : '#fecaca';
        }
      });
      var textWrap = document.getElementById('hospitals-text-wrap');
      if (textWrap) textWrap.style.display = (type === 'text') ? '' : 'none';
    }

    async function runHospitalSearch() {
      if (!_hospitalOrigin) return;
      var radius = parseInt(document.getElementById('hospitals-radius').value, 10) || 5000;
      var type = document.getElementById('hospitals-type').value || 'hospital';
      var loading = document.getElementById('hospitals-loading');
      var list = document.getElementById('hospitals-list');
      var err = document.getElementById('hospitals-error');
      loading.style.display = '';
      list.innerHTML = '';
      err.style.display = 'none';
      try {
        var results;
        if (type === 'text') {
          var q = (document.getElementById('hospitals-text-query').value || '').trim();
          if (!q) {
            loading.style.display = 'none';
            err.innerHTML = 'กรุณาพิมพ์คำค้น';
            err.style.display = '';
            return;
          }
          results = await PlacesAPI.searchText({ query: q, lat: _hospitalOrigin.lat, lng: _hospitalOrigin.lng, radius: radius, maxResults: 10 });
        } else {
          // Map UI type → Google primary type(s). Using includedPrimaryTypes
          // gives stricter results: place's PRIMARY category must match.
          // Fetch up to 20 but only display first 10 initially — dispatcher
          // can click "ค้นหาเพิ่ม" to reveal the rest without a new API call.
          var primaryTypes;
          if (type === 'clinic') {
            primaryTypes = ['doctor', 'dentist'];
          } else {
            // hospital, pharmacy, gas_station, police, fire_station
            primaryTypes = [type];
          }
          results = await PlacesAPI.searchNearby({
            lat: _hospitalOrigin.lat,
            lng: _hospitalOrigin.lng,
            radius: radius,
            primaryTypes: primaryTypes,
            maxResults: 20
          });
        }
        _hospitalAllResults = results || [];
        var firstBatch = _hospitalAllResults.slice(0, 10);
        _hospitalShowMoreAvailable = _hospitalAllResults.length > 10;
        loading.style.display = 'none';
        renderHospitalList(firstBatch);
        // Phase 4: enrich first batch with Distance Matrix road distance + ETA
        enrichWithDistanceMatrix(firstBatch);
      } catch (e) {
        loading.style.display = 'none';
        var msg = e.message || String(e);
        // Friendly message for known errors
        if (msg.indexOf('SERVICE_DISABLED') !== -1 || msg.indexOf('has not been used') !== -1) {
          err.innerHTML = '<b><i class="bi bi-exclamation-triangle-fill"></i> Places API ยังไม่ได้เปิด</b><br>'
                        + 'Admin กรุณาเปิด <b>Places API (New)</b> ที่ Google Cloud Console → APIs & Services → Library → ค้นหา "Places API (New)" → กด Enable<br>'
                        + '<span style="font-size:0.72rem; color:#64748b;">(ถ้าเพิ่งเปิดให้รอ 1-2 นาทีแล้วลองอีกครั้ง)</span>';
        } else if (msg.indexOf('403') !== -1) {
          err.innerHTML = '<b><i class="bi bi-shield-exclamation"></i> API Key ถูกจำกัด</b><br>'
                        + 'Key อาจไม่อนุญาตให้เรียก Places API หรือ Referrer restriction ไม่ตรง';
        } else if (msg.indexOf('429') !== -1) {
          err.innerHTML = '<b><i class="bi bi-hourglass-split"></i> เรียกบ่อยเกิน</b><br>ลองใหม่อีกครั้งในอีกครู่';
        } else {
          err.textContent = 'ค้นหาไม่สำเร็จ: ' + msg.substring(0, 200);
        }
        err.style.display = '';
      }
    }

    function renderHospitalList(hospitals) {
      var list = document.getElementById('hospitals-list');
      if (!hospitals.length) {
        list.innerHTML = '<div style="text-align:center; padding:30px 0; color:var(--slate-600);">ไม่พบผลลัพธ์ในรัศมีนี้</div>';
        return;
      }
      // If any hospital has road duration → we've been enriched by Distance Matrix,
      // and the list is already sorted by ETA (see enrichWithDistanceMatrix).
      var hasRoadData = hospitals.some(function(h){ return h.roadDurationSeconds != null; });

      var html = '';
      hospitals.forEach(function(h, idx) {
        // Distance: prefer road distance if available, else straight-line
        var distText = h.roadDistance
          ? ('<span style="font-weight:600; color:var(--red-600);"><i class="bi bi-signpost-split"></i> ' + esc(h.roadDistance) + '</span>')
          : ('<span style="font-weight:600; color:var(--slate-600);"><i class="bi bi-signpost-split"></i> ' + PlacesAPI.formatDistance(h.distanceM) + ' <small>(เส้นตรง)</small></span>');
        // ETA: only shown if road data available
        var etaText = h.roadDuration
          ? '<span style="font-weight:700; color:#16a34a;"><i class="bi bi-clock-fill"></i> ' + esc(h.roadDuration) + '</span>'
          : '';
        var rating = h.rating ? ('<span style="color:#f59e0b;"><i class="bi bi-star-fill"></i> ' + h.rating.toFixed(1) + '</span> <span style="color:var(--slate-500); font-size:0.75rem;">(' + h.ratingCount + ')</span>') : '';
        var phoneBtn = h.phone ? '<a href="tel:' + esc(h.phone) + '" class="btn btn-sm btn-outline-success rounded-pill" style="font-size:0.72rem;"><i class="bi bi-telephone-fill"></i> ' + esc(h.phone) + '</a>' : '';
        var gmapBtn = h.googleMapsUri ? '<a href="' + esc(h.googleMapsUri) + '" target="_blank" class="btn btn-sm btn-outline-primary rounded-pill" style="font-size:0.72rem;"><i class="bi bi-map"></i> Google Maps</a>' : '';
        // "เร็วสุด" badge on #1 when ranked by road ETA
        var fastestBadge = (hasRoadData && idx === 0 && h.roadDuration)
          ? '<span style="background:linear-gradient(135deg,#16a34a,#15803d); color:#fff; padding:2px 8px; border-radius:10px; font-size:0.65rem; font-weight:700; box-shadow:0 2px 6px rgba(22,163,74,0.4);">⚡ เร็วสุด</span>'
          : '';
        // Highlight the fastest row with a green border
        var rowStyle = (hasRoadData && idx === 0)
          ? 'padding:12px; border:2px solid #16a34a; border-radius:10px; margin-bottom:10px; background:#f0fdf4;'
          : 'padding:12px; border:1px solid #e2e8f0; border-radius:10px; margin-bottom:10px; background:#fff;';
        html += ''
          + '<div style="' + rowStyle + '">'
          +   '<div style="display:flex; justify-content:space-between; align-items:start; gap:10px;">'
          +     '<div style="flex:1; min-width:0;">'
          +       '<div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">'
          +         '<div style="font-weight:700; color:var(--navy-900); font-size:0.95rem;">' + (idx+1) + '. ' + esc(h.name) + '</div>'
          +         fastestBadge
          +       '</div>'
          +       '<div style="color:var(--slate-600); font-size:0.78rem; margin-top:2px;">' + esc(h.address) + '</div>'
          +       '<div style="margin-top:6px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; font-size:0.8rem;">'
          +         distText + etaText + rating
          +       '</div>'
          +       '<div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">'
          +         '<button class="btn btn-sm btn-danger rounded-pill" style="font-size:0.72rem;" onclick="plotHospitalMarker(' + idx + ')"><i class="bi bi-geo-alt-fill"></i> แสดงบนแผนที่</button>'
          +         phoneBtn + gmapBtn
          +       '</div>'
          +     '</div>'
          +   '</div>'
          + '</div>';
      });
      // "ค้นหาเพิ่ม" button — shown when there are cached but undisplayed results
      if (_hospitalShowMoreAvailable && hospitals.length < _hospitalAllResults.length) {
        var remaining = _hospitalAllResults.length - hospitals.length;
        html += '<div style="text-align:center; padding:8px 0 4px;">'
              + '<button class="btn btn-sm btn-outline-danger rounded-pill px-4" onclick="loadMoreHospitals()" style="font-weight:600;">'
              + '<i class="bi bi-plus-circle-fill"></i> ค้นหาเพิ่ม (อีก ' + remaining + ' รายการ)'
              + '</button></div>';
      }
      list.innerHTML = html;
      window._hospitalsCache = hospitals;
    }

    /**
     * Append the remaining results (11-20) below the initial 10,
     * then enrich the new batch with Distance Matrix. No additional
     * Places API call is made — we already fetched up to 20.
     */
    function loadMoreHospitals() {
      if (!_hospitalAllResults || _hospitalAllResults.length <= 10) return;
      _hospitalShowMoreAvailable = false; // one-shot
      var full = _hospitalAllResults.slice();
      renderHospitalList(full);
      // Enrich just the new ones (those without road data yet)
      var needEnrich = full.filter(function(h){ return h.roadDurationSeconds == null; });
      if (needEnrich.length) enrichWithDistanceMatrix(full);
    }

    /**
     * Phase 4 — Enrich places list with actual road distance + ETA,
     * re-sort by ETA, and re-render. Silently falls back if Distance
     * Matrix API is not enabled or fails.
     *
     * Google Distance Matrix limit = 25 destinations per request, so
     * we chunk. All results get enriched (not just top 10) — dispatchers
     * need real ETA on every candidate hospital when triaging.
     */
    async function enrichWithDistanceMatrix(places) {
      if (!places || !places.length || !_hospitalOrigin) return;
      if (!window.PlacesAPI || typeof PlacesAPI.getDistanceMatrix !== 'function') return;

      // Only request matrix for places that don't already have road data
      // (avoids wasted API calls when "ค้นหาเพิ่ม" is clicked).
      var toEnrich = places.filter(function(p) { return p.roadDurationSeconds == null; });
      if (!toEnrich.length) return;

      var CHUNK = 25; // Distance Matrix hard limit per request
      var chunks = [];
      for (var i = 0; i < toEnrich.length; i += CHUNK) {
        chunks.push(toEnrich.slice(i, i + CHUNK));
      }

      try {
        var results = await Promise.all(chunks.map(function(ch) {
          return PlacesAPI.getDistanceMatrix(
            { lat: _hospitalOrigin.lat, lng: _hospitalOrigin.lng },
            ch
          );
        }));
        var flat = [].concat.apply([], results);
        toEnrich.forEach(function(p, idx) {
          var m = flat[idx];
          if (m && m.status === 'OK') {
            p.roadDistance = m.distance;
            p.roadDistanceMeters = m.distanceMeters;
            p.roadDuration = m.duration;
            p.roadDurationSeconds = m.durationSeconds;
          }
        });
        // Sort the FULL displayed list (places) by ETA
        var sorted = places.slice();
        sorted.sort(function(a, b) {
          var aSec = a.roadDurationSeconds != null ? a.roadDurationSeconds : Infinity;
          var bSec = b.roadDurationSeconds != null ? b.roadDurationSeconds : Infinity;
          return aSec - bSec;
        });
        renderHospitalList(sorted);
      } catch (e) {
        var msg = String(e && e.message || e);
        console.warn('[DistanceMatrix] enrichment failed, keeping straight-line sort:', msg);
      }
    }

    function plotHospitalMarker(idx) {
      var h = (window._hospitalsCache || [])[idx];
      if (!h) return;
      // Clear any previous hospital marker + route line first so the map only
      // shows the current selection. Without this, each click adds another
      // pin until the map is cluttered.
      clearHospitalMarkers();
      var icon = L.divIcon({
        className: '',
        html: '<div style="width:32px; height:32px; background:#dc2626; border:3px solid #fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; box-shadow:0 3px 10px rgba(220,38,38,0.5);">🏥</div>',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });
      var marker = L.marker([h.lat, h.lng], { icon: icon }).addTo(map);

      // Google Maps directions link (external app) from vehicle → place
      var directionsUrl = '';
      if (_hospitalOrigin) {
        directionsUrl = 'https://www.google.com/maps/dir/?api=1'
                      + '&origin=' + _hospitalOrigin.lat + ',' + _hospitalOrigin.lng
                      + '&destination=' + h.lat + ',' + h.lng
                      + '&travelmode=driving';
      }

      // Initial popup (straight-line distance). Will be enriched with road
      // distance + ETA once Directions API returns.
      function buildPopupHtml(extra) {
        extra = extra || {};
        var distanceLine = extra.roadDistance
          ? '<div style="font-size:0.78rem; color:#dc2626;"><b>ระยะทาง (ถนน):</b> ' + esc(extra.roadDistance) + '</div>'
          : '<div style="font-size:0.78rem; color:#dc2626;"><b>ระยะทาง:</b> ' + PlacesAPI.formatDistance(h.distanceM) + ' (เส้นตรง)</div>';
        var etaLine = extra.duration
          ? '<div style="font-size:0.78rem; color:#16a34a; font-weight:700; margin-top:2px;"><i class="bi bi-clock-fill"></i> ETA: ' + esc(extra.duration) + '</div>'
          : '';
        var summaryLine = extra.summary
          ? '<div style="font-size:0.7rem; color:#64748b; margin-top:2px;">ทางหลัก: ' + esc(extra.summary) + '</div>'
          : '';
        var loadingLine = extra.loading
          ? '<div style="font-size:0.7rem; color:#64748b; margin-top:2px;"><span class="spinner-border spinner-border-sm" style="width:0.8rem; height:0.8rem;"></span> กำลังคำนวณเส้นทาง...</div>'
          : '';
        var errorLine = extra.routingError
          ? '<div style="font-size:0.7rem; color:#b91c1c; margin-top:2px;"><i class="bi bi-exclamation-triangle"></i> ' + esc(extra.routingError) + '</div>'
          : '';
        return '<div style="min-width:240px; font-family:Sarabun,sans-serif;">'
          + '<div style="font-weight:700; color:#0c1e3d; margin-bottom:4px;">' + esc(h.name) + '</div>'
          + '<div style="font-size:0.8rem; color:#64748b; margin-bottom:6px;">' + esc(h.address) + '</div>'
          + distanceLine + etaLine + summaryLine + loadingLine + errorLine
          + (h.phone ? '<div style="font-size:0.78rem; margin-top:3px;"><b>โทร:</b> <a href="tel:' + esc(h.phone) + '">' + esc(h.phone) + '</a></div>' : '')
          + '<div style="display:flex; gap:4px; margin-top:8px; flex-wrap:wrap;">'
          + (directionsUrl ? '<a href="' + esc(directionsUrl) + '" target="_blank" style="flex:1; background:#dc2626; color:#fff; text-decoration:none; text-align:center; padding:5px 8px; border-radius:6px; font-size:0.72rem; font-weight:600;"><i class="bi bi-signpost-2-fill"></i> เปิดใน Google Maps</a>' : '')
          + (h.googleMapsUri ? '<a href="' + esc(h.googleMapsUri) + '" target="_blank" style="flex:1; background:#2563eb; color:#fff; text-decoration:none; text-align:center; padding:5px 8px; border-radius:6px; font-size:0.72rem; font-weight:600;"><i class="bi bi-map"></i> รายละเอียด</a>' : '')
          + '</div>'
          + '</div>';
      }

      marker.bindPopup(buildPopupHtml({ loading: !!_hospitalOrigin }));
      _hospitalMarkers.push(marker);

      // Draw initial straight-line fallback while Directions is loading
      var routeLine = null;
      if (_hospitalOrigin) {
        routeLine = L.polyline([
          [_hospitalOrigin.lat, _hospitalOrigin.lng],
          [h.lat, h.lng]
        ], { color: '#dc2626', weight: 3, opacity: 0.65, dashArray: '8, 8' }).addTo(map);
        _hospitalMarkers.push(routeLine);

        // Initial bounds (straight line)
        var bounds = L.latLngBounds([
          [_hospitalOrigin.lat, _hospitalOrigin.lng],
          [h.lat, h.lng]
        ]);
        map.fitBounds(bounds, { padding: [80, 80], maxZoom: 15 });

        // Fetch actual road route and replace straight line + enrich popup
        PlacesAPI.getDirections(
          { lat: _hospitalOrigin.lat, lng: _hospitalOrigin.lng },
          { lat: h.lat, lng: h.lng }
        ).then(function(route) {
          // Remove straight-line fallback
          if (routeLine) {
            map.removeLayer(routeLine);
            var idx2 = _hospitalMarkers.indexOf(routeLine);
            if (idx2 !== -1) _hospitalMarkers.splice(idx2, 1);
          }
          // Draw real road route (solid line, thicker)
          var roadLine = L.polyline(route.path, {
            color: '#dc2626', weight: 5, opacity: 0.8,
            lineCap: 'round', lineJoin: 'round'
          }).addTo(map);
          _hospitalMarkers.push(roadLine);

          // Refit bounds to road route extent
          try { map.fitBounds(roadLine.getBounds(), { padding: [60, 60], maxZoom: 15 }); } catch(e){}

          // Enrich popup with road distance + ETA
          marker.setPopupContent(buildPopupHtml({
            roadDistance: route.distance,
            duration: route.duration,
            summary: route.summary
          }));
        }).catch(function(err) {
          var msg = String(err && err.message || err);
          var friendly = 'ใช้เส้นตรงประมาณการ (' + msg + ')';
          if (msg.indexOf('NOT_FOUND') !== -1) friendly = 'หาเส้นทางถนนไม่ได้ ใช้เส้นตรง';
          else if (msg.indexOf('ZERO_RESULTS') !== -1) friendly = 'ไม่มีถนนเชื่อม ใช้เส้นตรง';
          else if (msg.indexOf('REQUEST_DENIED') !== -1) friendly = 'ต้อง enable Directions API ใน Google Cloud';
          else if (msg.indexOf('OVER_QUERY_LIMIT') !== -1) friendly = 'เกินโควต้า Google API';
          marker.setPopupContent(buildPopupHtml({ routingError: friendly }));
        });
      } else {
        map.setView([h.lat, h.lng], 15);
      }

      marker.openPopup();
      // Show the "ล้าง" button so dispatcher can clear the search result
      showClearButton();
      // Close modal so user can see the map
      var modalEl = document.getElementById('hospitalsModal');
      var modal = bootstrap.Modal.getInstance(modalEl);
      if (modal) modal.hide();
    }

    function clearHospitalMarkers(recenterOnVehicle) {
      _hospitalMarkers.forEach(function(m) { map.removeLayer(m); });
      _hospitalMarkers = [];
      // Hide the "ล้าง" button once nothing is plotted
      var clearBtn = document.getElementById('btnClearSearch');
      if (clearBtn) clearBtn.style.display = 'none';
      // Optionally pan back to the selected vehicle so dispatcher's view
      // is not stuck on the last destination.
      if (recenterOnVehicle && _selectedKey && _markers[_selectedKey]) {
        map.setView(_markers[_selectedKey].getLatLng(), 16);
      }
    }

    function showClearButton() {
      var clearBtn = document.getElementById('btnClearSearch');
      if (clearBtn) clearBtn.style.display = '';
    }

    // Radius button wiring
    document.addEventListener('click', function(ev) {
      var btn = ev.target.closest('#hospitals-radius-group .segmented-btn');
      if (!btn) return;
      document.querySelectorAll('#hospitals-radius-group .segmented-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('hospitals-radius').value = btn.getAttribute('data-r');
      if (_hospitalOrigin) runHospitalSearch();
    });

    // Search type tab wiring (main row)
    document.addEventListener('click', function(ev) {
      var btn = ev.target.closest('#hospitals-type-group .segmented-btn');
      if (!btn) return;
      var type = btn.getAttribute('data-type');
      setSearchType(type);
      if (type !== 'text' && _hospitalOrigin) runHospitalSearch();
    });

    // Emergency button wiring (police / fire_station)
    document.addEventListener('click', function(ev) {
      var btn = ev.target.closest('#hospitals-emergency-group .emergency-btn');
      if (!btn) return;
      var type = btn.getAttribute('data-type');
      setSearchType(type);
      if (_hospitalOrigin) runHospitalSearch();
    });

    // Text query Enter key
    document.addEventListener('keydown', function(ev) {
      if (ev.key === 'Enter' && ev.target && ev.target.id === 'hospitals-text-query') {
        ev.preventDefault();
        runHospitalSearch();
      }
    });

    // Clear hospital markers when modal closes (if user cancels without plotting)
    document.addEventListener('DOMContentLoaded', function() {
      var modalEl = document.getElementById('hospitalsModal');
      if (modalEl) {
        modalEl.addEventListener('hidden.bs.modal', function() {
          // Keep plotted markers — user may want to keep seeing them.
          // Clear them only when modal is RE-OPENED (already done in openNearestHospitalsModal).
        });
      }
    });

    // =============================================
    // HELPERS
    // =============================================
    function esc(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // =============================================
    // MOBILE BOTTOM SHEET (drag + snap)
    // =============================================
    var SHEET_BREAKPOINT = 768;
    function _isMobile() { return window.matchMedia('(max-width:' + SHEET_BREAKPOINT + 'px)').matches; }
    function sheetSnap(state) {
      if (!_isMobile()) return;
      var panel = document.getElementById('vehiclePanel');
      if (!panel) return;
      panel.classList.remove('sheet-peek','sheet-half','sheet-full','sheet-dragging');
      panel.style.height = '';
      panel.classList.add('sheet-' + state);
      // Let Leaflet know size changed so tiles fill properly
      setTimeout(function(){ if (window.map && map.invalidateSize) map.invalidateSize(); }, 240);
    }
    (function initBottomSheet(){
      var panel  = document.getElementById('vehiclePanel');
      var handle = document.getElementById('sheetHandle');
      if (!panel || !handle) return;
      // Default to half on mobile
      if (_isMobile()) panel.classList.add('sheet-half');

      var startY = 0, startH = 0, dragging = false;
      function px(v){ return parseFloat(v) || 0; }
      function vh(p){ return (window.innerHeight * p) / 100; }
      function onStart(e) {
        if (!_isMobile()) return;
        var t = e.touches ? e.touches[0] : e;
        startY = t.clientY;
        startH = panel.getBoundingClientRect().height;
        dragging = true;
        panel.classList.add('sheet-dragging');
        panel.classList.remove('sheet-peek','sheet-half','sheet-full');
      }
      function onMove(e) {
        if (!dragging) return;
        var t = e.touches ? e.touches[0] : e;
        var delta = startY - t.clientY;
        var h = Math.max(120, Math.min(vh(88), startH + delta));
        panel.style.height = h + 'px';
        if (e.cancelable) e.preventDefault();
      }
      function onEnd() {
        if (!dragging) return;
        dragging = false;
        var h = panel.getBoundingClientRect().height;
        var targets = [
          { name:'peek', v:120 },
          { name:'half', v:vh(45) },
          { name:'full', v:vh(85) }
        ];
        // snap to nearest
        var nearest = targets.reduce(function(a,b){
          return Math.abs(b.v - h) < Math.abs(a.v - h) ? b : a;
        });
        sheetSnap(nearest.name);
      }
      handle.addEventListener('touchstart', onStart, { passive:true });
      handle.addEventListener('touchmove',  onMove,  { passive:false });
      handle.addEventListener('touchend',   onEnd);
      handle.addEventListener('mousedown',  onStart);
      window.addEventListener('mousemove',  onMove);
      window.addEventListener('mouseup',    onEnd);
      // Tap handle (no drag) → cycle state peek→half→full→peek
      var tapStartY = 0, tapStartT = 0;
      handle.addEventListener('touchstart', function(e){
        tapStartY = e.touches[0].clientY; tapStartT = Date.now();
      }, { passive:true });
      handle.addEventListener('touchend', function(e){
        if (Date.now() - tapStartT > 250) return;
        var dy = Math.abs((e.changedTouches[0].clientY) - tapStartY);
        if (dy > 6) return; // it was a drag
        if (panel.classList.contains('sheet-peek')) sheetSnap('half');
        else if (panel.classList.contains('sheet-full')) sheetSnap('half');
        else sheetSnap('full');
      });
      // On resize, re-snap if transitioning across breakpoint
      window.addEventListener('resize', function(){
        if (!_isMobile()) {
          panel.classList.remove('sheet-peek','sheet-half','sheet-full','sheet-dragging');
          panel.style.height = '';
        } else if (!panel.classList.contains('sheet-peek') && !panel.classList.contains('sheet-half') && !panel.classList.contains('sheet-full')) {
          panel.classList.add('sheet-half');
        }
      });
    })();

    // Auto-peek the sheet when a vehicle is focused (tap card)
    (function hookFocusVehicle(){
      if (typeof window.focusVehicle !== 'function') return;
      var orig = window.focusVehicle;
      window.focusVehicle = function(key) {
        var r = orig.apply(this, arguments);
        if (_isMobile()) sheetSnap('peek');
        return r;
      };
    })();

    // =============================================
    // START
    // =============================================
    document.addEventListener('DOMContentLoaded', init);
    // Wire up hospital button visibility once MapConfig finishes loading
    if (window.MapConfig && typeof MapConfig.onLoad === 'function') {
      MapConfig.onLoad(updateHospitalButtonVisibility);
    }
  </script>

</body>
</html>
