<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=/v2/">
<title>PT Medical System</title>
<link rel="icon" href="/assets/icon.svg" type="image/svg+xml">
<style>
  body{font-family:'Sarabun',system-ui,sans-serif;text-align:center;padding:60px 20px;color:#475569;background:#f8fafc;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .card{max-width:380px;}
  .logo{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;font-weight:800;font-size:22px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 8px 20px rgba(14,165,233,.25);}
  h1{font-size:18px;color:#0f172a;margin:0 0 6px;}
  p{font-size:13px;color:#64748b;margin:6px 0;}
  a{color:#0ea5e9;text-decoration:none;font-weight:600;}
  .small{font-size:11px;color:#94a3b8;margin-top:18px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">PT</div>
  <h1>PT Medical System</h1>
  <p>กำลังเปิดระบบ...</p>
  <p class="small"><a href="/v2/">เข้าระบบ V2</a> · <a href="/v1/" style="color:#94a3b8;">ใช้ V1 (เก่า)</a></p>
</div>
<script>
// Unregister V1 service worker (was at root scope) — prevents stale cache
if ('serviceWorker' in navigator) {
  try {
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){
        // Old V1 SW was scoped to /pt-medical-system/ — unregister so V2 PWA can take over cleanly
        if (r.scope && (r.scope.endsWith('/pt-medical-system/') || r.scope.endsWith('/')) && !r.scope.includes('/v2/')) {
          r.unregister();
        }
      });
    }).catch(function(){});
  } catch(e){}
}
// Small delay so unregister can fire before navigating
setTimeout(function(){
  location.replace('/v2/' + (location.search || '') + (location.hash || ''));
}, 50);
</script>
</body>
</html>
