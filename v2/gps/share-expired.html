<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลิงก์หมดอายุ — Supwilai PT-Amb</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      font-family: 'Sarabun', 'Noto Sans Thai', system-ui, sans-serif;
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 16px;
    }
    .card-wrap {
      max-width: 480px;
      width: 100%;
      padding: 36px 28px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    .icon-x { font-size: 4.2rem; color: #dc2626; }
    h2 { font-weight: 700; color: #0f172a; margin-top: 14px; }
    .muted { color: #64748b; font-size: 0.92rem; line-height: 1.6; }
    .brand-foot { font-size: 0.78rem; color: #94a3b8; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="card-wrap">
    <i class="bi bi-exclamation-octagon-fill icon-x"></i>
    <h2>ลิงก์นี้หมดอายุแล้ว</h2>
    <p class="muted">
      ลิงก์ติดตามรถนี้ถูกยกเลิก หรือเกินช่วงเวลาที่กำหนดไว้
      <br>กรุณาขอลิงก์ใหม่จากเจ้าหน้าที่
    </p>
    <hr>
    <div class="brand-foot">
      <i class="bi bi-broadcast-pin"></i> Supwilai PT-Amb · GPS Tracking
    </div>
  </div>
</body>
</html>
