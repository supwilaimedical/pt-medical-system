<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Medical Registry · Event Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- React 18 production + Babel standalone (no build step, matches PT-Amb vanilla-CDN convention) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<!-- Supabase client + shared config (loads CONFIG.SUPABASE_URL / SUPABASE_ANON_KEY) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../shared/config.js"></script>

<style>
  :root {
    /* WARM CLINICAL — default theme */
    --bg: #F6F4EF;
    --bg-tint: #EFECE3;
    --surface: #FFFFFF;
    --surface-2: #FAF8F3;
    --line: #E8E4D8;
    --line-soft: #F0EDE2;
    --ink: #1B1A17;
    --ink-2: #4A4842;
    --ink-3: #807D74;
    --ink-4: #B6B2A6;

    --primary: #0E5E5C;
    --primary-ink: #073B3A;
    --primary-soft: #E5EFEE;

    --accent: #C8531D;

    --green: #1E7F4E;
    --green-soft: #E1F0E6;
    --amber: #B8740A;
    --amber-soft: #F6EBD1;
    --orange: #C2541A;
    --orange-soft: #F6E2D0;
    --red: #B3261E;
    --red-soft: #F6DCD9;
    --blue: #2A5BA7;
    --blue-soft: #DEE8F6;
    --violet: #6A3FA7;
    --violet-soft: #E8DFF6;

    --radius: 14px;
    --radius-sm: 8px;
    --shadow-card: 0 1px 0 rgba(20,16,8,0.04), 0 1px 2px rgba(20,16,8,0.03);
    --shadow-pop: 0 8px 24px -8px rgba(20,16,8,0.18), 0 2px 8px rgba(20,16,8,0.06);
  }

  /* COOL CLINICAL theme */
  html[data-theme="cool"] {
    --bg: #F4F6F9;
    --bg-tint: #ECF0F5;
    --surface: #FFFFFF;
    --surface-2: #F8FAFC;
    --line: #E2E7EF;
    --line-soft: #ECEFF5;
    --ink: #0F172A;
    --ink-2: #334155;
    --ink-3: #64748B;
    --ink-4: #94A3B8;
    --primary: #1E4FA3;
    --primary-ink: #122E66;
    --primary-soft: #DCE7F7;
  }

  /* (Night theme removed per request — kept only light themes) */

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: 'IBM Plex Sans Thai', 'Inter', system-ui, sans-serif;
    background: #000;
    color: var(--ink);
    font-size: 15px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "tnum" 1, "cv11" 1;
    width: 100vw; height: 100vh;
    position: relative;
  }
  .num, .mono { font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif; font-variant-numeric: tabular-nums; }
  .mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: "tnum" 1; }

  /* Fixed 1920x1080 stage — auto-scaled to fit viewport */
  .stage-wrap {
    width: 1920px; height: 1080px;
    transform-origin: center center;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  .app {
    width: 1920px; height: 1080px;
    padding: 20px 24px 22px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 14px;
    overflow: hidden;
  }

  .icon-btn {
    width: 36px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--surface); border: 1px solid var(--line);
    color: var(--ink-2); border-radius: 8px; cursor: pointer;
    transition: all .15s;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--ink); border-color: var(--ink-4); }
  .icon-btn svg { width: 18px; height: 18px; }

  /* TV HEADER (compact, all-in-one) */
  .tv-header {
    display: grid;
    grid-template-columns: minmax(380px, auto) 1fr auto;
    gap: 24px;
    align-items: center;
    padding: 14px 20px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    min-height: 72px;
    flex-shrink: 0;
  }
  .th-brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .brand-mark {
    width: 44px; height: 44px; border-radius: 11px;
    background: var(--primary); color: #fff;
    display: grid; place-items: center;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .brand-mark svg { width: 22px; height: 22px; }
  .th-text { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .th-eyebrow {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 500;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .live-tag-inline {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--red); color: #fff;
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em;
    padding: 3px 8px 3px 7px; border-radius: 4px;
    text-transform: uppercase;
  }
  .live-tag-inline .live-dot { background: #fff; }
  .live-tag-inline .live-dot::after { border-color: #fff; }
  .th-name {
    font-size: 19px; font-weight: 600; color: var(--ink);
    letter-spacing: -0.005em; line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .th-stats {
    display: flex; align-items: center; gap: 0;
    background: var(--bg-tint);
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    padding: 4px 4px;
    justify-self: end;
  }
  .th-stat { padding: 4px 18px; display: flex; flex-direction: column; gap: 1px; }
  .th-stat-label {
    font-size: 10px; color: var(--ink-3); text-transform: uppercase;
    letter-spacing: 0.06em; font-weight: 500;
  }
  .th-stat-value { font-size: 14px; font-weight: 600; color: var(--ink); }
  .th-divider { width: 1px; height: 26px; background: var(--line); }
  .th-controls { display: flex; align-items: center; gap: 12px; }
  .refresh-meta-inline {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ink-3); font-weight: 500;
    padding-right: 4px;
  }
  .refresh-meta-inline .timer { color: var(--ink-2); font-weight: 600; }

  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); position: relative; }
  .live-dot::after {
    content: ""; position: absolute; inset: -4px; border-radius: 50%;
    border: 2px solid var(--green); opacity: 0.35;
    animation: ping 1.8s ease-out infinite;
  }
  @keyframes ping { 0%{ transform:scale(0.6); opacity:0.5; } 100%{ transform:scale(1.6); opacity:0; } }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--line);
    color: var(--ink-2); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .15s;
    font-family: inherit;
  }
  .btn:hover { background: var(--surface-2); border-color: var(--ink-4); color: var(--ink); }

  /* GRID */
  .grid { display: grid; gap: 14px; min-height: 0; }
  .row-1 { grid-template-columns: 280px 360px 1fr; height: 100%; }
  .row-2 { grid-template-columns: repeat(5, 1fr); height: 100%; }
  .row-3 { grid-template-columns: repeat(12, 1fr); height: 100%; }
  .row-3 .col-3 { grid-column: span 3; }
  .row-3 .col-4 { grid-column: span 4; }
  .row-3 .col-2 { grid-column: span 2; }
  .row-3 .col-1 { grid-column: span 1; }

  .main-grid {
    display: grid;
    grid-template-rows: 310px 250px 1fr;
    gap: 14px;
    min-height: 0;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow-card);
    overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .card.compact { padding: 12px 14px; }
  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 13px; font-weight: 600; color: var(--ink);
    display: flex; align-items: center; gap: 8px;
    letter-spacing: -0.005em;
  }
  .card-title .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--primary);
  }
  .card-sub { font-size: 11px; color: var(--ink-3); font-weight: 500; letter-spacing: 0.02em; }

  /* TOTAL HERO */
  .total-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 20px 14px;
    box-shadow: var(--shadow-card);
    position: relative; overflow: hidden;
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
  }
  .total-card::before {
    content: ""; position: absolute;
    right: -40px; top: -40px;
    width: 160px; height: 160px; border-radius: 50%;
    background: radial-gradient(circle, var(--primary-soft) 0%, transparent 70%);
    pointer-events: none;
  }
  .total-label {
    font-size: 12px; color: var(--ink-3);
    letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
  }
  .total-value {
    font-family: 'Inter', sans-serif; font-feature-settings: "tnum" 1;
    font-size: 76px; font-weight: 600; line-height: 1; letter-spacing: -0.04em;
    color: var(--ink);
    margin: 6px 0 12px;
    position: relative; z-index: 1;
  }
  .total-breakdown {
    display: flex; gap: 18px; padding-top: 12px;
    border-top: 1px dashed var(--line);
    position: relative; z-index: 1;
  }
  .total-bd-item { display: flex; flex-direction: column; gap: 2px; }
  .total-bd-item .v { font-size: 16px; font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; }
  .total-bd-item .l { font-size: 11px; color: var(--ink-3); }
  .total-bd-item .v .swatch {
    display: inline-block; width: 8px; height: 8px; border-radius: 2px;
    margin-right: 6px; vertical-align: middle;
  }

  /* TOTAL CARD — extras (rate + footer) */
  .total-rate {
    display: flex; align-items: baseline; gap: 8px;
    padding: 0 0 12px;
    position: relative; z-index: 1;
  }
  .total-rate .rate-v {
    font-size: 22px; font-weight: 700; color: var(--ink);
    letter-spacing: -0.02em;
  }
  .total-rate .rate-l { font-size: 12px; color: var(--ink-3); }
  .total-rate .rate-trend {
    margin-left: auto;
    font-size: 11px; font-weight: 600;
    padding: 3px 9px; border-radius: 999px;
    border: 1px solid currentColor;
    background: transparent;
  }
  .total-footer {
    display: flex; gap: 14px; padding-top: 10px;
    border-top: 1px dashed var(--line);
    position: relative; z-index: 1;
    margin-top: auto;
  }
  .total-footer .tf-item {
    flex: 1; display: flex; align-items: center; justify-content: space-between;
    background: var(--surface-2); border-radius: 8px;
    padding: 6px 10px;
  }
  .total-footer .tf-l { font-size: 11px; color: var(--ink-3); font-weight: 500; }
  .total-footer .tf-v {
    font-size: 14px; font-weight: 700; color: var(--ink);
    font-variant-numeric: tabular-nums;
  }

  /* TRIAGE */
  .triage-rows { display: flex; flex-direction: column; gap: 6px; }
  .triage-rows-big { gap: 10px; flex: 1; min-height: 0; justify-content: center; }
  .triage-row-big {
    grid-template-columns: 16px 1fr 80px 38px 30px !important;
    gap: 14px !important;
    padding: 10px 12px !important;
    background: var(--surface-2);
    border-radius: 10px;
  }
  .triage-marker-big {
    width: 14px; height: 14px; border-radius: 4px;
  }
  .triage-label-big {
    font-size: 14px; font-weight: 600; color: var(--ink);
  }
  .triage-pct-big {
    font-size: 12px; font-weight: 700;
    color: var(--ink-2); text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .triage-count-big {
    font-size: 17px; font-weight: 700; color: var(--ink); text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .triage-footer {
    display: flex; gap: 10px; margin-top: 10px;
    padding-top: 10px; border-top: 1px dashed var(--line);
  }
  .tri-foot-item {
    flex: 1; display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; background: var(--surface-2);
    border-radius: 8px;
  }
  .tri-foot-item .dot-sq { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .tri-foot-item .tf-lbl { font-size: 11px; color: var(--ink-3); font-weight: 500; flex: 1; }
  .tri-foot-item .tf-num {
    font-size: 16px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .triage-rows-orig { display: flex; flex-direction: column; gap: 6px; }
  .triage-row {
    display: grid; grid-template-columns: 14px 76px 1fr 28px;
    align-items: center; gap: 12px;
    padding: 8px 10px; border-radius: 8px;
    transition: background .15s;
  }
  .triage-row:hover { background: var(--surface-2); }
  .triage-marker { width: 10px; height: 10px; border-radius: 3px; }
  .triage-label { font-size: 13px; font-weight: 500; color: var(--ink); }
  .triage-bar {
    height: 6px; background: var(--bg-tint); border-radius: 3px; overflow: hidden;
    position: relative;
  }
  .triage-bar-fill {
    height: 100%; border-radius: 3px;
    transition: width .6s cubic-bezier(.2,.7,.2,1);
  }
  .triage-count {
    font-size: 14px; font-weight: 600; color: var(--ink); text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .triage-pct {
    font-size: 11px; font-weight: 600; color: var(--ink-3);
    font-variant-numeric: tabular-nums;
    position: absolute; right: -36px; top: 50%; transform: translateY(-50%);
    width: 32px; text-align: right;
  }

  /* CHART */
  .chart-card { padding: 16px 18px 10px; }
  .chart-card .chart-body { flex: 1; min-height: 0; display: flex; }
  .chart-card .chart-body svg { width: 100%; height: 100%; }
  .chart-legend {
    display: flex; gap: 14px; align-items: center;
    font-size: 12px; color: var(--ink-2);
  }
  .legend-item { display: inline-flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 3px; }
  .legend-item .legend-v { color: var(--ink-3); font-variant-numeric: tabular-nums; margin-left: 2px; }

  /* DONUT CARD */
  .donut-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 14px 12px;
    box-shadow: var(--shadow-card);
    display: flex; flex-direction: column; gap: 8px;
    min-height: 0; overflow: hidden;
  }
  .donut-wrap {
    position: relative;
    flex: 1; min-height: 0;
    display: grid; place-items: center;
  }
  .donut-wrap svg { max-height: 100%; max-width: 100%; height: 100%; width: auto; }
  .donut-center {
    position: absolute; inset: 0; display: grid; place-items: center;
    pointer-events: none;
  }
  .donut-center .v { font-size: 22px; font-weight: 600; color: var(--ink); line-height: 1; font-variant-numeric: tabular-nums; }
  .donut-center .l { font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }
  .donut-legend {
    display: flex; flex-direction: column; gap: 4px;
    font-size: 11.5px; color: var(--ink-2);
    max-height: 90px; overflow: hidden;
  }
  .donut-legend-row { display: grid; grid-template-columns: 10px 1fr auto auto; gap: 8px; align-items: center; }
  .donut-legend-row .sw { width: 8px; height: 8px; border-radius: 2px; }
  .donut-legend-row .lbl { color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .donut-legend-row .cnt { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }
  .donut-legend-row .pct { color: var(--ink-3); font-variant-numeric: tabular-nums; min-width: 38px; text-align: right; }

  /* BAR LIST */
  .bar-list {
    display: flex; flex-direction: column;
    gap: 6px;
    flex: 1; min-height: 0;
  }
  .bar-row {
    display: grid;
    grid-template-columns: 110px 1fr 28px;
    gap: 10px;
    align-items: center;
  }
  .bar-lbl {
    font-size: 11.5px; color: var(--ink-2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .bar-v {
    font-size: 12px; font-weight: 600; color: var(--ink);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .bar-track {
    height: 6px; border-radius: 3px;
    background: var(--bg-tint);
    overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 3px;
    transition: width .6s cubic-bezier(.2,.7,.2,1);
  }

  /* TABLES */
  .rank-table { width: 100%; border-collapse: collapse; }
  .rank-table th {
    text-align: left; font-size: 10.5px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3);
    padding: 4px 6px 8px; border-bottom: 1px solid var(--line-soft);
  }
  .rank-table th.r { text-align: right; }
  .rank-table td {
    padding: 8px 6px; font-size: 13px;
    border-bottom: 1px solid var(--line-soft);
  }
  .rank-table td.r { text-align: right; font-variant-numeric: tabular-nums; }
  .rank-table tr:last-child td { border-bottom: none; }
  .rank-table tbody { font-size: 12.5px; }
  .rank-num {
    display: inline-flex; width: 18px; height: 18px;
    align-items: center; justify-content: center;
    background: var(--bg-tint); border-radius: 4px;
    font-size: 10.5px; font-weight: 600; color: var(--ink-3);
    font-variant-numeric: tabular-nums;
  }
  .rank-bar { position: relative; padding-right: 8px; }
  .rank-bar-fill {
    position: absolute; left: 0; bottom: -1px;
    height: 2px; border-radius: 1px;
    opacity: 0.6;
  }
  .pct-strong { font-weight: 600; }
  .count-cell { font-weight: 600; color: var(--ink); }

  .item-pill {
    display: inline-block; padding: 1px 7px; border-radius: 5px;
    font-size: 12.5px; line-height: 1.4;
  }

  /* Q.DISPENSE */
  .qd-list {
    display: flex; flex-direction: column;
    border-top: 1px solid var(--line-soft);
  }
  .qd-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 4px; border-bottom: 1px dashed var(--line-soft);
    font-size: 13px;
  }
  .qd-row .name { color: var(--ink-2); }
  .qd-row .v { font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; }
  .qd-row.total {
    background: var(--ink); color: #fff;
    border-radius: 8px; padding: 10px 12px;
    margin-top: 8px; border: none;
  }
  .qd-row.total .name { color: #fff; opacity: 0.85; font-weight: 600; }
  .qd-row.total .v { color: #fff; font-size: 18px; }

  /* segment header dot colors */
  .dot.green { background: var(--green); }
  .dot.red { background: var(--red); }
  .dot.violet { background: var(--violet); }
  .dot.blue { background: var(--blue); }
  .dot.amber { background: var(--amber); }
  .dot.orange { background: var(--orange); }
  .dot.primary { background: var(--primary); }

  /* TABS (Dashboard / Pending) */
  .tabs-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 4px;
  }
  .tabs {
    display: inline-flex; padding: 4px;
    background: var(--bg-tint); border-radius: 10px;
    border: 1px solid var(--line);
  }
  .tab {
    padding: 7px 16px; border-radius: 7px;
    font-size: 13px; font-weight: 500; color: var(--ink-3);
    cursor: pointer; transition: all .15s;
    display: inline-flex; align-items: center; gap: 7px;
    background: transparent; border: none;
    font-family: inherit;
  }
  .tab:hover { color: var(--ink-2); }
  .tab.active {
    background: var(--surface); color: var(--ink); font-weight: 600;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px var(--line);
  }
  .tab-count {
    min-width: 20px; padding: 0 6px; height: 18px;
    border-radius: 5px; background: var(--bg);
    font-size: 11px; font-weight: 600; color: var(--ink-3);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .tab.active .tab-count { background: var(--primary-soft); color: var(--primary-ink); }
  .tab .tab-count.urgent { background: var(--red); color: #fff; }

  /* PENDING — card list */

  .pending-tri {

  .pending-mid { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .pending-name {

  }
  .pending-cc {

  .pending-meta {

  .pending-dur.warn { background: var(--amber-soft); color: var(--amber); }

  /* LOADING SKELETON */
  .app.loading-skel {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
  }
  .skel-spinner {
    width: 48px; height: 48px;

    border-radius: 50%;

  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .skel-msg { font-size: 15px; color: var(--ink-3); font-weight: 500; }
  .skel-err { font-size: 48px; }

  /* Theme toggle (warm/cool) — small bottom-right floater */
  .theme-toggle {
    position: fixed; right: 14px; bottom: 14px; z-index: 1000;
    display: flex; gap: 4px; padding: 4px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 999px; box-shadow: var(--shadow-pop);
  }
  .theme-toggle button {
    border: 0; background: transparent; cursor: pointer;
    padding: 6px 14px; border-radius: 999px;
    font-family: inherit; font-size: 12px; font-weight: 500;
    color: var(--ink-3);
  }
  .theme-toggle button.active {
    background: var(--primary); color: #fff;
  }

  /* PRINT — fit 1920x1080 stage to A4 landscape via `zoom` (shrinks layout box, not just visual) */
  @media print {
    @page { size: A4 landscape; margin: 5mm; }
    html, body {
      overflow: hidden !important; height: auto !important;
      background: #fff !important; margin: 0 !important; padding: 0 !important;
    }
    .stage-host {
      position: static !important;
      width: auto !important; height: auto !important;
      overflow: hidden !important;
      page-break-inside: avoid;
    }
    /* `zoom` shrinks BOTH visual and layout box — pagination treats element as zoom×size.
       1920px * 0.565 ≈ 1085px ≈ 287mm = A4L width minus margin
       1080px * 0.565 ≈ 610px ≈ 162mm — well under 200mm A4L height */
    .stage-wrap {
      /* JS sets inline `position:absolute; left:0; top:0` at runtime (auto-scale fit).
         In print, .stage-host becomes position:static so an absolute #stage anchors to
         the page AND removes itself from flow → .stage-host collapses to height 0 →
         Chrome prints a blank page. Force static so #stage flows in-document and
         contributes height. `!important` author rule beats the inline normal style.
         left/top become inert once position is static. */
      position: static !important;
      transform: none !important;
      zoom: 0.565;
      width: 1920px !important; height: 1080px !important;
      box-shadow: none !important;
      background: #fff !important;
      overflow: hidden !important;
      page-break-inside: avoid;
      page-break-after: avoid;
    }
    .app { padding: 14px 20px !important; }
    .icon-btn, .theme-toggle, .refresh-meta-inline { display: none !important; }
    .live-tag-inline, .live-dot { display: none !important; }
    .card, .total-card, .donut-card, .tv-header, .pending-card {
      box-shadow: none !important;
    }
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="stage-host" id="stage-host">
  <div class="stage-wrap" id="stage">
    <div id="root"></div>
  </div>
</div>

<!-- Theme toggle (warm / cool only — night removed per request) -->
<div class="theme-toggle">
  <button id="th-warm" class="active" onclick="setTheme('warm')">Warm</button>
  <button id="th-cool" onclick="setTheme('cool')">Cool</button>
</div>

<style>
  .stage-host { position: absolute; inset: 0; overflow: hidden; }
</style>

<script>
  // Theme switch
  function setTheme(t) {
    if (t === 'warm') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', t);
    document.getElementById('th-warm').classList.toggle('active', t === 'warm');
    document.getElementById('th-cool').classList.toggle('active', t === 'cool');
    try { localStorage.setItem('fa-dash-preview-theme', t); } catch(e){}
  }
  try {
    var saved = localStorage.getItem('fa-dash-preview-theme');
    if (saved && saved !== 'night') setTheme(saved);
  } catch(e){}

  // Auto-scale the 1920x1080 stage to fit viewport (letterboxed)
  (function() {
    const stage = document.getElementById('stage');
    stage.style.position = 'absolute';
    stage.style.left = '0';
    stage.style.top = '0';
    stage.style.transformOrigin = '0 0';
    function fit() {
      const sx = window.innerWidth / 1920;
      const sy = window.innerHeight / 1080;
      const s = Math.min(sx, sy);
      const tx = (window.innerWidth - 1920 * s) / 2;
      const ty = (window.innerHeight - 1080 * s) / 2;
      stage.style.transform = `translate(${tx}px, ${ty}px) scale(${s})`;
    }
    window.addEventListener('resize', fit);
    fit();
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);

    // Print: clear inline transform so @media print scale rule wins
    var _savedTransform = '';
    window.addEventListener('beforeprint', function() {
      _savedTransform = stage.style.transform;
      stage.style.transform = '';
    });
    window.addEventListener('afterprint', function() {
      stage.style.transform = _savedTransform || '';
      fit();
    });
  })();
</script>

<!-- CHARTS (inline from charts.jsx) -->
<script type="text/babel">
function Donut({ data, size = 130, thickness = 18 }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const r = size / 2 - thickness / 2 - 2;
  const c = size / 2;
  const C = 2 * Math.PI * r;
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: "block" }}>
      <circle cx={c} cy={c} r={r} fill="none" stroke="var(--line-soft)" strokeWidth={thickness} />
      {data.map((d, i) => {
        const frac = d.value / total;
        const dash = frac * C;
        const dashArr = `${dash} ${C - dash}`;
        const dashOff = -offset;
        offset += dash;
        return (
          <circle key={i} cx={c} cy={c} r={r} fill="none" stroke={d.color} strokeWidth={thickness}
            strokeDasharray={dashArr} strokeDashoffset={dashOff}
            transform={`rotate(-90 ${c} ${c})`} strokeLinecap="butt" />
        );
      })}
    </svg>
  );
}

function DonutCard({ title, dotColor = "primary", data, centerValue, centerLabel }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  const cv = centerValue != null ? centerValue : total;
  return (
    <div className="donut-card">
      <div className="card-head" style={{ marginBottom: 4 }}>
        <div className="card-title">
          <span className={`dot ${dotColor}`}></span>
          {title}
        </div>
      </div>
      <div className="donut-wrap">
        <Donut data={data} />
        <div className="donut-center">
          <div style={{ textAlign: "center" }}>
            <div className="v">{cv}</div>
            {centerLabel && <div className="l">{centerLabel}</div>}
          </div>
        </div>
      </div>
      <div className="donut-legend">
        {data.map((d, i) => {
          const pct = total > 0 ? (d.value / total * 100) : 0;
          return (
            <div className="donut-legend-row" key={i}>
              <span className="sw" style={{ background: d.color }}></span>
              <span className="lbl" title={d.label}>{d.label}</span>
              <span className="cnt">{d.value}</span>
              <span className="pct">{pct.toFixed(0)}%</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function TimeOfIncident({ series, labels }) {
  const W = 1200, H = 260;
  const pad = { l: 40, r: 28, t: 22, b: 32 };
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;
  const n = labels.length;
  const max = Math.max(2, ...series.flatMap(s => s.values));
  const yTicks = [];
  for (let i = 0; i <= max; i++) yTicks.push(i);
  const x = (i) => pad.l + (n === 1 ? innerW / 2 : (innerW * i) / (n - 1));
  const y = (v) => pad.t + innerH - (v / max) * innerH;

  const smooth = (pts) => {
    if (pts.length < 2) return "";
    let d = `M ${pts[0][0]} ${pts[0][1]}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[i - 1] || pts[i];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[i + 2] || p2;
      const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
      const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
      const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
      const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
      d += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2[0]} ${p2[1]}`;
    }
    return d;
  };

  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" width="100%" height="100%" style={{ display: "block" }}>
      <defs>
        {series.map((s, idx) => (
          <linearGradient id={`grad-${idx}`} key={idx} x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor={s.color} stopOpacity="0.22" />
            <stop offset="100%" stopColor={s.color} stopOpacity="0" />
          </linearGradient>
        ))}
      </defs>
      {yTicks.map((t, i) => (
        <g key={i}>
          <line x1={pad.l} x2={W - pad.r} y1={y(t)} y2={y(t)}
            stroke="var(--line-soft)" strokeDasharray={i === 0 ? "" : "2 4"} vectorEffect="non-scaling-stroke" />
          <text x={pad.l - 8} y={y(t) + 4} fontSize="11" fill="var(--ink-3)" textAnchor="end"
            fontFamily="JetBrains Mono, monospace">{t}</text>
        </g>
      ))}
      {labels.map((l, i) => (
        <text key={i} x={x(i)} y={H - 10} fontSize="11.5" fill="var(--ink-3)" textAnchor="middle"
          fontFamily="JetBrains Mono, monospace">{l}</text>
      ))}
      {series.map((s, idx) => {
        const pts = s.values.map((v, i) => [x(i), y(v)]);
        const linePath = smooth(pts);
        const areaPath = linePath + ` L ${x(n - 1)} ${y(0)} L ${x(0)} ${y(0)} Z`;
        return (
          <g key={idx}>
            <path d={areaPath} fill={`url(#grad-${idx})`} />
            <path d={linePath} fill="none" stroke={s.color} strokeWidth="2.4"
              strokeLinejoin="round" strokeLinecap="round" vectorEffect="non-scaling-stroke" />
          </g>
        );
      })}
      {series.map((s, idx) => {
        const pts = s.values.map((v, i) => [x(i), y(v)]);
        return pts.map(([px, py], i) => (
          <g key={`${idx}-${i}`}>
            <line x1={px} x2={px} y1={py} y2={py}
              stroke={s.color} strokeWidth="10" strokeLinecap="round" vectorEffect="non-scaling-stroke" />
            <line x1={px} x2={px} y1={py} y2={py}
              stroke="var(--surface)" strokeWidth="5" strokeLinecap="round" vectorEffect="non-scaling-stroke" />
            <line x1={px} x2={px} y1={py} y2={py}
              stroke={s.color} strokeWidth="3" strokeLinecap="round" vectorEffect="non-scaling-stroke" />
          </g>
        ));
      })}
    </svg>
  );
}

function Sparkline({ values, color = "var(--primary)", w = 90, h = 28 }) {
  if (!values || !values.length) return null;
  const max = Math.max(1, ...values);
  const min = Math.min(0, ...values);
  const rng = max - min || 1;
  const stepX = w / (values.length - 1 || 1);
  const pts = values.map((v, i) => [i * stepX, h - ((v - min) / rng) * h]);
  const d = "M " + pts.map(p => `${p[0]} ${p[1]}`).join(" L ");
  const area = d + ` L ${w} ${h} L 0 ${h} Z`;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <path d={area} fill={color} opacity="0.15" />
      <path d={d} fill="none" stroke={color} strokeWidth="1.6" strokeLinejoin="round" />
    </svg>
  );
}

Object.assign(window, { Donut, DonutCard, TimeOfIncident, Sparkline });
</script>

<!-- APP (inline from app.jsx, simplified — no tweaks panel, no night theme, +Print) -->
<script type="text/babel">
const { Donut, DonutCard, TimeOfIncident, Sparkline } = window;

// ===== LIVE DATA via Supabase + URL ?event=<id> =====
// Color palettes for category aggregations (matches preview palette)
const COLOR_POOL = ["#C2541A", "#B8740A", "#1E7F4E", "#2A5BA7", "#6A3FA7", "#D45A8A", "#3B6EC7", "#0E5E5C", "#A5365A", "#B3261E", "#807D74"];
const TRIAGE_COLOR = { A: "var(--green)", V: "var(--amber)", P: "var(--orange)", U: "var(--red)" };

// Get eventId from URL ?event=<id>
function getEventIdFromUrl() {
  try {
    var p = new URLSearchParams(window.location.search);
    return p.get("event") || p.get("eventId") || "";
  } catch (e) { return ""; }
}

// Fetch event + registry from Supabase (mirrors monitor/getEventReportData)
async function fetchEventData(eventId) {
  if (!window.CONFIG) throw new Error("CONFIG not loaded");
  if (!window._sb) {
    window._sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  }
  const sb = window._sb;
  const [evRes, regRes] = await Promise.all([
    sb.from("fa_events").select("*").eq("event_id", eventId).single(),
    sb.from("fa_registry").select("*").eq("event_id", eventId)
  ]);
  if (evRes.error) throw new Error("Event fetch: " + evRes.error.message);
  if (regRes.error) throw new Error("Registry fetch: " + regRes.error.message);
  if (!evRes.data) throw new Error("Event not found: " + eventId);
  return { event: evRes.data, registry: regRes.data || [] };
}

// Aggregate registry → DATA shape (ported from monitor renderDash)
function aggregateData(raw) {
  const ev = raw.event || {};
  const reg = (raw.registry || []).slice().sort((a, b) => (a.time_in || "").localeCompare(b.time_in || ""));

  const gM = {}, lM = {}, eM = {}, tM = {}, catM = {}, ccMed = {}, ccTra = {}, probM = {}, resM = {}, trxM = {}, timeH = {};
  let medC = 0, traC = 0, transferC = 0, dcC = 0;
  const pending = [];

  reg.forEach((r) => {
    if (r.gender) gM[r.gender] = (gM[r.gender] || 0) + 1;
    if (r.location_tx) lM[r.location_tx] = (lM[r.location_tx] || 0) + 1;
    if (r.category) catM[r.category] = (catM[r.category] || 0) + 1;
    if (r.etiology) eM[r.etiology] = (eM[r.etiology] || 0) + 1;
    if (r.triage) tM[r.triage] = (tM[r.triage] || 0) + 1;
    if (r.etiology === "Med") medC++;
    else if (r.etiology === "Trauma") traC++;

    let cc = r.cc || "";
    if (r.cc_other) cc = r.cc_other;
    if (cc) {
      if (r.etiology === "Trauma") ccTra[cc] = (ccTra[cc] || 0) + 1;
      else ccMed[cc] = (ccMed[cc] || 0) + 1;
    }
    let pr = r.problem || "";
    if (pr) {
      const di = pr.indexOf(" — ");
      if (di > 0) pr = pr.substring(0, di);
      probM[pr] = (probM[pr] || 0) + 1;
    }
    if (r.result) {
      const rp = String(r.result).split(":");
      let rl = "D/C";
      if (rp[0] === "dc") {
        const dl = { dnf: "DNF", rtp: "Return to Play", finished: "D/C" };
        rl = dl[rp[1]] || "D/C";
        dcC++;
      } else if (rp[0] === "transfer") {
        rl = "Transfer";
        transferC++;
      }
      resM[rl] = (resM[rl] || 0) + 1;
    }
    if (r.time_in) {
      const hr = r.time_in.split(":")[0];
      if (hr) timeH[hr] = (timeH[hr] || 0) + 1;
    }
    if (r.treatment) {
      const parts = r.treatment.split(", ");
      for (let i = 0; i < parts.length; i++) {
        let t = parts[i].trim();
        if (!t) continue;
        if (t === "จ่ายยา" && i + 1 < parts.length && parts[i + 1].indexOf("/") === -1) {
          t = "จ่ายยา (" + parts[i + 1].trim() + ")";
          i++;
        }
        trxM[t] = (trxM[t] || 0) + 1;
      }
    }
    if (!r.time_out) pending.push(r);
  });

  // Map → DATA shape
  const total = reg.length;

  // Triage 4 keys (ensure all present)
  const triage = [
    { key: "alert",  label: "Alert",        value: tM.A || 0, color: "var(--green)" },
    { key: "verbal", label: "Verbal",       value: tM.V || 0, color: "var(--amber)" },
    { key: "pain",   label: "Pain",         value: tM.P || 0, color: "var(--orange)" },
    { key: "unresp", label: "Unresponsive", value: tM.U || 0, color: "var(--red)"   },
  ];

  // Convert map → colored array
  const toColored = (m, palette) => {
    const sorted = Object.entries(m).sort((a, b) => b[1] - a[1]);
    return sorted.map(([k, v], i) => ({
      label: k,
      value: v,
      color: palette ? palette[i % palette.length] : COLOR_POOL[i % COLOR_POOL.length]
    }));
  };
  const toColoredCC = (m) => {
    const sorted = Object.entries(m).sort((a, b) => b[1] - a[1]);
    const palette = ["var(--orange)", "var(--amber)", "var(--blue)", "var(--red)", "var(--violet)", "var(--primary)", "var(--green)"];
    const soft    = ["var(--orange-soft)", "var(--amber-soft)", "var(--blue-soft)", "var(--red-soft)", "var(--violet-soft)", "var(--primary-soft)", "var(--green-soft)"];
    return sorted.map(([k, v], i) => ({
      label: k, value: v,
      color: soft[i % soft.length],
      ink:   palette[i % palette.length]
    }));
  };
  const toColoredResult = (m) => {
    const map = { "Transfer": { color: "var(--blue-soft)",  ink: "var(--blue)"  },
                  "D/C":      { color: "var(--green-soft)", ink: "var(--green)" },
                  "DNF":      { color: "var(--amber-soft)", ink: "var(--amber)" },
                  "Return to Play": { color: "var(--primary-soft)", ink: "var(--primary)" } };
    return Object.entries(m).map(([k, v]) => ({
      label: k, value: v,
      color: (map[k] || {}).color || "var(--bg-tint)",
      ink:   (map[k] || {}).ink   || "var(--ink-2)"
    })).sort((a, b) => b.value - a.value);
  };

  // Gender — fixed colors (female pink, male blue, other gray)
  const genderColor = { "หญิง": "#D45A8A", "Female": "#D45A8A", "ชาย": "#3B6EC7", "Male": "#3B6EC7" };
  const gender = Object.entries(gM).map(([k, v]) => ({
    label: k, value: v, color: genderColor[k] || "#807D74"
  }));

  // Etiology — fixed: Med=primary, Trauma=accent
  const etiology = Object.entries(eM).map(([k, v]) => ({
    label: k, value: v,
    color: k === "Med" ? "var(--primary)" : k === "Trauma" ? "var(--accent)" : "var(--ink-3)"
  }));

  // Time of Incident — bucket by hour
  const startHr = ev.start_time ? parseInt(ev.start_time.split(":")[0], 10) : 0;
  const allH = Object.keys(timeH).sort((a, b) => {
    const na = (parseInt(a, 10) - startHr + 24) % 24;
    const nb = (parseInt(b, 10) - startHr + 24) % 24;
    return na - nb;
  });
  const labels = allH.map(h => h + ":00");
  const medSeries = allH.map(h => {
    return reg.filter(r => r.time_in && r.time_in.split(":")[0] === h && r.etiology === "Med").length;
  });
  const trSeries = allH.map(h => {
    return reg.filter(r => r.time_in && r.time_in.split(":")[0] === h && r.etiology === "Trauma").length;
  });

  // Q.Dispense (4 fixed items from event metadata)
  const qDispense = [
    { name: "แอมโมเนีย", value: parseInt(ev.q_ammonia || 0, 10), ink: "var(--orange)" },
    { name: "พลาสเตอร์ยา", value: parseInt(ev.q_plaster || 0, 10), ink: "var(--blue)" },
    { name: "ยานวด / สเปรย์", value: parseInt(ev.q_spray || 0, 10), ink: "var(--amber)" },
    { name: "ประคบเย็น", value: parseInt(ev.q_wound || 0, 10), ink: "var(--primary)" },
  ];

  // Build startedAt — combine event date + start time
  let startedAt = null;
  if (ev.event_date && ev.start_time) {
    // Asia/Bangkok local — construct ISO assuming +07:00
    startedAt = ev.event_date + "T" + ev.start_time + (ev.start_time.length === 5 ? ":00" : "") + "+07:00";
  }

  // Split location into venue + category (event.location may have "venue • category")
  let venue = ev.location || "—";
  let categoryLabel = "—";
  if (venue.indexOf("•") > 0) {
    const parts = venue.split("•").map(s => s.trim());
    venue = parts[0];
    categoryLabel = parts[1];
  }

  return {
    event: {
      name: ev.event_name || "(unnamed event)",
      venue: venue,
      category: categoryLabel,
      startedAt: startedAt,
    },
    totals: {
      total: total,
      med: medC,
      trauma: traC,
      transfer: transferC,
      dc: dcC,
      pending: pending.length,
    },
    triage: triage,
    timeOfIncident: {
      labels: labels.length ? labels : ["—"],
      series: [
        { name: "Med",    color: "var(--primary)", values: medSeries.length ? medSeries : [0] },
        { name: "Trauma", color: "var(--accent)",  values: trSeries.length ? trSeries : [0] },
      ],
    },
    gender: gender.length ? gender : [{ label: "—", value: 0, color: "var(--ink-4)" }],
    category: Object.entries(catM).length ? toColored(catM, [
      "var(--primary)", "var(--blue)", "var(--violet)", "var(--amber)", "var(--green)"
    ]) : [{ label: "—", value: 0, color: "var(--ink-4)" }],
    locationTx: toColored(lM),
    etiology: etiology.length ? etiology : [{ label: "—", value: 0, color: "var(--ink-4)" }],
    treatment: toColored(trxM),
    ccMed: toColoredCC(ccMed),
    ccTrauma: toColoredCC(ccTra),
    problem: toColoredCC(probM),
    result: toColoredResult(resM),
    qDispense: qDispense,
    pending: pending.map(r => ({
      triage: r.triage || "A",
      name: r.name || "—",
      timeIn: r.time_in || "—",
      locationTx: r.location_tx || "—",
      etiology: r.etiology || "—",
      cc: r.cc_other || r.cc || "—",
      problem: r.problem ? r.problem.split(" — ")[0] : "",
    })),
  };
}

function pct(v, total) { return total > 0 ? (v / total * 100) : 0; }
const fmtPct = (n) => `${n.toFixed(n < 10 && n > 0 ? 1 : 0)}%`;

// ===== PENDING TAB =====
function PendingTab({ pending, now }) {
  const tColor = { A: "var(--green)", V: "var(--amber)", P: "var(--orange)", U: "var(--red)" };
  const tLabel = { A: "Alert", V: "Verbal", P: "Pain", U: "Unresponsive" };

  // Compute waiting duration from timeIn "HH:MM" → minutes
  const calcDur = (timeIn) => {
    if (!timeIn) return null;
    const [hh, mm] = timeIn.split(":").map(Number);
    const tin = new Date(now);
    tin.setHours(hh, mm, 0, 0);
    let diff = Math.floor((now - tin) / 60000);
    if (diff < 0) diff += 24 * 60; // crossed midnight
    return diff;
  };
  const fmtDur = (min) => {
    if (min == null) return "—";
    if (min < 60) return `${min} min`;
    const h = Math.floor(min / 60);
    return `${h}h ${min % 60}m`;
  };
  const durClass = (min) => {
    if (min == null) return "";
    if (min >= 60) return "crit";
    if (min >= 30) return "warn";
    return "";
  };

  if (!pending.length) {
    return (
      <div className="pending-wrap">
        <div className="pending-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <div className="big">ไม่มีผู้ป่วยค้าง</div>
          <div className="sub">ทุกคนได้รับการจำหน่ายแล้ว</div>
        </div>
      </div>
    );
  }

  return (
    <div className="pending-wrap">
      <div className="pending-head">
        <div className="lbl">
          <span className="pending-pulse"></span>
          ผู้ป่วยที่ยังไม่ได้จำหน่าย ({pending.length} ราย)
        </div>
        <div className="card-sub mono">เรียงตาม Triage urgency</div>
      </div>
      <div className="pending-grid">
        {pending
          .slice()
          .sort((a, b) => "UPVA".indexOf(a.triage) - "UPVA".indexOf(b.triage))
          .map((p, i) => {
            const min = calcDur(p.timeIn);
            return (
              <div className="pending-card" key={i} style={{ "--tri-color": tColor[p.triage] || "var(--ink-4)" }}>
                <div className="pending-tri" style={{ background: tColor[p.triage] || "var(--ink-4)" }}>
                  {p.triage || "A"}
                </div>
                <div className="pending-mid">
                  <div className="pending-name">{p.name || "-"}</div>
                  <div className="pending-cc">{p.cc || "-"}</div>
                  <div className="pending-meta">
                    <span className="pill">📍 {p.locationTx || "-"}</span>
                    <span className="pill">{p.etiology || "-"}</span>
                    {p.problem && <span className="pill" style={{ background: "var(--red-soft)", color: "var(--red)" }}>{p.problem}</span>}
                  </div>
                </div>
                <div className="pending-right">
                  <div className="pending-time">{p.timeIn || "-"}</div>
                  <div className={`pending-dur ${durClass(min)}`}>{fmtDur(min)}</div>
                  <div style={{ fontSize: 10, color: "var(--ink-4)", marginTop: 2 }}>{tLabel[p.triage] || ""}</div>
                </div>
              </div>
            );
          })}
      </div>
    </div>
  );
}

function App() {
  const [refreshIn, setRefreshIn] = React.useState(120);
  const [isFs, setIsFs] = React.useState(false);
  const [now, setNow] = React.useState(new Date());
  const [tab, setTab] = React.useState("dashboard");
  const [DATA, setDATA] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const eventId = React.useMemo(() => getEventIdFromUrl(), []);

  // Fetch + aggregate
  const reload = React.useCallback(async (silent) => {
    if (!eventId) { setError("ไม่พบ event ID — เปิดผ่าน ?event=<id>"); setLoading(false); return; }
    try {
      if (!silent) setLoading(true);
      const raw = await fetchEventData(eventId);
      const agg = aggregateData(raw);
      setDATA(agg);
      setError(null);
    } catch (e) {
      setError(e.message || String(e));
    } finally {
      setLoading(false);
    }
  }, [eventId]);

  // Initial fetch
  React.useEffect(() => { reload(false); }, [reload]);

  // Auto-refresh every 120s
  React.useEffect(() => {
    const id = setInterval(() => {
      setRefreshIn(r => {
        if (r <= 1) {
          reload(true);
          return 120;
        }
        return r - 1;
      });
      setNow(new Date());
    }, 1000);
    return () => clearInterval(id);
  }, [reload]);

  // Live clock + elapsed (Asia/Bangkok)
  const fmtClock = (d) => new Intl.DateTimeFormat('en-GB', {
    timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  }).format(d);
  const fmtStartTime = (iso) => {
    if (!iso) return "—";
    try {
      return new Intl.DateTimeFormat('en-GB', {
        timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit', hour12: false
      }).format(new Date(iso));
    } catch (e) { return "—"; }
  };
  const fmtElapsed = (startIso, nowDate) => {
    if (!startIso) return "—";
    const ms = nowDate - new Date(startIso);
    if (isNaN(ms) || ms < 0) return "0:00:00";
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  };

  React.useEffect(() => {
    const onChange = () => setIsFs(!!document.fullscreenElement);
    document.addEventListener("fullscreenchange", onChange);
    return () => document.removeEventListener("fullscreenchange", onChange);
  }, []);

  const toggleFullscreen = () => {
    if (!document.fullscreenElement) {
      (document.documentElement.requestFullscreen?.() || Promise.resolve()).catch(()=>{});
    } else {
      document.exitFullscreen?.();
    }
  };
  const doPrint = () => window.print();
  const doRefresh = () => { setRefreshIn(120); reload(true); };

  // Loading skeleton on first load (before any data)
  if (loading && !DATA) {
    return (
      <div className="app loading-skel">
        <div className="skel-spinner"></div>
        <div className="skel-msg">กำลังโหลดข้อมูล...</div>
      </div>
    );
  }

  // Error state
  if (error && !DATA) {
    return (
      <div className="app loading-skel">
        <div className="skel-err">⚠️</div>
        <div className="skel-msg" style={{ color: "var(--red)" }}>{error}</div>
        <button className="btn" onClick={() => reload(false)} style={{ marginTop: 12 }}>ลองใหม่</button>
      </div>
    );
  }

  return (
    <div className="app">

      {/* COMPACT HEADER */}
      <header className="tv-header">
        <div className="th-brand">
          <div className="brand-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </div>
          <div className="th-text">
            <div className="th-eyebrow">
              Medical Registry · Event Dashboard
              <span className="live-tag-inline"><span className="live-dot"></span> LIVE</span>
            </div>
            <div className="th-name">{DATA.event.name}</div>
          </div>
        </div>

        <div className="th-stats">
          <div className="tabs" style={{ margin: "-2px 6px -2px -2px" }}>
            <button className={`tab ${tab === "dashboard" ? "active" : ""}`} onClick={() => setTab("dashboard")}>
              Dashboard
            </button>
            <button className={`tab ${tab === "pending" ? "active" : ""}`} onClick={() => setTab("pending")}>
              Pending
              <span className={`tab-count ${DATA.pending.length > 0 ? "urgent" : ""}`}>{DATA.pending.length}</span>
            </button>
          </div>
          <div className="th-divider"></div>
          <div className="th-stat">
            <div className="th-stat-label">Venue</div>
            <div className="th-stat-value">{DATA.event.venue}</div>
          </div>
          <div className="th-divider"></div>
          <div className="th-stat">
            <div className="th-stat-label">Category</div>
            <div className="th-stat-value">{DATA.event.category}</div>
          </div>
          <div className="th-divider"></div>
          <div className="th-stat">
            <div className="th-stat-label">Start</div>
            <div className="th-stat-value mono">{fmtStartTime(DATA.event.startedAt)}</div>
          </div>
          <div className="th-divider"></div>
          <div className="th-stat">
            <div className="th-stat-label">Elapsed</div>
            <div className="th-stat-value mono">{fmtElapsed(DATA.event.startedAt, now)}</div>
          </div>
          <div className="th-divider"></div>
          <div className="th-stat">
            <div className="th-stat-label">Now</div>
            <div className="th-stat-value mono">{fmtClock(now)}</div>
          </div>
        </div>

        <div className="th-controls">
          <div className="refresh-meta-inline">
            <span className="live-dot"></span>
            <span>Auto-refresh <span className="timer mono">{refreshIn}s</span></span>
          </div>
          <button className="icon-btn" title="Refresh" onClick={doRefresh}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/>
            </svg>
          </button>
          <button className="icon-btn" title="Print" onClick={doPrint}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="6 9 6 2 18 2 18 9"/><rect x="6" y="14" width="12" height="8"/>
              <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            </svg>
          </button>
          <button className="icon-btn" title={isFs ? "Exit fullscreen" : "Enter fullscreen"} onClick={toggleFullscreen}>
            {isFs ? (
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M9 3v4a2 2 0 0 1-2 2H3"/><path d="M21 9h-4a2 2 0 0 1-2-2V3"/>
                <path d="M3 15h4a2 2 0 0 1 2 2v4"/><path d="M15 21v-4a2 2 0 0 1 2-2h4"/>
              </svg>
            ) : (
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 9V5a2 2 0 0 1 2-2h4"/><path d="M15 3h4a2 2 0 0 1 2 2v4"/>
                <path d="M21 15v4a2 2 0 0 1-2 2h-4"/><path d="M9 21H5a2 2 0 0 1-2-2v-4"/>
              </svg>
            )}
          </button>
        </div>
      </header>

      {/* MAIN CONTENT — switch by tab (tabs moved into header th-stats) */}
      {tab === "dashboard" ? (
        <div className="main-grid">
          {/* ROW 1: Total | Triage | Time chart */}
          <div className="grid row-1">
            <TotalCard
              totals={DATA.totals}
              elapsedMin={Math.floor((now - new Date(DATA.event.startedAt)) / 60000)}
              pendingCount={DATA.pending.length}
              lastCaseTime={DATA.pending.length > 0 ? DATA.pending[DATA.pending.length - 1].timeIn : "—"}
            />
            <TriageCard triage={DATA.triage} />
            <ChartCard timeOfIncident={DATA.timeOfIncident} />
          </div>

          {/* ROW 2: Gender + Category + Location + Etiology + Treatment */}
          <div className="grid row-2">
            <DonutCard title="Gender · เพศ" dotColor="primary" data={DATA.gender} centerLabel="Cases" />
            <DonutCard title="Category · ประเภท" dotColor="primary" data={DATA.category} centerLabel="Cases" />
            <DonutCard title="Location Tx · จุดรักษา" dotColor="orange" data={DATA.locationTx} centerLabel="Sites" />
            <DonutCard title="Etiology · สาเหตุ" dotColor="primary" data={DATA.etiology} centerLabel="Med/Tr" />
            <BarListCard title="Treatment · หัตถการ" dotColor="violet" rows={DATA.treatment} />
          </div>

          {/* ROW 3: 4 tables + Q.Dispense */}
          <div className="grid row-3">
            <div className="col-3"><RankTable title="CC (Med) · อาการ" dotColor="primary" rows={DATA.ccMed} /></div>
            <div className="col-3"><RankTable title="CC (Trauma) · บาดเจ็บ" dotColor="red" rows={DATA.ccTrauma} /></div>
            <div className="col-3"><RankTable title="Problem · การวินิจฉัย" dotColor="violet" rows={DATA.problem} /></div>
            <div className="col-2"><RankTable title="Result · ผลรักษา" dotColor="green" rows={DATA.result} /></div>
            <div className="col-1"><QDispenseCard rows={DATA.qDispense} /></div>
          </div>
        </div>
      ) : (
        <PendingTab pending={DATA.pending} now={now} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
