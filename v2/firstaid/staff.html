<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0ea5e9">
  <title>เจ้าหน้าที่ปฐมพยาบาล — Supwilai PT-Amb</title>
  <meta name="description" content="หน้าบันทึกข้อมูลผู้ป่วยสำหรับเจ้าหน้าที่ part-time ที่ได้รับ Token จาก admin">
  <link rel="icon" href="../../assets/icon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/styles.css">
  <style>
    /* === Match V2 main pages: bg-modern-primary navbar + island-card body === */
    body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; color: #0f172a; padding-bottom: 80px; }
    .bg-modern-primary {
      background: linear-gradient(135deg, #1e3a5f 0%, #0d6efd 100%);
      box-shadow: 0 4px 20px rgba(13, 110, 253, 0.15);
    }
    /* Topbar = navbar style of admin/employee pages */
    .staff-topbar {
      position: sticky; top: 0; z-index: 1020;
      color: #fff; padding: 14px 16px;
    }
    .staff-topbar .brand { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
    .staff-topbar .brand .icon-wrap {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(255,255,255,.15); display: inline-flex;
      align-items: center; justify-content: center; flex-shrink: 0;
      font-size: 1.1rem;
    }
    .staff-topbar .worker-name { font-weight: 700; font-size: 1rem; line-height: 1.15; display: flex; align-items: center; gap: 6px; min-width: 0; }
    .staff-topbar .worker-name span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .staff-topbar .meta { font-size: 0.78rem; opacity: 0.92; margin-top: 2px; line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .staff-topbar .meta .badge-section { background: rgba(255,255,255,.22); padding: 2px 8px; border-radius: 4px; margin-left: 4px; font-weight: 600; }
    .staff-topbar .btn-logout {
      width: 38px; height: 38px; border-radius: 50%; border: none;
      background: rgba(255,255,255,.18); color: #fff; flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .staff-topbar .btn-logout:hover { background: rgba(255,255,255,.28); }

    /* Island card — same visual language as admin */
    .staff-card {
      background: #fff; border-radius: 16px;
      margin-bottom: 14px; overflow: hidden;
      box-shadow: 0 2px 10px rgba(15,23,42,.06);
      border: 1px solid #e9ecef;
    }
    .staff-card .card-head {
      padding: 12px 16px; border-bottom: 1px solid #f1f3f5;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .staff-card .card-head.head-success { background: rgba(25, 135, 84, .08); }
    .staff-card .card-head.head-primary { background: rgba(13, 110, 253, .08); }
    .staff-card .card-head .ttl { font-weight: 700; font-size: 0.95rem; color: #0f172a; display: flex; align-items: center; gap: 6px; margin: 0; }
    .staff-card .card-head.head-success .ttl { color: #146c43; }
    .staff-card .card-head.head-primary .ttl { color: #084298; }
    .staff-card .card-body { padding: 14px 16px; }

    .supply-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 6px; align-items: center; padding: 8px 0; border-bottom: 1px dashed #e2e8f0; }
    .supply-row:last-child { border-bottom: none; }
    .supply-row .name { font-size: 0.88rem; font-weight: 600; }
    .supply-row .qty-btn {
      width: 38px; height: 38px; border-radius: 8px; border: 1px solid #e2e8f0;
      background: #f8fafc; font-size: 1.1rem; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
      transition: all .12s;
    }
    .supply-row .qty-btn:active { transform: scale(.94); }
    .supply-row .qty-btn.minus { color: #dc2626; }
    .supply-row .qty-btn.plus { color: #15803d; background: #f0fdf4; border-color: #bbf7d0; }
    .supply-row .qty-val {
      min-width: 44px; text-align: center; font-weight: 700; font-size: 1rem;
      font-variant-numeric: tabular-nums; padding: 6px 4px;
      background: #f1f5f9; border-radius: 6px;
    }

    .pt-row {
      display: grid; grid-template-columns: 6px 1fr auto;
      gap: 10px; padding: 10px 12px; background: #fff;
      border-radius: 8px; margin-bottom: 6px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      cursor: pointer; transition: background .12s;
    }
    .pt-row:hover { background: #f8fafc; }
    .pt-row .strip { border-radius: 3px; }
    .pt-row.tri-resus .strip { background: #dc2626; }
    .pt-row.tri-emerg .strip { background: #d63384; }
    .pt-row.tri-urgent .strip { background: #f59e0b; }
    .pt-row.tri-nonurg .strip { background: #16a34a; }
    .pt-row .name { font-weight: 700; font-size: 0.92rem; }
    .pt-row .sub { font-size: 0.72rem; color: #64748b; margin-top: 2px; }
    .pt-row .right { text-align: right; }
    .pt-row .time { font-size: 0.7rem; color: #94a3b8; font-variant-numeric: tabular-nums; }
    .pt-row .pill { display: inline-block; font-size: 0.65rem; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-top: 4px; }
    .pt-row .pill.in { background: #dbeafe; color: #1e40af; }
    .pt-row .pill.out { background: #dcfce7; color: #15803d; }

    .gate-wrap {
      max-width: 380px; margin: 60px auto; background: #fff;
      border-radius: 16px; padding: 28px 24px;
      box-shadow: 0 8px 24px rgba(15,23,42,.08);
    }
    .gate-wrap h3 { font-weight: 800; color: #075985; margin-bottom: 6px; }
    .gate-wrap p { color: #64748b; font-size: 0.88rem; }
    .gate-wrap input { letter-spacing: 0.2em; text-align: center; font-weight: 700; font-size: 1.2rem; }

    /* Triage / Gender buttons — copied from admin's reg form for visual consistency */
    .reg-triage-btn { width:36px; height:36px; font-weight:700; font-size:1rem; border:2px solid #dee2e6; color:#6c757d; background:#fff; transition:all 0.15s; }
    .reg-triage-btn:hover { border-color: var(--tc); color: var(--tc); }
    .reg-triage-btn.active { border-color: var(--tc); background: var(--tc); color:#fff; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
    .reg-gender-btn { width:36px; height:36px; font-size:1.1rem; border:2px solid #dee2e6; color:#6c757d; background:#fff; transition:all 0.15s; }
    .reg-gender-btn:hover { border-color: var(--gc); color: var(--gc); }
    .reg-gender-btn.active { border-color: var(--gc); background: var(--gc); color:#fff; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }

    .fab-add {
      position: fixed; right: 16px; bottom: 16px; z-index: 1015;
      width: 56px; height: 56px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, #0ea5e9, #0284c7); color: #fff;
      box-shadow: 0 6px 18px rgba(14,165,233,.4);
      font-size: 1.5rem; display: inline-flex; align-items: center; justify-content: center;
    }
    .fab-add:active { transform: scale(.95); }

    .empty-state { text-align: center; padding: 32px 16px; color: #94a3b8; }
    .empty-state .bi { font-size: 2.5rem; opacity: 0.5; margin-bottom: 8px; }

    @media (max-width: 480px) {
      .staff-card { padding: 12px; }
      .form-grid input, .form-grid select, .form-grid textarea { font-size: 16px; } /* prevent iOS zoom */
    }
  </style>
</head>
<body>

<!-- ===== TOKEN GATE (shown before token verified) ===== -->
<div id="gate-view">
  <div class="gate-wrap">
    <div class="text-center mb-3">
      <div style="width:56px; height:56px; border-radius:14px; background:linear-gradient(135deg,#0ea5e9,#0284c7); color:#fff; font-weight:800; display:inline-flex; align-items:center; justify-content:center; font-size:24px;">
        <i class="bi bi-bandaid-fill"></i>
      </div>
    </div>
    <h3 class="text-center">เจ้าหน้าที่ part-time</h3>
    <p class="text-center mb-4">กรุณาใส่ Token ที่ได้รับจาก admin</p>
    <div class="mb-3">
      <input type="text" id="gate-token" class="form-control form-control-lg" maxlength="6" placeholder="XXXXXX" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
    </div>
    <button class="btn btn-primary w-100 rounded-pill py-2 fw-bold" onclick="staffVerifyTokenInput()">
      <i class="bi bi-key-fill me-1"></i> เข้าใช้งาน
    </button>
    <div id="gate-error" class="alert alert-danger mt-3 small" style="display:none;"></div>
  </div>
</div>

<!-- ===== MAIN VIEW (shown after token verified) ===== -->
<div id="main-view" style="display:none;">

  <!-- Topbar (matches V2 admin's bg-modern-primary navbar) -->
  <div class="staff-topbar bg-modern-primary d-flex align-items-center gap-2">
    <div class="brand">
      <div class="icon-wrap"><i class="bi bi-bandaid-fill"></i></div>
      <div style="min-width:0; flex:1;">
        <div class="worker-name"><span id="ui-worker-name">—</span></div>
        <div class="meta">
          <span id="ui-event-name">—</span>
          <span id="ui-section-wrap" style="display:none;"><span class="badge-section">📍 <span id="ui-section">—</span></span></span>
        </div>
      </div>
    </div>
    <button class="btn-logout" onclick="staffLogout()" title="ออกจากระบบ"><i class="bi bi-box-arrow-right"></i></button>
  </div>

  <div class="container-fluid p-3" style="max-width: 720px;">

    <!-- Quick Supply Counters (matches admin's "แจกจ่ายด่วน" green-header card) -->
    <div class="staff-card">
      <div class="card-head head-success">
        <h6 class="ttl">⚡ แจกจ่ายอุปกรณ์ <span class="text-muted fw-normal small">(กด +/- ได้เลย)</span></h6>
      </div>
      <div class="card-body" id="supply-rows">
        <div class="supply-row" data-field="q_ammonia"><span class="name">🧴 แอมโมเนีย</span>
          <button class="qty-btn minus" onclick="staffBumpSupply('q_ammonia',-1)">−</button>
          <span class="qty-val" id="qv-q_ammonia">0</span>
          <button class="qty-btn plus" onclick="staffBumpSupply('q_ammonia',1)">+</button>
        </div>
        <div class="supply-row" data-field="q_plaster"><span class="name">🩹 พลาสเตอร์ยา</span>
          <button class="qty-btn minus" onclick="staffBumpSupply('q_plaster',-1)">−</button>
          <span class="qty-val" id="qv-q_plaster">0</span>
          <button class="qty-btn plus" onclick="staffBumpSupply('q_plaster',1)">+</button>
        </div>
        <div class="supply-row" data-field="q_spray"><span class="name">💨 ยานวด/สเปรย์</span>
          <button class="qty-btn minus" onclick="staffBumpSupply('q_spray',-1)">−</button>
          <span class="qty-val" id="qv-q_spray">0</span>
          <button class="qty-btn plus" onclick="staffBumpSupply('q_spray',1)">+</button>
        </div>
        <div class="supply-row" data-field="q_wound"><span class="name">❄️ ประคบเย็น</span>
          <button class="qty-btn minus" onclick="staffBumpSupply('q_wound',-1)">−</button>
          <span class="qty-val" id="qv-q_wound">0</span>
          <button class="qty-btn plus" onclick="staffBumpSupply('q_wound',1)">+</button>
        </div>
      </div>
    </div>

    <!-- My Patient List -->
    <div class="staff-card">
      <div class="card-head head-primary">
        <h6 class="ttl"><i class="bi bi-clipboard2-pulse"></i> ผู้ป่วยที่ฉันบันทึก <span class="badge bg-primary rounded-pill ms-1" id="my-count">0</span></h6>
        <button class="btn btn-sm btn-link p-0 text-secondary" onclick="staffRefreshMyList()" title="รีเฟรช"><i class="bi bi-arrow-clockwise"></i></button>
      </div>
      <div class="card-body" id="my-list">
        <div class="empty-state"><i class="bi bi-clipboard2"></i><div>ยังไม่มีบันทึก กดปุ่ม + ด้านล่างเพื่อเพิ่มผู้ป่วย</div></div>
      </div>
    </div>

  </div>

  <!-- FAB add patient -->
  <button class="fab-add" onclick="staffOpenForm()" title="เพิ่มผู้ป่วย"><i class="bi bi-plus-lg"></i></button>
</div>

<!-- ===== Medical Registry Modal — IDENTICAL HTML to admin's faRegistryModal =====
     Driven by shared module v2/firstaid/_reg-form.js so behavior matches admin 1:1.
     DO NOT diverge from admin's HTML — IDs and onclick handlers are wired by the shared module. -->
<div class="modal fade" id="faRegistryModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable modal-fullscreen-sm-down">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header bg-light border-bottom-0 pb-0">
        <h5 class="modal-title fw-bold" id="reg-modal-title"><i class="bi bi-clipboard2-pulse text-success me-2"></i> บันทึก Medical Registry</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-3">
        <form id="reg-form">
          <input type="hidden" id="reg-form-event-id">
          <input type="hidden" id="reg-form-reg-id">
          <input type="hidden" id="reg-form-existing-image">
          <input type="hidden" id="reg-etiology-value" value="Med">
          <input type="hidden" id="reg-result-type" value="dc">

          <!-- Section 1: Demographics -->
          <div class="row g-2 mb-3 border-bottom pb-3">
              <div class="col-auto">
                <label class="form-label fw-bold small">Triage <span class="text-danger">*</span></label>
                <input type="hidden" id="reg-triage" value="A">
                <div class="btn-group" role="group" id="reg-triage-toggle">
                  <button type="button" class="btn btn-sm reg-triage-btn active" data-value="A" onclick="reg_setTriage('A')" title="Alert" style="--tc:#198754;">A</button>
                  <button type="button" class="btn btn-sm reg-triage-btn" data-value="V" onclick="reg_setTriage('V')" title="Verbal" style="--tc:#f59e0b;">V</button>
                  <button type="button" class="btn btn-sm reg-triage-btn" data-value="P" onclick="reg_setTriage('P')" title="Pain" style="--tc:#e85d04;">P</button>
                  <button type="button" class="btn btn-sm reg-triage-btn" data-value="U" onclick="reg_setTriage('U')" title="Unresponsive" style="--tc:#dc3545;">U</button>
                </div>
              </div>
              <div class="col-auto">
                <label class="form-label fw-bold small">เพศ <span class="text-danger">*</span></label>
                <input type="hidden" id="reg-gender" value="">
                <div class="btn-group" role="group" id="reg-gender-toggle">
                  <button type="button" class="btn btn-sm reg-gender-btn" data-value="ชาย" onclick="reg_setGender('ชาย')" title="ชาย" style="--gc:#0d6efd;">M</button>
                  <button type="button" class="btn btn-sm reg-gender-btn" data-value="หญิง" onclick="reg_setGender('หญิง')" title="หญิง" style="--gc:#d63384;">F</button>
                  <button type="button" class="btn btn-sm reg-gender-btn" data-value="ไม่ระบุ" onclick="reg_setGender('ไม่ระบุ')" title="ไม่ระบุ" style="--gc:#f59e0b;">U</button>
                </div>
              </div>
            </div>
          <div class="row g-2 mb-3">
              <div class="col">
                <label class="form-label fw-bold small">ชื่อ-สกุล</label>
                <input type="text" id="reg-name" class="form-control form-control-sm" placeholder="ชื่อ-สกุล (BIB)">
              </div>
              <div class="col-3" style="max-width:80px;">
                <label class="form-label fw-bold small">อายุ</label>
                <input type="number" id="reg-age" class="form-control form-control-sm" min="1" max="120">
              </div>
          </div>

          <div class="row g-2 mb-3">
              <div class="col-6 col-md-4">
                <label class="form-label fw-bold small">เบอร์โทร</label>
                <input type="tel" id="reg-phone" class="form-control form-control-sm">
              </div>
              <div class="col-6 col-md-4 d-none" id="reg-category-div">
                <label class="form-label fw-bold small">หมวดหมู่</label>
                <select id="reg-category" class="form-select form-select-sm"><option value="">-</option></select>
              </div>
              <div class="col-6 col-md-4">
                <label class="form-label fw-bold small">จุดรักษา <span class="text-danger">*</span></label>
                <select id="reg-location-tx" class="form-select form-select-sm" required><option value="">-- เลือก --</option></select>
              </div>
          </div>

          <div class="row g-2 mb-3 border-bottom pb-3">
              <div class="col-6">
                <label class="form-label fw-bold small">เวลารับ <span class="text-danger">*</span> <span class="text-muted fw-normal">(24 ชม.)</span></label>
                <input type="tel" id="reg-time-in" class="form-control form-control-sm" inputmode="numeric" placeholder="HH:MM" pattern="([01]?\d|2[0-3]):[0-5]\d" maxlength="5" required oninput="fa_autoFormatTime(this)">
              </div>
              <div class="col-6">
                <label class="form-label fw-bold small">เวลาจำหน่าย <span class="text-muted fw-normal">(24 ชม.)</span></label>
                <input type="tel" id="reg-time-out" class="form-control form-control-sm" inputmode="numeric" placeholder="HH:MM" pattern="([01]?\d|2[0-3]):[0-5]\d" maxlength="5" oninput="fa_autoFormatTime(this)">
              </div>
          </div>

          <!-- Section 2: Clinical -->
          <div class="mb-3">
            <label class="form-label fw-bold small">Etiology <span class="text-danger">*</span></label>
            <div class="btn-group w-100" role="group">
              <button type="button" class="btn btn-primary btn-sm" id="reg-etiology-med" onclick="reg_toggleEtiology('Med')"><i class="bi bi-heart-pulse me-1"></i>Medicine</button>
              <button type="button" class="btn btn-outline-danger btn-sm" id="reg-etiology-trauma" onclick="reg_toggleEtiology('Trauma')"><i class="bi bi-bandaid me-1"></i>Trauma</button>
            </div>
          </div>

          <div class="row g-2 mb-3">
            <div class="col-12">
              <label class="form-label fw-bold small">Chief Complaint (CC)</label>
              <select id="reg-cc" class="form-select form-select-sm" onchange="reg_onCCChange()"><option value="">-- เลือก CC --</option></select>
            </div>
            <div class="col-12 d-none" id="reg-cc-other-div">
              <input type="text" id="reg-cc-other" class="form-control form-control-sm" placeholder="ระบุ CC อื่นๆ...">
            </div>
          </div>

          <div class="row g-2 mb-3">
            <div class="col-12">
              <label class="form-label fw-bold small">Problem / Diagnosis</label>
              <select id="reg-problem" class="form-select form-select-sm" onchange="reg_onProblemChange()"><option value="">-- เลือก Problem --</option></select>
            </div>
            <div class="col-12 d-none" id="reg-problem-other-div">
              <input type="text" id="reg-problem-other" class="form-control form-control-sm" placeholder="ระบุ Problem อื่นๆ...">
            </div>
          </div>

          <!-- Treatment Grid (generated from REG_TREATMENTS array) -->
          <div class="card p-3 mb-3 bg-light border-0">
            <label class="form-label fw-bold small mb-2">Treatment (เลือกได้หลายข้อ)</label>
            <div class="d-flex flex-wrap gap-1" id="reg-treatment-grid"></div>
            <div class="d-flex flex-wrap gap-1 mt-2 pt-2 border-top">
              <button type="button" class="btn btn-sm reg-tx-btn" data-value="จ่ายยา" onclick="this.classList.toggle('active'); reg_toggleMedDetail()">💊 จ่ายยา</button>
              <input type="text" id="reg-treatment-med-detail" class="form-control form-control-sm d-none" style="max-width:200px;" placeholder="ระบุชื่อยา...">
              <input type="text" id="reg-treatment-other-text" class="form-control form-control-sm" style="max-width:200px;" placeholder="อื่นๆ ระบุ...">
            </div>
          </div>

          <!-- Allergy -->
          <div class="row g-2 mb-3">
            <div class="col-4"><label class="form-label fw-bold small text-danger">แพ้ยา</label><select id="reg-allergy" class="form-select form-select-sm" onchange="reg_toggleAllergy()"><option value="ไม่มี">ไม่มี</option><option value="มี">มี</option></select></div>
            <div class="col-8 d-none" id="reg-allergy-detail-div"><label class="form-label fw-bold small text-danger">ระบุ</label><input type="text" id="reg-allergy-detail" class="form-control form-control-sm"></div>
          </div>

          <!-- Vital Signs -->
          <div class="card mb-3 border-0">
            <div class="card-header bg-info bg-opacity-10 border-0 py-2 px-3" style="cursor:pointer;" onclick="reg_toggleVitals()">
              <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold small"><i class="bi bi-activity me-1"></i>Vital Signs (ไม่บังคับ)</span>
                <i class="bi bi-chevron-down" id="reg-vitals-toggle-icon"></i>
              </div>
            </div>
            <div class="card-body p-3 d-none" id="reg-vitals-body">
              <div class="row g-2">
                <div class="col-6 col-md-3"><label class="form-label small text-muted mb-0">BP</label><input type="text" id="reg-v-bp" class="form-control form-control-sm" placeholder="120/80"></div>
                <div class="col-6 col-md-3"><label class="form-label small text-muted mb-0">HR</label><input type="number" id="reg-v-hr" class="form-control form-control-sm" placeholder="bpm"></div>
                <div class="col-6 col-md-3"><label class="form-label small text-muted mb-0">RR</label><input type="number" id="reg-v-rr" class="form-control form-control-sm" placeholder="/min"></div>
                <div class="col-6 col-md-3"><label class="form-label small text-muted mb-0">SpO2</label><input type="number" id="reg-v-spo2" class="form-control form-control-sm" placeholder="%"></div>
                <div class="col-6 col-md-3"><label class="form-label small text-muted mb-0">Temp</label><input type="text" id="reg-v-temp" class="form-control form-control-sm" placeholder="&deg;C"></div>
                <div class="col-6 col-md-3"><label class="form-label small text-muted mb-0">GCS</label><input type="number" id="reg-v-gcs" class="form-control form-control-sm" min="3" max="15" placeholder="3-15"></div>
                <div class="col-6 col-md-3"><label class="form-label small text-muted mb-0">Glucose</label><input type="number" id="reg-v-glucose" class="form-control form-control-sm" placeholder="mg/dL"></div>
                <div class="col-6 col-md-3"><label class="form-label small text-muted mb-0">Pain</label><input type="number" id="reg-v-pain" class="form-control form-control-sm" min="0" max="10" placeholder="0-10"></div>
              </div>
            </div>
          </div>

          <!-- Result -->
          <div class="mb-3">
            <label class="form-label fw-bold small">Result</label>
            <div class="btn-group w-100 mb-2" role="group">
              <button type="button" class="btn btn-success btn-sm" id="reg-result-dc" onclick="reg_toggleResult('dc')"><i class="bi bi-check-circle me-1"></i>D/C (จำหน่าย)</button>
              <button type="button" class="btn btn-outline-warning btn-sm" id="reg-result-transfer" onclick="reg_toggleResult('transfer')"><i class="bi bi-ambulance me-1"></i>Transfer</button>
            </div>
            <div id="reg-result-dc-sub">
              <select id="reg-dc-sub" class="form-select form-select-sm">
                <option value="finished">D/C จำหน่าย</option>
                <option value="rtp">Return to Play (กลับเข้าแข่ง)</option>
                <option value="dnf">DNF (Did Not Finish)</option>
              </select>
            </div>
            <div id="reg-result-transfer-sub" class="d-none">
              <div class="row g-2">
                <div class="col-5">
                  <select id="reg-transfer-method" class="form-select form-select-sm">
                    <option value="team">ทีมไปส่ง</option>
                    <option value="self">ไปเอง</option>
                  </select>
                </div>
                <div class="col-7">
                  <input type="text" id="reg-transfer-hospital" class="form-control form-control-sm" placeholder="ชื่อ รพ.">
                </div>
              </div>
            </div>
          </div>

          <!-- Note, Image, GPS -->
          <div class="mb-2"><label class="form-label fw-bold small">หมายเหตุ</label><input type="text" id="reg-note" class="form-control form-control-sm"></div>
          <div class="mb-2"><label class="form-label fw-bold small"><i class="bi bi-image me-1"></i>แนบรูป</label><input type="file" id="reg-image" accept="image/*" class="form-control form-control-sm"></div>
          <div class="card p-2 bg-light border-0">
            <div class="input-group input-group-sm">
              <button type="button" class="btn btn-warning btn-sm" onclick="reg_getLocation()"><i class="bi bi-pin-map-fill"></i> GPS</button>
              <input type="text" id="reg-gps" class="form-control" readonly placeholder="คลิกปุ่มเพื่อดึงพิกัด">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer border-top-0 pt-0">
        <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="button" class="btn btn-success rounded-pill px-4 fw-bold shadow-sm" onclick="reg_submitForm()"><i class="bi bi-save me-1"></i> บันทึก</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../shared/config.js"></script>
<script src="../../shared/cloudinary.js"></script>
<script src="../../shared/realtime.js"></script>
<!-- Shared registry form module — same as admin's index.html -->
<script src="_reg-form.js"></script>

<script>
(function(){
  // ===== STATE (sessionStorage so refresh keeps the worker logged in) =====
  var STATE_KEY = 'staff_fa_state';
  var state = (function(){
    try { return JSON.parse(sessionStorage.getItem(STATE_KEY) || '{}'); } catch(e) { return {}; }
  })();
  function saveState(){ try { sessionStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e){} }
  function clearState(){ try { sessionStorage.removeItem(STATE_KEY); } catch(e){} state = {}; }

  // ===== Supabase client (own — does not share with admin auth) =====
  var _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  window._supabase = _supabase; // realtime.js + _reg-form.js use global _supabase

  // ===== Stub auth helpers so shared/admin code that calls these doesn't blow up =====
  window.getUserName = function(){ return state.workerName || 'Staff'; };
  window.getUserRole = function(){ return 'Staff'; }; // not Admin — gates admin-only UI

  // ===== Time auto-format (HH:MM) — copy of admin's helper, used by reg-time-in/out =====
  window.fa_autoFormatTime = function(el) {
    var v = el.value.replace(/[^\d]/g, '');
    if (v.length >= 3) {
      v = v.substring(0, 4);
      el.value = v.substring(0, 2) + ':' + v.substring(2);
    } else {
      el.value = v;
    }
  };

  // ===== HTML escape =====
  function esc(s){ return String(s||'').replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  // ===== Modal helpers — works with OR without bootstrap.Modal
  // (Some browsers block jsdelivr CDN, so don't hard-depend on bootstrap JS) =====
  function showModal(id) {
    var el = document.getElementById(id); if (!el) return;
    if (window.bootstrap && window.bootstrap.Modal) {
      try { window.bootstrap.Modal.getOrCreateInstance(el).show(); return; } catch(e) {}
    }
    el.classList.add('show');
    el.style.display = 'block';
    el.setAttribute('aria-hidden', 'false');
    document.body.classList.add('modal-open');
    if (!document.getElementById(id + '-backdrop')) {
      var bd = document.createElement('div');
      bd.className = 'modal-backdrop fade show';
      bd.id = id + '-backdrop';
      bd.addEventListener('click', function(){ hideModal(id); });
      document.body.appendChild(bd);
    }
  }
  function hideModal(id) {
    var el = document.getElementById(id); if (!el) return;
    if (window.bootstrap && window.bootstrap.Modal) {
      try {
        var inst = window.bootstrap.Modal.getOrCreateInstance(el);
        inst.hide(); return;
      } catch(e) {}
    }
    el.classList.remove('show');
    el.style.display = 'none';
    el.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('modal-open');
    var bd = document.getElementById(id + '-backdrop');
    if (bd) bd.remove();
  }
  // Wire all data-bs-dismiss="modal" buttons (works without bootstrap JS)
  document.addEventListener('click', function(ev) {
    var btn = ev.target.closest('[data-bs-dismiss="modal"]');
    if (!btn) return;
    var modal = btn.closest('.modal');
    if (modal) hideModal(modal.id);
  });

  // ===== TOKEN VERIFY FLOW =====
  async function staffVerifyToken(token) {
    token = (token || '').trim().toUpperCase();
    if (!/^[A-Z0-9]{6}$/.test(token)) {
      return { ok: false, msg: 'Token ต้องเป็น 6 ตัวอักษร/ตัวเลข' };
    }
    try {
      var { data: tokenRow, error: tokErr } = await _supabase.from('fa_event_tokens')
        .select('*').eq('token', token).maybeSingle();
      if (tokErr) throw tokErr;
      if (!tokenRow) return { ok: false, msg: 'ไม่พบ Token นี้ — ตรวจสอบกับ admin' };
      if (tokenRow.status !== 'Active') return { ok: false, msg: 'Token ถูกระงับแล้ว — ติดต่อ admin' };
      // Verify event still Active
      var { data: ev, error: evErr } = await _supabase.from('fa_events')
        .select('event_id,event_name,status,event_config,q_ammonia,q_plaster,q_spray,q_wound')
        .eq('event_id', tokenRow.event_id).maybeSingle();
      if (evErr) throw evErr;
      if (!ev) return { ok: false, msg: 'ไม่พบ Event ที่ผูกกับ Token นี้' };
      if (ev.status !== 'Active') return { ok: false, msg: 'Event ถูกปิดแล้ว — Token ใช้งานไม่ได้' };
      return { ok: true, token: tokenRow, event: ev };
    } catch(e) {
      return { ok: false, msg: 'เชื่อมต่อ DB ไม่ได้: ' + (e.message || e) };
    }
  }

  window.staffVerifyTokenInput = async function() {
    var input = document.getElementById('gate-token');
    var errEl = document.getElementById('gate-error');
    errEl.style.display = 'none';
    var v = await staffVerifyToken(input.value);
    if (!v.ok) {
      errEl.textContent = v.msg; errEl.style.display = '';
      return;
    }
    enterApp(v.token, v.event);
  };

  function enterApp(tokenRow, ev) {
    state.token = tokenRow.token;
    state.eventId = tokenRow.event_id;
    state.workerName = tokenRow.worker_name;
    state.section = tokenRow.location_tx || null;
    state.eventName = ev.event_name;
    state.eventConfig = ev.event_config || {};
    saveState();

    // Update UI
    document.getElementById('ui-worker-name').textContent = state.workerName;
    document.getElementById('ui-event-name').textContent = state.eventName;
    if (state.section) {
      document.getElementById('ui-section-wrap').style.display = '';
      document.getElementById('ui-section').textContent = state.section;
    }
    setSupplyValues(ev);

    document.getElementById('gate-view').style.display = 'none';
    document.getElementById('main-view').style.display = '';

    // Wire shared registry form module — exact same form as admin's faRegistryModal.
    // Hooks enforce staff-specific rules: section lock + edit own only + filter list refresh.
    if (window.regForm && typeof regForm.init === 'function') {
      regForm.init({
        supabase: _supabase,
        ctx: function() {
          return {
            eventId: state.eventId,
            eventConfig: state.eventConfig,
            eventType: 'general',
            recordedBy: state.workerName,
            // locationLock: if Token has location_tx, force the dropdown to that value + disable
            locationLock: state.section || null,
            allEvents: [],
            registryRecords: null
          };
        },
        hooks: {
          // Edit guard — staff can only open OWN records for editing
          onCanEdit: function(record) {
            return record && record.recorded_by === state.workerName;
          },
          // After save — refresh staff's own list
          onAfterSave: function() {
            staffRefreshMyList();
          }
        }
      });
    }

    staffRefreshMyList();
    subscribeRealtime();
  }

  window.staffLogout = function(){
    if (!confirm('ออกจากระบบและล้าง Token?')) return;
    clearState();
    location.href = location.pathname; // strip ?t=
  };

  // ===== AUTO-LOGIN from URL ?t= or saved state =====
  async function bootstrap() {
    // Wire input — uppercase + auto-submit on 6 chars
    var input = document.getElementById('gate-token');
    if (input) {
      input.addEventListener('input', function(){
        this.value = (this.value || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (this.value.length === 6) staffVerifyTokenInput();
      });
      input.addEventListener('keydown', function(e){
        if (e.key === 'Enter') staffVerifyTokenInput();
      });
    }

    var url = new URL(location.href);
    var urlToken = (url.searchParams.get('t') || '').trim();
    if (urlToken) {
      // Verify URL token
      var v = await staffVerifyToken(urlToken);
      if (v.ok) { enterApp(v.token, v.event); return; }
      // Fall through to gate w/ error
      document.getElementById('gate-error').textContent = v.msg;
      document.getElementById('gate-error').style.display = '';
      input.value = urlToken;
      return;
    }
    // Saved state? re-verify
    if (state.token) {
      var v2 = await staffVerifyToken(state.token);
      if (v2.ok) { enterApp(v2.token, v2.event); return; }
      // Stale — clear
      clearState();
    }
  }

  // ===== SUPPLIES =====
  function setSupplyValues(ev) {
    ['q_ammonia','q_plaster','q_spray','q_wound'].forEach(function(f){
      var el = document.getElementById('qv-' + f);
      if (el) el.textContent = ev[f] || 0;
    });
  }

  var _bumpBusy = {};
  window.staffBumpSupply = async function(field, delta) {
    if (_bumpBusy[field]) return;
    _bumpBusy[field] = true;
    var el = document.getElementById('qv-' + field);
    var prev = parseInt(el.textContent) || 0;
    // Optimistic UI
    el.textContent = Math.max(0, prev + delta);
    try {
      var { data, error } = await _supabase.rpc('fa_bump_supply', {
        p_event_id: state.eventId, p_field: field, p_delta: delta
      });
      if (error) throw error;
      if (typeof data === 'number') el.textContent = data;
    } catch(err) {
      el.textContent = prev; // rollback
      Swal.fire({ icon: 'error', title: 'อัปเดตไม่สำเร็จ', text: (err.message || err), timer: 2500, showConfirmButton: false });
    } finally {
      _bumpBusy[field] = false;
    }
  };

  // (Form dropdowns + Triage/Gender/Etiology pickers are now handled by shared _reg-form.js
  //  via reg_setTriage / reg_setGender / reg_toggleEtiology + reg_populateEventConfigDropdowns.)

  // ===== ADD / EDIT PATIENT — delegates to shared regForm module =====
  window.staffOpenForm = function(regId) {
    if (window.regForm && typeof regForm.open === 'function') {
      regForm.open(regId || null);
      return;
    }
    Swal.fire({ icon: 'error', title: 'ระบบยังไม่พร้อม', text: 'reg-form module ยังโหลดไม่เสร็จ' });
  };

  // (Legacy staff form code removed — registry form is now driven entirely by
  // shared/_reg-form.js which mirrors admin 1:1. Save/load handled by the module.)

  // ===== MY PATIENT LIST =====
  window.staffRefreshMyList = async function() {
    var listEl = document.getElementById('my-list');
    var countEl = document.getElementById('my-count');
    try {
      var q = _supabase.from('fa_registry').select('*')
        .eq('event_id', state.eventId)
        .eq('recorded_by', state.workerName)
        .order('time_in', { ascending: false });
      if (state.section) q = q.eq('location_tx', state.section);
      var { data, error } = await q;
      if (error) throw error;
      countEl.textContent = (data || []).length;
      if (!data || data.length === 0) {
        listEl.innerHTML = '<div class="empty-state"><i class="bi bi-clipboard2"></i><div>ยังไม่มีบันทึก กดปุ่ม + ด้านล่างเพื่อเพิ่มผู้ป่วย</div></div>';
        return;
      }
      listEl.innerHTML = data.map(function(r){
        // AVPU → strip color: A=green, V=amber, P=orange, U=red (matches admin)
        var triCls = r.triage === 'U' ? 'tri-resus' : r.triage === 'P' ? 'tri-emerg' : r.triage === 'V' ? 'tri-urgent' : 'tri-nonurg';
        var status = r.time_out ? '<span class="pill out">ออกแล้ว ' + esc(r.time_out) + '</span>' : '<span class="pill in">กำลังดูแล</span>';
        return '<div class="pt-row ' + triCls + '" onclick="staffOpenForm(\'' + esc(r.reg_id) + '\')">' +
          '<div class="strip"></div>' +
          '<div>' +
            '<div class="name">' + esc(r.name || '(ไม่ระบุชื่อ)') + '</div>' +
            '<div class="sub">' + esc(r.gender||'-') + ' · ' + esc(r.age||'-') + ' ปี · ' + esc(r.cc || '-') + '</div>' +
          '</div>' +
          '<div class="right">' +
            '<div class="time">' + esc(r.time_in || '--:--') + '</div>' +
            status +
          '</div>' +
        '</div>';
      }).join('');
    } catch(err) {
      listEl.innerHTML = '<div class="empty-state text-danger"><i class="bi bi-exclamation-triangle"></i><div>โหลดไม่สำเร็จ: ' + esc(err.message || err) + '</div></div>';
    }
  };

  // ===== REALTIME — refresh supplies + my list when changes happen =====
  function subscribeRealtime() {
    if (!window.RT || typeof RT.subscribeMulti !== 'function') return;
    RT.subscribeMulti('staff-fa', ['fa_registry','fa_events','fa_event_tokens'], function(payload){
      var t = payload && payload.table;
      if (t === 'fa_event_tokens') {
        // Token may have been revoked by admin — re-verify
        staffVerifyToken(state.token).then(function(v){
          if (!v.ok) {
            Swal.fire({ icon: 'warning', title: 'Token ถูกระงับ', text: v.msg, allowOutsideClick: false }).then(function(){ staffLogout(); });
          }
        });
        return;
      }
      if (t === 'fa_events') {
        // Re-pull supplies + check event status
        _supabase.from('fa_events').select('event_id,status,q_ammonia,q_plaster,q_spray,q_wound')
          .eq('event_id', state.eventId).maybeSingle().then(function(r){
            if (r.data) {
              if (r.data.status !== 'Active') {
                Swal.fire({ icon: 'info', title: 'Event ถูกปิดแล้ว', allowOutsideClick: false }).then(function(){ staffLogout(); });
                return;
              }
              ['q_ammonia','q_plaster','q_spray','q_wound'].forEach(function(f){
                if (!_bumpBusy[f]) {
                  var el = document.getElementById('qv-' + f);
                  if (el) el.textContent = r.data[f] || 0;
                }
              });
            }
          });
        return;
      }
      // fa_registry — could be my own change or admin's; just refresh my list
      staffRefreshMyList();
    });
  }

  // Init
  bootstrap();
})();
</script>
